openapi: 3.1.0
info:
  title: crypto-gateway
  version: 0.0.0
  description: |
    Runtime-agnostic crypto payment gateway with pluggable chain adapters
    (EVM / Tron / Solana), DB adapters (D1 / libSQL / Postgres), cache
    adapters, detection strategies, and webhook delivery.

    Deploys on Cloudflare Workers, Node/Bun, Deno, and Vercel Edge from one
    codebase.

    ### Deployment knobs (not HTTP routes)

    The behaviors below are server-side config read at boot and do not
    surface as endpoints. They're documented here so operators who only
    have the OpenAPI spec can discover them.

    **Price oracle fallback chain.** Invoice quoting walks a chained list
    of providers on every request; each link tries itself first and
    delegates to the next on error/timeout/unmapped symbol. The terminal
    link fails explicitly (a noop oracle that throws) rather than serving
    hardcoded values — a full oracle outage surfaces as an error, never a
    stale or pegged rate. Default ordering when `ALCHEMY_API_KEY` is set:
    `CoinGecko → Alchemy → CoinCap → Binance → explicit failure (noop)`.
    The hardcoded `static-peg` link is never part of this default chain —
    it applies only with an explicit `PRICE_ADAPTER=static-peg` opt-in
    (dev/tests).
    Knobs: `PRICE_ADAPTER=alchemy|coingecko|static-peg` (swaps the primary
    or collapses to the static link), `COINGECKO_API_KEY` +
    `COINGECKO_PLAN=demo|pro`, `COINCAP_API_KEY`, and per-provider
    opt-outs `DISABLE_COINGECKO=1` / `DISABLE_COINCAP=1` /
    `DISABLE_BINANCE=1` / `DISABLE_ALCHEMY=1`. `PRICE_ADAPTER=alchemy`
    without a key logs a warning and falls back to the default ordering.

    **Log shipping + alerting.** Setting `ALERT_WEBHOOK_URL` attaches an
    HTTP sink to the structured logger; every `error` or `fatal` log is
    POSTed as `{ ts, level, msg, ...fields }` JSON. Sliding-window rate
    limited to 30/min with a `droppedSinceLast` counter piggybacked on
    the next successful delivery. Use `ALERT_WEBHOOK_AUTH_HEADER` for the
    `Authorization` header value (e.g. `Bearer xyz`). Fire-and-forget —
    a broken sink never breaks the caller's log path.

    See the repository README for the full env-var table.

servers:
  - url: http://localhost:8787
    description: Local Node dev
  - url: https://crypto-gateway-dev.workers.dev
    description: Dev Workers (placeholder — replace with your subdomain)

tags:
  - name: invoices
    description: Merchant-facing invoice lifecycle
  - name: payouts
    description: Merchant-facing payout lifecycle
  - name: checkout
    description: Public invoice view (for hosted checkout UIs)
  - name: webhooks
    description: Inbound webhook ingest from on-chain providers
  - name: admin
    description: Operator-only setup
  - name: fee-wallets
    description: |
      Per-family gas provider configuration. Registering a fee wallet on a
      family whose adapter supports the topology (Solana co-sign, Tron
      delegate) lets pool addresses stop holding native gas — the fee
      wallet covers sig fees, ATA rent (Solana), and/or delegated energy
      (Tron) for every payout. Opt-in per family; EVM is not supported
      today.
  - name: tron
    description: Tron-specific Stake 2.0 resource operations (freeze / delegate / status).
  - name: internal
    description: Scheduler-driven maintenance
  - name: health
    description: Unauthenticated liveness probe for load balancers and uptime checks.
  - name: monero
    description: |
      Monero-specific operator diagnostics: view-key scan forensics
      (inspect-tx), cron scan-state visibility, and manual late-payment
      ingestion (force-ingest-tx). Monero is inbound-only in v1 — no
      payouts, no fee-wallet topology.
  - name: utxo
    description: |
      UTXO-family (Bitcoin / Litecoin) operator maintenance: RBF fee
      bumping for stuck payouts and address-index repair.

security:
  - MerchantApiKey: []

paths:
  /health:
    get:
      tags: [health]
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: Service up
          headers:
            X-Request-Id: { $ref: "#/components/headers/X-Request-Id" }
          content:
            application/json:
              schema:
                type: object
                required: [status, phase]
                properties:
                  status: { type: string, enum: [ok] }
                  phase: { type: integer }

  /api/v1/invoices:
    get:
      tags: [invoices]
      summary: List invoices for the authenticated merchant
      description: |
        Returns invoices created by the authenticated merchant, newest first
        (`createdAt DESC`). All filters are optional and AND-combined. The
        `merchantId` is always taken from the API key — there is no way to
        list another merchant's invoices.

        Pagination uses `limit` + `offset`. The response includes `hasMore`
        (computed via fetch-N+1, without a `COUNT(*)` — there is no total
        count field), so callers page until `hasMore` is false.
      parameters:
        - name: status
          in: query
          description: |
            Comma-separated list of statuses. Any of:
            `pending,processing,completed,expired,canceled`.
            Unknown values yield 400 `BAD_STATUS` (typos are rejected
            rather than silently ignored).

            Lifecycle vs. fidelity: `status` answers "where is this invoice
            in its journey?", and the orthogonal `extraStatus` field on each
            invoice answers "did the customer pay the right amount?".
          schema: { type: string }
        - name: chainId
          in: query
          description: Narrow to one chain id. Non-numeric values yield 400 `BAD_CHAIN_ID`.
          schema: { type: integer }
        - name: extraStatus
          in: query
          description: |
            Comma-separated payment-fidelity filter: `partial` (underpaid,
            status=processing) and/or `overpaid` (over threshold,
            status=completed). Invoices with no extra status are excluded
            when this filter is set.
          schema: { type: string }
        - name: token
          in: query
          description: |
            Comma-separated token symbols (OR match). A single `?token=USDT`
            still works.
          schema: { type: string }
        - name: externalId
          in: query
          description: Merchant-supplied dedup key (exact match).
          schema: { type: string }
        - name: externalIdContains
          in: query
          description: |
            Case-insensitive substring match on `externalId` (`LIKE %term%`;
            `%`/`_` in the term are escaped and matched literally).
          schema: { type: string }
        - name: toAddress
          in: query
          description: |
            Invoice receive address — what the payer saw on the checkout page.
            Exact match; pass the canonicalized form.
          schema: { type: string }
        - name: addressContains
          in: query
          description: |
            Case-insensitive substring match on the invoice receive address.
            Not canonicalized — matches the stored casing.
          schema: { type: string }
        - name: fromAddress
          in: query
          description: |
            Payer address. Matches invoices that have any detected or confirmed
            transaction from this address. Reverted / orphaned transactions
            are excluded so a single failed payment doesn't surface a stale
            invoice.
          schema: { type: string }
        - name: txHash
          in: query
          description: |
            On-chain tx hash. Matches the invoice(s) credited by this
            transaction (detected / confirmed transactions only).
          schema: { type: string }
        - name: amountUsdMin
          in: query
          description: |
            Inclusive lower bound on `amountUsd`. Legacy token-amount invoices
            (no USD amount) are excluded when set. Non-numeric values yield
            400 `BAD_NUMBER`.
          schema: { type: number }
        - name: amountUsdMax
          in: query
          description: Inclusive upper bound on `amountUsd`.
          schema: { type: number }
        - name: paidUsdMin
          in: query
          description: Inclusive lower bound on `paidUsd` (USD received so far).
          schema: { type: number }
        - name: paidUsdMax
          in: query
          description: Inclusive upper bound on `paidUsd`.
          schema: { type: number }
        - name: hasPayments
          in: query
          description: |
            `true` → only invoices with any payment recorded; `false` → only
            untouched invoices. Accepts `true|false|1|0`; anything else
            yields 400 `BAD_BOOLEAN`.
          schema: { type: boolean }
        - name: createdFrom
          in: query
          description: Inclusive lower bound on `createdAt`. ISO-8601 or unix-ms (400 `BAD_TIMESTAMP` otherwise).
          schema: { type: string }
        - name: createdTo
          in: query
          description: Inclusive upper bound on `createdAt`. ISO-8601 or unix-ms.
          schema: { type: string }
        - name: updatedFrom
          in: query
          description: Inclusive lower bound on `updatedAt`. ISO-8601 or unix-ms.
          schema: { type: string }
        - name: updatedTo
          in: query
          description: Inclusive upper bound on `updatedAt`. ISO-8601 or unix-ms.
          schema: { type: string }
        - name: confirmedFrom
          in: query
          description: Inclusive lower bound on `confirmedAt`. ISO-8601 or unix-ms.
          schema: { type: string }
        - name: confirmedTo
          in: query
          description: Inclusive upper bound on `confirmedAt`. ISO-8601 or unix-ms.
          schema: { type: string }
        - name: expiresFrom
          in: query
          description: Inclusive lower bound on `expiresAt`. ISO-8601 or unix-ms.
          schema: { type: string }
        - name: expiresTo
          in: query
          description: Inclusive upper bound on `expiresAt`. ISO-8601 or unix-ms.
          schema: { type: string }
        - name: sortBy
          in: query
          description: Sort column. Default `createdAt`. `amountUsd` / `paidUsd` sort numerically.
          schema:
            type: string
            enum: [createdAt, updatedAt, confirmedAt, expiresAt, amountUsd, paidUsd]
            default: createdAt
        - name: sortDir
          in: query
          schema: { type: string, enum: [asc, desc], default: desc }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        "200":
          description: Paginated list of invoices
          headers:
            X-Request-Id: { $ref: "#/components/headers/X-Request-Id" }
            X-RateLimit-Limit: { $ref: "#/components/headers/X-RateLimit-Limit" }
            X-RateLimit-Remaining: { $ref: "#/components/headers/X-RateLimit-Remaining" }
            X-RateLimit-Reset: { $ref: "#/components/headers/X-RateLimit-Reset" }
          content:
            application/json:
              schema:
                type: object
                required: [invoices, limit, offset, sortBy, sortDir, hasMore]
                properties:
                  invoices:
                    type: array
                    items: { $ref: "#/components/schemas/Invoice" }
                  limit:
                    type: integer
                    description: Echo of the resolved page size (default 25, max 100).
                  offset: { type: integer }
                  sortBy:
                    type: string
                    enum: [createdAt, updatedAt, confirmedAt, expiresAt, amountUsd, paidUsd]
                    description: Echo of the resolved sort column.
                  sortDir:
                    type: string
                    enum: [asc, desc]
                  hasMore:
                    type: boolean
                    description: |
                      True when another page exists past `offset + limit`.
                      Computed via fetch-N+1 (no COUNT(*)), so there is no
                      total-count field — page until `hasMore` is false.
        "400":
          description: |
            Bad filter value. Stable `error.code` values:
              - `BAD_STATUS` — unknown `status` entry
              - `BAD_CHAIN_ID` — non-numeric `chainId`
              - `BAD_TIMESTAMP` — a `*From`/`*To` bound that is neither
                ISO-8601 nor a unix-ms digit string
              - `BAD_NUMBER` — non-numeric `amountUsdMin/Max` or `paidUsdMin/Max`
              - `BAD_BOOLEAN` — `hasPayments` not one of `true|false|1|0`
              - `VALIDATION` — Zod rejection (limit outside 1..100, unknown
                `sortBy`/`sortDir`, `*From` > `*To`, `*Min` > `*Max`, bad
                `extraStatus`/`token` values); `details` carries the issues
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }
    post:
      tags: [invoices]
      summary: Create an invoice
      description: |
        Creates an invoice and allocates one receive address per accepted
        family, derived from the gateway's HD seed. Account-model families
        (EVM / Tron / Solana) draw from the pre-minted address pool; UTXO
        derives a fresh address per invoice (per-chain: BTC and LTC get
        separate addresses); Monero draws from its dedicated subaddress
        pool. The merchant is resolved from the API key — the caller MUST
        NOT include `merchantId` in the body; if they do, it's ignored.

        **Pricing modes** (exactly one — see `CreateInvoiceInput`):
        `amountUsd` (USD-pegged: any registered token on any accepted
        family converts at the 10-minute pinned rate window and sums toward
        the USD target), `amountRaw` (legacy exact-token), or `fiatAmount`
        + `fiatCurrency` (legacy fiat-quoted; the applied rate is echoed on
        the invoice as `quotedRate`).

        **Idempotency.** Pass `externalId` to make the call idempotent: a
        retry with the same `(merchantId, externalId)` returns the existing
        invoice (HTTP 201 again; the body is identical except that the
        fresh-create-only `receiveAddresses[].addressIndex` extra is
        absent on replays) instead of creating a
        duplicate — even under a concurrent-create race (unique-index
        fallback). Safe to send the same POST multiple times after a
        timeout or 5xx.

        Note: a `chainId` whose token is registered but whose chain adapter
        is not wired in this deployment currently surfaces as 500
        `INTERNAL` rather than a typed 400. Likewise, a full price-oracle
        outage on the legacy fiat-quoted path (`fiatAmount` +
        `fiatCurrency`) currently surfaces as 500 `INTERNAL` — the typed
        503 `RATES_UNAVAILABLE` below applies to the USD path only.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateInvoiceInput" }
      responses:
        "201":
          description: |
            Invoice created (or idempotent replay — the existing invoice for
            this `externalId` is returned with the same 201 status).
          headers:
            X-Request-Id: { $ref: "#/components/headers/X-Request-Id" }
            X-RateLimit-Limit: { $ref: "#/components/headers/X-RateLimit-Limit" }
            X-RateLimit-Remaining: { $ref: "#/components/headers/X-RateLimit-Remaining" }
            X-RateLimit-Reset: { $ref: "#/components/headers/X-RateLimit-Reset" }
          content:
            application/json:
              schema:
                type: object
                required: [invoice]
                properties:
                  invoice: { $ref: "#/components/schemas/Invoice" }
        "400":
          description: |
            Stable `error.code` values:
              - `BAD_JSON` — request body is not valid JSON
              - `VALIDATION` — Zod schema violation (zero or multiple
                pricing modes, `fiatAmount` without `fiatCurrency`,
                `webhookUrl`/`webhookSecret` not supplied as a pair,
                out-of-range `expiresInMinutes` / tolerance bps, ...);
                `details` carries the Zod issues
              - `TOKEN_NOT_SUPPORTED` — `token` not registered on the
                request's `chainId`; or (legacy single-token modes) not
                registered on every accepted family; or (USD mode) not
                registered on the primary chain's family; or an accepted
                family has no wired chain adapter
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/MerchantInactive" }
        "404":
          description: |
            `MERCHANT_NOT_FOUND` — the authenticated merchant row disappeared
            between auth and create (deletion race). Inactive merchants are
            rejected at auth with 401 before reaching this code.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "503":
          description: |
            Transient — retry after a short delay. Stable `error.code` values:
              - `RATES_UNAVAILABLE` — USD-path only; the cron-warmed rate
                cache is empty (gateway just booted, or the oracle outage
                outlasted the cache TTL). Succeeds once the rate cron runs.
              - `POOL_EXHAUSTED` — no available receive address for one of
                the accepted families; `details.family` names the family and
                `details.hint` names the fix (`POST /admin/pool/initialize`,
                or `POST /admin/monero-pool/initialize` for Monero).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/invoices/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [invoices]
      summary: Fetch an invoice with USD breakdown and per-transaction detail
      description: |
        Returns the invoice along with two extra blocks not surfaced on POST
        responses:
          - `amounts` — USD-axis recomputation (required / confirmed /
            confirming / remaining / overpaid). All-null on legacy
            single-token invoices.
          - `transactions` — every on-chain row tied to this invoice (all
            statuses, including `reverted` and `orphaned` for debugging),
            ordered by `detectedAt` ascending.

        Ownership: an id that exists but belongs to another merchant returns
        404 (never 403) so invoice ids can't be enumerated across merchants.
        Malformed (non-UUID) ids also return 404 rather than 400 — same
        response as "doesn't exist" by design.
      responses:
        "200":
          description: Invoice found
          headers:
            X-Request-Id: { $ref: "#/components/headers/X-Request-Id" }
            X-RateLimit-Limit: { $ref: "#/components/headers/X-RateLimit-Limit" }
            X-RateLimit-Remaining: { $ref: "#/components/headers/X-RateLimit-Remaining" }
            X-RateLimit-Reset: { $ref: "#/components/headers/X-RateLimit-Reset" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InvoiceDetails" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/v1/invoices/{id}/expire:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [invoices]
      summary: Force-expire an invoice before its expiry window elapses
      description: |
        Transitions a `pending` or `processing` invoice to `expired`
        immediately — partial-paid invoices (`processing` +
        `extraStatus='partial'`) are eligible too. On success the gateway
        publishes `invoice.expired`: the merchant webhook (or the
        per-invoice `webhookUrl` override) fires and the invoice's pooled
        receive addresses return to rotation after the merchant's cooldown.

        NOT idempotent: repeating the call on an already-terminal invoice
        (`completed`, `expired`, `canceled`) returns 409
        `EXPIRE_NOT_ALLOWED`. The 200 body is `{ invoice }` only — no
        `amounts` / `transactions` blocks (use the GET for those).

        Ownership: ids belonging to another merchant — and malformed
        non-UUID ids — return 404, indistinguishable from "doesn't exist".
      responses:
        "200":
          description: Invoice expired
          headers:
            X-Request-Id: { $ref: "#/components/headers/X-Request-Id" }
            X-RateLimit-Limit: { $ref: "#/components/headers/X-RateLimit-Limit" }
            X-RateLimit-Remaining: { $ref: "#/components/headers/X-RateLimit-Remaining" }
            X-RateLimit-Reset: { $ref: "#/components/headers/X-RateLimit-Reset" }
          content:
            application/json:
              schema:
                type: object
                required: [invoice]
                properties:
                  invoice: { $ref: "#/components/schemas/Invoice" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: |
            `EXPIRE_NOT_ALLOWED` — the invoice is already in a terminal state
            (`completed`, `expired`, or `canceled`) and cannot be expired.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/v1/payouts:
    get:
      tags: [payouts]
      summary: List payouts for the authenticated merchant
      description: |
        Returns payouts planned by the authenticated merchant, newest first
        (`createdAt DESC`). All filters optional, AND-combined. `merchantId`
        is always taken from the API key. Only `standard` rows are returned —
        internal kinds (`gas_top_up`, `gas_burn`, `consolidation_sweep`)
        never appear here.

        Pagination via `limit` + `offset`; response includes `hasMore`
        (computed without `COUNT(*)`).
      parameters:
        - name: status
          in: query
          description: |
            Comma-separated list of statuses. Any of:
            `planned,reserved,topping-up,submitted,confirmed,failed,canceled`.
            Unknown values yield 400 `BAD_STATUS`. New rows start at
            `reserved` (source is picked synchronously on POST); `planned`
            matches only legacy rows. `topping-up` indicates the source
            address lacked native gas and the executor is waiting for a
            sponsor → source top-up tx to confirm before broadcasting the
            main payout.
          schema: { type: string }
        - name: chainId
          in: query
          schema: { type: integer, minimum: 1 }
        - name: token
          in: query
          description: |
            Comma-separated token symbols (OR match). A single `?token=USDT`
            still works. Each entry must match `^[A-Z0-9]{1,16}$` —
            malformed entries fail 400 `VALIDATION`; unknown-but-well-formed
            symbols simply match zero rows.
          schema: { type: string }
        - name: destinationAddress
          in: query
          description: Exact-match on the canonicalized destination.
          schema: { type: string }
        - name: destinationAddressContains
          in: query
          description: Case-insensitive substring match on `destinationAddress`.
          schema: { type: string }
        - name: sourceAddress
          in: query
          description: |
            HD address that funded the payout. Always NULL on UTXO-family
            payouts (no single source), so this filter implicitly excludes
            them.
          schema: { type: string }
        - name: sourceAddressContains
          in: query
          description: Case-insensitive substring match on `sourceAddress`.
          schema: { type: string }
        - name: batchId
          in: query
          description: |
            Return only payouts belonging to a specific batch (the `batchId`
            returned by `POST /payouts/batch`, or one supplied on
            single-create). Null-matched rows are excluded.
          schema: { type: string }
        - name: txHash
          in: query
          description: |
            Exact on-chain tx hash. NULL until the payout reaches `submitted`,
            so this implicitly filters to broadcast payouts.
          schema: { type: string }
        - name: feeTier
          in: query
          description: |
            Comma-separated fee tiers (`low`, `medium`, `high`). Payouts with
            no tier recorded are excluded when set.
          schema: { type: string }
        - name: hasError
          in: query
          description: |
            `true` → only payouts carrying a `lastError`; `false` → only clean
            ones.
          schema: { type: boolean }
        - name: amountUsdMin
          in: query
          description: |
            Inclusive lower bound on `quotedAmountUsd`. Raw-amount payouts (no
            USD quote) are excluded when set.
          schema: { type: number }
        - name: amountUsdMax
          in: query
          description: Inclusive upper bound on `quotedAmountUsd`.
          schema: { type: number }
        - name: createdFrom
          in: query
          description: Inclusive lower bound on `createdAt`. ISO-8601 or unix-ms.
          schema: { type: string }
        - name: createdTo
          in: query
          description: Inclusive upper bound on `createdAt`. ISO-8601 or unix-ms.
          schema: { type: string }
        - name: submittedFrom
          in: query
          description: Inclusive lower bound on `submittedAt`. ISO-8601 or unix-ms.
          schema: { type: string }
        - name: submittedTo
          in: query
          description: Inclusive upper bound on `submittedAt`. ISO-8601 or unix-ms.
          schema: { type: string }
        - name: confirmedFrom
          in: query
          description: Inclusive lower bound on `confirmedAt`. ISO-8601 or unix-ms.
          schema: { type: string }
        - name: confirmedTo
          in: query
          description: Inclusive upper bound on `confirmedAt`. ISO-8601 or unix-ms.
          schema: { type: string }
        - name: updatedFrom
          in: query
          description: Inclusive lower bound on `updatedAt`. ISO-8601 or unix-ms.
          schema: { type: string }
        - name: updatedTo
          in: query
          description: Inclusive upper bound on `updatedAt`. ISO-8601 or unix-ms.
          schema: { type: string }
        - name: sortBy
          in: query
          description: Sort column. Default `createdAt`.
          schema:
            type: string
            enum: [createdAt, updatedAt, submittedAt, confirmedAt, amountUsd]
            default: createdAt
        - name: sortDir
          in: query
          schema: { type: string, enum: [asc, desc], default: desc }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        "200":
          description: Paginated list of payouts
          content:
            application/json:
              schema:
                type: object
                required: [payouts, limit, offset, sortBy, sortDir, hasMore]
                properties:
                  payouts:
                    type: array
                    items: { $ref: "#/components/schemas/Payout" }
                  limit: { type: integer }
                  offset: { type: integer }
                  sortBy: { type: string }
                  sortDir: { type: string }
                  hasMore: { type: boolean }
        "400":
          description: |
            Bad filter. Route-specific codes: `BAD_STATUS` (unknown status
            value), `BAD_CHAIN_ID` (non-numeric `chainId`), `BAD_TIMESTAMP`
            (a `*From`/`*To` bound that is neither ISO-8601 nor unix-ms),
            `BAD_NUMBER` (non-numeric `amountUsdMin`/`amountUsdMax`),
            `BAD_BOOLEAN` (`hasError` not `true`/`false`/`1`/`0`).
            Everything else surfaces as `VALIDATION` with zod issues in
            `details` — unknown `sortBy`/`sortDir`, `limit` outside 1..100,
            a malformed token symbol (must match `^[A-Z0-9]{1,16}$`),
            inverted `*From > *To` or `amountUsdMin > amountUsdMax`
            bounds. An unknown-but-well-formed symbol (e.g. `FOOBAR`) is
            NOT an error — it simply matches zero rows.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }
    post:
      tags: [payouts]
      summary: Plan a payout (source reserved synchronously)
      description: |
        Plans a payout and — in the same request — picks the HD funding
        source and writes balance reservations. The returned payout is
        already `status: "reserved"` (`planned` is a legacy state new rows
        skip): `sourceAddress` is set on account-model chains (EVM / Tron /
        Solana); on UTXO chains (BTC / LTC) it stays null because coin
        selection runs across every owned UTXO at broadcast time (the
        planner still verifies feasibility with a real coinselect pass).

        Because selection is synchronous, "not enough funds" surfaces on
        this POST (see the 400/503 codes below) — NOT as a later `failed`
        webhook. Only the broadcast is asynchronous: the executor picks up
        reserved rows — kicked in the background right after this POST on
        first-party deployments (fast execution), otherwise on the next
        cron tick — optionally routes a sponsor → source gas top-up
        (status `topping-up`), then broadcasts (`submitted`) and confirms
        (`confirmed`). Track progress via `payout.*` webhooks or by polling
        `GET /api/v1/payouts/{id}`.

        No merchant webhook fires at plan time — the 201 response is the
        planning confirmation (the internal `payout.planned` domain event
        is not exposed to merchants); the first webhook a payout emits is
        `payout.submitted`. Cancel is possible only while status is
        `reserved` — see `POST /api/v1/payouts/{id}/cancel`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PlanPayoutInput" }
      responses:
        "201":
          description: Payout planned and reserved (`status` is `reserved`)
          content:
            application/json:
              schema:
                type: object
                required: [payout]
                properties:
                  payout: { $ref: "#/components/schemas/Payout" }
        "400":
          description: |
            `BAD_JSON` (body not JSON), `VALIDATION` (zod issues in
            `details`: unknown keys — the schema is strict —, none or more
            than one of `amountRaw`/`amount`/`amountUSD`, `webhookUrl`
            without `webhookSecret` or vice versa),
            `TOKEN_NOT_SUPPORTED` (symbol not registered on the chain),
            `INVALID_DESTINATION` (address fails the chain family's
            canonicalize/validate — also used for an SSRF-unsafe
            `webhookUrl`), `BAD_AMOUNT` (`amount` has more decimal places
            than the token supports), `PAYOUT_NOT_SUPPORTED_ON_FAMILY`
            (Monero is inbound-only in v1), or
            `MAX_AMOUNT_EXCEEDS_NET_SPENDABLE` — amount + gas exceeds the
            spendable balance; `details` carries `suggestedAmountRaw`
            (smallest units), `suggestedAmount` (human decimal) and
            best-effort `suggestedAmountUsd` (null on oracle outage) so the
            caller can retry with a fitting amount.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/MerchantInactive" }
        "404":
          description: |
            `MERCHANT_NOT_FOUND` — merchant row disappeared between auth and
            plan. Practically unreachable; documented for completeness.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "503":
          description: |
            Transient / operator-actionable rejections — safe to retry after
            the condition clears:
              - `ORACLE_FAILED` — `amountUSD` given but the price oracle is
                unreachable; a stale rate is never substituted.
              - `FEE_ESTIMATE_FAILED` — the chain fee quote failed; retry
                shortly.
              - `INSUFFICIENT_BALANCE_ANY_SOURCE` — no single HD source
                covers the amount. The message distinguishes "aggregate is
                enough but fragmented across pool addresses — consolidate or
                lower the amount" from "aggregate too low — fund the pool".
              - `NO_GAS_SPONSOR_AVAILABLE` — a token holder exists but no
                other address (or fee wallet) has enough native to top up
                its gas.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/payouts/estimate:
    post:
      tags: [payouts]
      summary: Quote fee tiers + preview the source the planner will pick
      description: |
        Returns low/medium/high fee quotes AND the HD source address the
        planner would pick, all WITHOUT planning anything or writing a
        reservation. The operator can preview where the payout will come
        from, see whether a JIT gas top-up is required, and pick a tier
        before committing the real `POST /api/v1/payouts`.

        Source selection follows the same algorithm as the planner:
          1. Tier A — pick the richest HD address (by token balance) that
             ALSO has enough native for gas (or is covered by delegated
             energy on Tron). No top-up, no `topUp` field.
          2. Tier B — if no address has both, pick the richest token holder
             and propose a sponsor with native to cover the gas top-up.
             `topUp.required=true` is set; `topUp.sponsor` is non-null when
             a funded sponsor exists, null when none does.
          3. If no token holder has enough, `source` is null and `warnings`
             carries `no_source_address_has_sufficient_token_balance`
             (plus `single_source_insufficient_consolidate_required` when
             the aggregate would cover it).

        On UTXO chains (BTC / LTC) there is no per-address picker —
        feasibility runs a real coinselect pass across the live UTXO set,
        and `source` is a synthetic aggregate (`address:
        "<utxo-aggregate>"`, `derivationIndex: -1`, balances = total
        confirmed spendable). `alternatives` is always empty there, and an
        infeasible amount yields either the 400 below or the
        `insufficient_utxo_balance` warning with `source: null`.

        For native payouts (token == chain native), tier B is impossible
        — gas IS the asset. If the only candidate has balance ≈ amount
        but not enough headroom for gas, the endpoint throws
        `MAX_AMOUNT_EXCEEDS_NET_SPENDABLE` (400). Error `details` carries:
        - `suggestedAmountRaw` — integer string in the token's smallest
          unit, for programmatic pre-fill.
        - `suggestedAmount` — human-decimal ("0.029"), for button text.
        - `suggestedAmountUsd` — best-effort USD ("0.03"), for the
          operator's sanity check. `null` when the price oracle is
          unavailable — the raw + decimal forms are still present.

        Tier semantics by chain family:
          - **EVM**: priority-fee multipliers on viem's `estimateFeesPerGas`
            (0.8× / 1.0× / 1.5×). `tieringSupported=true` except on legacy
            non-EIP-1559 chains, which return the three tiers identical.
          - **Solana**: 25th / 50th / 75th percentile of recent
            `getRecentPrioritizationFees` samples, combined with a fixed
            200k-CU allocation. `tieringSupported=false` when no recent
            samples — conservative fallback prices are used instead.
          - **Tron**: three tiers always identical; Tron has no priority
            concept. `tieringSupported=false`.
          - **UTXO**: sat/vB tiers from the fee-rate oracle applied to a
            typical transfer size; broadcast recomputes against the actual
            input/output count.

        A fee-quote failure does NOT error: the response degrades to
        `tieringSupported=false` with zeroed tiers and the
        `fee_quote_unavailable` warning (a real `POST /payouts` would then
        503 `FEE_ESTIMATE_FAILED`). Amount resolution is identical to
        `POST /api/v1/payouts` (raw / decimal / USD-pegged via oracle);
        the request schema is the same strict `PlanPayoutInput`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PlanPayoutInput" }
      responses:
        "200":
          description: Fee-tier quote + source preview
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PayoutFeeEstimate" }
        "400":
          description: |
            `BAD_JSON`, `VALIDATION` (strict-schema violations),
            `TOKEN_NOT_SUPPORTED`, `INVALID_DESTINATION`, `BAD_AMOUNT`,
            `PAYOUT_NOT_SUPPORTED_ON_FAMILY` (Monero), or
            `MAX_AMOUNT_EXCEEDS_NET_SPENDABLE` with the `details` payload
            described above.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/MerchantInactive" }
        "404":
          description: |
            `MERCHANT_NOT_FOUND` — merchant row disappeared between auth and
            estimate. Practically unreachable; documented for completeness.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "503":
          description: |
            `ORACLE_FAILED` — `amountUSD` was given but the price oracle is
            unreachable. (Fee-quote failures do NOT 503 here — they degrade
            to `tieringSupported=false` + the `fee_quote_unavailable`
            warning.)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/payouts/batch:
    post:
      tags: [payouts]
      summary: Plan up to 100 payouts in one call
      description: |
        Mass-create endpoint. Each row runs through the same pipeline as
        `POST /api/v1/payouts` (synchronous source reservation per row) —
        per-row errors DO NOT abort the batch. Every successfully-planned
        row shares the same server-generated `batchId` (echoed top-level)
        so operators can list them together via
        `GET /api/v1/payouts?batchId=<id>`. Rows are processed in order:
        earlier rows' reservations reduce the balance available to later
        rows, so a batch can partially fail with
        `INSUFFICIENT_BALANCE_ANY_SOURCE` on its tail.

        **Rate limit:** a batch of N rows consumes N tokens from the
        merchant's `merchantPerMinute` quota (the request costs 1; N−1 more
        are consumed before planning starts). If the quota can't cover the
        batch, the WHOLE call returns 429 `RATE_LIMITED` with `Retry-After`
        and nothing is planned — split into smaller batches or wait out the
        window.

        **Atomicity:** per-row. HTTP 200 whenever the batch envelope was
        well-formed — even if EVERY row failed; inspect `results[]` +
        `summary`. Per-row failure codes mirror single-create
        (`TOKEN_NOT_SUPPORTED`, `INVALID_DESTINATION`, `BAD_AMOUNT`,
        `MAX_AMOUNT_EXCEEDS_NET_SPENDABLE`,
        `INSUFFICIENT_BALANCE_ANY_SOURCE`, `NO_GAS_SPONSOR_AVAILABLE`,
        `ORACLE_FAILED`, ...), plus `VALIDATION_FAILED` (row failed schema
        validation; message joins the issues) and `INTERNAL`. An empty
        `payouts: []` returns 200 with `batchId: ""` and empty results.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PayoutBatchInput" }
      responses:
        "200":
          description: Batch processed (partial or even total per-row failure still returns 200)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PayoutBatchResponse" }
        "400":
          description: |
            Batch-level error only: `BAD_JSON` (body not JSON, or not
            `{ payouts: [...] }`) or `BATCH_TOO_LARGE` (more than 100 rows).
            Per-row schema failures do NOT 400 — they come back inside a
            200 as `results[i] = { status: "failed", error: { code:
            "VALIDATION_FAILED" } }`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429":
          description: |
            `RATE_LIMITED` — either the per-request limiter or the
            proportional batch charge (batch size exceeds the remaining
            per-minute quota; the message suggests splitting the batch).
            Nothing was planned.
          headers:
            Retry-After:
              description: Seconds until the window rolls
              schema: { type: integer }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/payouts/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [payouts]
      summary: Fetch a payout
      description: |
        Returns the payout by id. Poll this after `POST /api/v1/payouts` to
        track the lifecycle: `reserved` → (`topping-up` →) `submitted` →
        `confirmed`, or `failed` / `canceled`. `txHash` (and `topUpTxHash`
        when a gas top-up was needed) appear once broadcast; `lastError`
        carries the merchant-safe failure reason after a failure.

        404 semantics: a malformed (non-UUID) id, a nonexistent id, and a
        payout belonging to another merchant all return the same
        `NOT_FOUND` — ids can't be enumerated across merchants.
      responses:
        "200":
          description: Payout found
          content:
            application/json:
              schema:
                type: object
                required: [payout]
                properties:
                  payout: { $ref: "#/components/schemas/Payout" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/v1/payouts/{id}/cancel:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [payouts]
      summary: Cancel a reserved payout
      description: |
        Cancels a payout that's still in `reserved` status — releases its
        source + (when present) sponsor reservations so the balance is
        immediately available to a subsequent plan.

        Once a broadcast has started (`topping-up`, `submitted`, or
        terminal states) the gateway can't recall the on-chain tx; the
        endpoint returns **409 PAYOUT_NOT_CANCELABLE**. The cancel is
        CAS-guarded against the executor: if the executor claims the row
        for broadcast between your read and the cancel, you get the same
        409 and the reservations stay with the in-flight broadcast.
        Idempotent on already-canceled rows (returns 200 with the existing
        canceled row).

        Does NOT currently emit a `payout.canceled` webhook event — the
        merchant sees the result via the 200 response. If you rely on
        webhooks, poll `GET /payouts/:id` after issuing cancel until
        status is terminal.
      responses:
        "200":
          description: Canceled (or idempotent re-cancel of an already-canceled row)
          content:
            application/json:
              schema:
                type: object
                required: [payout]
                properties:
                  payout: { $ref: "#/components/schemas/Payout" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: |
            `PAYOUT_NOT_FOUND` — nonexistent id, cross-merchant access,
            or an internal (non-`standard`) payout kind. Malformed
            (non-UUID) ids short-circuit before the lookup and return the
            same 404 status but with code `NOT_FOUND` (and no message) —
            switch on both codes. The gateway returns 404 rather than 403
            to avoid leaking payout ids across merchants.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: |
            `PAYOUT_NOT_CANCELABLE` — the payout is in any status other
            than `reserved` / `canceled` (`planned`, `topping-up`,
            `submitted`, `confirmed`, or `failed`), or the executor claimed
            the row for broadcast concurrently with the cancel attempt.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /checkout/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [checkout]
      summary: Public invoice snapshot (for checkout UIs)
      description: |
        Narrow, unauthenticated projection of an invoice — everything a
        hosted checkout page or bot needs to render "send N TOKEN to
        ADDRESS" plus a QR code. The invoice id (a high-entropy UUID) is
        the only credential; no API key is required.

        Deliberately narrower than the merchant view: `merchantId`,
        `externalId`, `metadata`, `webhookUrl`, tolerance/confirmation
        policy fields, and `updatedAt` are all excluded.

        Multi-family invoices: `receiveAddresses` carries one
        `{ family, address }` entry per accepted family (UTXO: one per
        chain) — render all of them so the payer picks their chain. Simple
        single-chain UIs can fall back to the top-level `receiveAddress` +
        `chainId`.

        USD-path invoices additionally expose `payableTokens`: one
        ready-to-render entry per (family, chainId, token) the deployment
        can actually settle, each with the minimum raw amount, a
        display-ready decimal amount, the pinned USD rate, and the address
        — the UI never needs to know token decimals or do rate math.
        `payableTokens` is `null` on legacy (non-USD) invoices.

        Rate limited per client IP (429 + `Retry-After`). Malformed
        (non-UUID) and unknown ids both return 404 — indistinguishable by
        design so bots can't probe the keyspace.
      security: []
      responses:
        "200":
          description: Invoice snapshot
          headers:
            X-Request-Id: { $ref: "#/components/headers/X-Request-Id" }
            X-RateLimit-Limit: { $ref: "#/components/headers/X-RateLimit-Limit" }
            X-RateLimit-Remaining: { $ref: "#/components/headers/X-RateLimit-Remaining" }
            X-RateLimit-Reset: { $ref: "#/components/headers/X-RateLimit-Reset" }
          content:
            application/json:
              schema:
                type: object
                required: [invoice]
                properties:
                  invoice: { $ref: "#/components/schemas/PublicInvoice" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /webhooks/alchemy:
    post:
      tags: [webhooks]
      summary: Ingest Alchemy Notify ADDRESS_ACTIVITY webhooks
      description: |
        Inbound push from Alchemy Notify. HMAC-SHA256 of the **raw request
        body** under the per-webhook signing key must match the
        `X-Alchemy-Signature` header (lowercase hex). The signing key is
        resolved by the payload's **top-level `webhookId`** from the
        encrypted-at-rest `alchemy_webhook_registry` table — populated by
        `POST /admin/bootstrap/alchemy-webhooks`, or manually via
        `POST /admin/alchemy-webhooks/signing-keys` for dashboard-created
        webhooks. There is no env-var fallback key.

        Request-processing order (useful when debugging a non-200):

        1. **413** when the body exceeds 64 KB (checked against
           `Content-Length` first, then against the decoded body's
           CHARACTER length — a multi-byte UTF-8 body can therefore
           slightly exceed the cap in raw bytes when `Content-Length` is
           absent or wrong).
        2. **401** when `X-Alchemy-Signature` is missing.
        3. **400 `BAD_JSON`** when the body doesn't parse. This happens
           BEFORE signature verification — `webhookId` must be extracted
           to resolve the signing key — so unauthenticated callers can
           reach it (safe because the body size is already bounded).
        4. Replay defenses, also pre-verification: `createdAt` older than
           10 minutes → **401 `STALE_PAYLOAD`**; a payload `id` already
           seen within 24 h short-circuits to
           **200 `{ received: true, deduped: true }`** without
           reprocessing. Payloads lacking `createdAt` / `id` skip the
           corresponding check.
        5. **404 `NOT_CONFIGURED`** when no registry row matches
           `webhookId` (or its stored key can't be decrypted after a
           `SECRETS_ENCRYPTION_KEY` rotation) — deliberately identical to
           the strategy-not-wired 404 so operators see "not set up"
           consistently.
        6. **401** when the HMAC doesn't match. Failure responses never
           explain WHY verification failed — a blanket 401 denies
           attackers a probing oracle.

        On success the route ACKs **200 immediately** and does the real
        work in the background (Alchemy retries ~5 times over a few
        minutes on non-2xx; slow DB writes must not burn that budget).
        Only `type: "ADDRESS_ACTIVITY"` payloads produce transfers —
        anything else verifies and 200s but is dropped, as are unknown
        `event.network` values. EVM chains use the flat `event.activity[]`
        shape (categories `token` / `external` / `internal`; ERC-721/1155
        ignored; sub-cent stablecoin transfers dust-filtered as
        address-poisoning spam; unknown token contracts skipped). Solana
        uses `event.transaction[]` (Alchemy's protobuf-JSON serialization:
        nested `transaction` / `message` / `meta` arrive as 1-element
        arrays; both snake_case and camelCase field variants are
        accepted). Transfers detected by both push and poll dedupe
        downstream on the UNIQUE `(chain_id, tx_hash, log_index)`
        constraint.

        Rate limited per client IP — default 300/min
        (`RATE_LIMIT_WEBHOOK_INGEST_PER_MINUTE`).
      security:
        - AlchemySignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: |
                Alchemy Notify envelope. Only the fields below are read;
                unknown fields are ignored (forward-compatible with
                payload schema additions).
              properties:
                webhookId:
                  type: string
                  description: |
                    Alchemy webhook id (`wh_...`), top level — NOT under
                    `event`. Resolves the HMAC signing key from the
                    registry; without a matching registry row the route
                    answers 404.
                id:
                  type: string
                  description: |
                    Unique event id (`whevt_...`). Replay nonce — the
                    first POST CLAIMS the id even if that POST then fails
                    signature verification or registry resolution; any
                    repeat within 24 h returns `deduped: true` without
                    processing. Operational consequence: a delivery that
                    401/404s (e.g. before its signing key was registered)
                    still burns its id, so a later retry carrying the same
                    id is dropped as a dedup rather than processed.
                createdAt:
                  type: string
                  format: date-time
                  description: |
                    Event creation time. More than 10 minutes in the past
                    → 401 `STALE_PAYLOAD`.
                type:
                  type: string
                  description: Only `ADDRESS_ACTIVITY` produces transfers.
                event:
                  type: object
                  properties:
                    network:
                      type: string
                      description: |
                        Alchemy network tag (`ETH_MAINNET`,
                        `MATIC_MAINNET`, `SOLANA_MAINNET`, ...). Unknown
                        values are silently dropped.
                    activity:
                      type: array
                      description: |
                        EVM payload shape — one entry per transfer
                        touching a watched address.
                      items:
                        type: object
                        properties:
                          fromAddress: { type: string }
                          toAddress: { type: string }
                          blockNum:
                            type: string
                            description: Hex block number (`0x1234567`).
                          hash: { type: string }
                          category:
                            type: string
                            description: |
                              `token` = ERC-20 (requires a registry-known
                              `rawContract.address`); `external` /
                              `internal` = native transfers. Other values
                              (`erc721`, `erc1155`, ...) are ignored.
                          rawContract:
                            type: object
                            properties:
                              rawValue:
                                type: string
                                description: Hex amount in base units.
                              address:
                                type: [string, "null"]
                                description: Token contract; null for native.
                              decimals: { type: integer }
                          log:
                            type: object
                            properties:
                              logIndex:
                                type: string
                                description: |
                                  Hex log index — becomes the transfer's
                                  dedup discriminator.
                    transaction:
                      type: array
                      description: |
                        Solana payload shape — one full tx object per
                        on-chain tx a watched address appeared in. Native
                        SOL credits are derived from `meta.pre_balances` /
                        `post_balances` deltas, SPL credits from
                        `meta.pre_token_balances` / `post_token_balances`
                        per (owner, mint) against the token registry.
                      items: { type: object }
                    slot:
                      type: integer
                      description: Solana slot (block-height analog).
      responses:
        "200":
          description: |
            Acknowledged — ingest happens in the background, so 200 does
            NOT mean a transfer was credited (unwatched addresses, unknown
            tokens, dust, and non-ADDRESS_ACTIVITY types all still 200).
            `deduped: true` marks a replayed payload `id` that was skipped.
          content:
            application/json:
              schema:
                type: object
                required: [received]
                properties:
                  received: { type: boolean, const: true }
                  deduped:
                    type: boolean
                    description: Present (true) only on replayed payload ids.
        "400":
          description: |
            `BAD_JSON` — body is not valid JSON. Returned BEFORE signature
            verification (`webhookId` is needed to resolve the signing
            key).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: |
            `UNAUTHORIZED` (`X-Alchemy-Signature` missing, or HMAC
            mismatch) or `STALE_PAYLOAD` (`createdAt` beyond the 10-minute
            replay window). Deliberately no further detail.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: |
            `NOT_CONFIGURED` — Alchemy ingest not enabled on this
            deployment, OR no signing key registered for the payload's
            `webhookId` (or its ciphertext no longer decrypts). Register
            keys via `POST /admin/alchemy-webhooks/signing-keys`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "413":
          description: |
            `PAYLOAD_TOO_LARGE` — body exceeds the 64 KB cap.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/merchants:
    get:
      tags: [admin]
      summary: List merchants
      description: |
        Paginated listing, newest first (`createdAt` descending). Never leaks
        `api_key_hash` or `webhook_secret_ciphertext`. Use `?active=true|false`
        to scope to live or deactivated rows.

        Out-of-range paging values are clamped rather than rejected (`limit`
        into 1..500, `offset` floored at 0) and the effective values are
        echoed in the response. There is no `hasMore` flag — page until fewer
        than `limit` rows come back.
      security:
        - AdminKey: []
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500, default: 50 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0, default: 0 }
        - in: query
          name: active
          description: Must be exactly `true` or `false` when present; anything else is rejected with code `BAD_ACTIVE`.
          schema: { type: string, enum: ["true", "false"] }
      responses:
        "200":
          description: Merchants page
          content:
            application/json:
              schema:
                type: object
                required: [merchants, limit, offset]
                properties:
                  merchants:
                    type: array
                    items: { $ref: "#/components/schemas/Merchant" }
                  limit: { type: integer, description: Effective (clamped) page size }
                  offset: { type: integer, description: Effective (floored) offset }
        "400":
          description: "`active` was neither `true` nor `false` (code `BAD_ACTIVE`)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/AdminNotConfigured" }
        "429": { $ref: "#/components/responses/RateLimited" }
    post:
      tags: [admin]
      summary: Create a merchant
      description: |
        Returns the plaintext API key ONCE in the response. Only the SHA-256
        hash is stored; the plaintext is unrecoverable afterward (recover a
        lost key via `POST /admin/merchants/{id}/rotate-key`).

        Webhook secret semantics: the plaintext `webhookSecret` is stored
        (encrypted at rest) and returned ONLY when `webhookUrl` is provided.
        A caller-supplied `webhookSecret` without a `webhookUrl` is silently
        discarded — set the URL later via `PATCH /admin/merchants/{id}` and a
        fresh secret is minted and returned once at that point.

        `webhookUrl` is SSRF-guarded: private / loopback / link-local /
        metadata hosts are rejected with code `INVALID_WEBHOOK_URL`. Plain
        `http:` is allowed only when `NODE_ENV` is `development` or `test`;
        every other environment requires `https:` and an external host.
      security:
        - AdminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, minLength: 1, maxLength: 128 }
                webhookUrl: { type: string, format: uri }
                webhookSecret:
                  type: string
                  description: Optional hex-encoded 32-byte HMAC signing secret. Generated if omitted. Discarded (not stored, not returned) unless `webhookUrl` is also set.
                  pattern: "^[0-9a-f]{64}$"
                paymentToleranceUnderBps:
                  type: integer
                  minimum: 0
                  maximum: 2000
                  default: 0
                  description: |
                    Default invoice under-payment tolerance in basis points.
                    A paid USD amount ≥ `amountUsd × (1 − bps/10_000)` closes
                    the invoice as `confirmed`. Example: `100` = 1 % — paying
                    99 USD on a 100 USD invoice still confirms.
                paymentToleranceOverBps:
                  type: integer
                  minimum: 0
                  maximum: 2000
                  default: 0
                  description: |
                    Default invoice over-payment tolerance in basis points.
                    A paid USD amount ≤ `amountUsd × (1 + bps/10_000)` closes
                    the invoice as `confirmed` (not `overpaid`). Example: `100`
                    = 1 % — paying 101 USD on a 100 USD invoice confirms.
                addressCooldownSeconds:
                  type: integer
                  minimum: 0
                  maximum: 604800
                  default: 0
                  description: |
                    Address-pool cooldown in seconds. After an invoice reaches a
                    terminal state, the pool address it held cannot be re-allocated
                    to a different invoice for this many seconds. Late payments
                    arriving during the cooldown still credit the original invoice
                    via the orphan + admin-attribute path. `0` (default) preserves
                    legacy immediate-reuse behavior. Capped at 7 days (604800s).
                confirmationThresholds:
                  type: object
                  propertyNames: { pattern: "^\\d+$" }
                  additionalProperties:
                    type: integer
                    minimum: 1
                    maximum: 10000
                  description: |
                    Per-chain confirmation override map (chainId-as-string keys →
                    positive integer block-counts; unknown chainIds are accepted).
                    Resolution order at invoice/payout create time: this map >
                    FINALITY_OVERRIDES env > per-chain gateway default (BTC=6,
                    ETH=12, Polygon=256, etc.). The resolved value is snapshotted
                    onto each invoice/payout at create time and frozen — merchant
                    edits don't reshape in-flight resources. Setting a value below
                    the chain's gateway default is allowed (merchant accepts the
                    reorg risk) and surfaces a `merchant_confirmation_below_default`
                    WARN log. Omit to use gateway defaults for every chain.
                  example:
                    "1": 24
                    "137": 8
                    "800": 12
                confirmationTiers:
                  type: object
                  propertyNames: { pattern: "^\\d+:[A-Z][A-Z0-9]*$" }
                  additionalProperties:
                    type: array
                    minItems: 1
                    maxItems: 20
                    items:
                      type: object
                      properties:
                        amount: { type: string, pattern: "^\\d+(\\.\\d+)?$" }
                        op: { type: string, enum: ["<", "<=", ">", ">=", "=", "<>"] }
                        confirmations: { type: integer, minimum: 1, maximum: 10000 }
                      required: [confirmations]
                  description: |
                    Per-(chain, token) amount-tiered confirmation rules. Keys are
                    `"{chainId}:{TOKEN}"` (e.g., `"1:USDC"`, `"800:BTC"`,
                    `"801:LTC"`). Each value is a list (1..20) of rules evaluated
                    in order against the transfer's amount (token-decimal precise
                    BigInt comparison). The first rule whose `amount` + `op`
                    predicate matches supplies the confirmation count; a rule with
                    BOTH `amount`/`op` omitted acts as a catch-all — providing
                    only one of the pair is a `VALIDATION` error. Operators: `<`,
                    `<=`, `>`, `>=`, `=`, `<>`. No matching rule → falls back to
                    flat `confirmationThresholds` then gateway default.
                    Snapshotted verbatim onto invoice/payout at create time and
                    frozen.
                  example:
                    "801:LTC":
                      - { amount: "3", op: "<", confirmations: 1 }
                      - { confirmations: 12 }
                    "1:USDC":
                      - { amount: "100", op: "<", confirmations: 6 }
                      - { amount: "1000", op: "<", confirmations: 12 }
                      - { confirmations: 24 }
      responses:
        "201":
          description: Merchant created
          content:
            application/json:
              schema:
                type: object
                required: [merchant, apiKey]
                properties:
                  merchant:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      name: { type: string }
                      webhookUrl: { type: [string, "null"] }
                      active: { type: boolean }
                      paymentToleranceUnderBps: { type: integer, minimum: 0, maximum: 2000 }
                      paymentToleranceOverBps: { type: integer, minimum: 0, maximum: 2000 }
                      addressCooldownSeconds: { type: integer, minimum: 0, maximum: 604800 }
                      confirmationThresholds:
                        type: [object, "null"]
                        additionalProperties:
                          type: integer
                      confirmationTiers:
                        type: [object, "null"]
                        additionalProperties:
                          type: array
                          items: { type: object }
                      createdAt: { type: string, format: date-time }
                  apiKey:
                    type: string
                    description: Plaintext API key. Shown once; store it immediately.
                    pattern: "^sk_[0-9a-f]{64}$"
                  webhookSecret:
                    type: string
                    description: Present only if `webhookUrl` was provided. Shown once.
                    pattern: "^[0-9a-f]{64}$"
        "400":
          description: |
            Malformed JSON (code `BAD_JSON`), SSRF-rejected webhook URL (code
            `INVALID_WEBHOOK_URL`), or schema violation (code `VALIDATION`
            with Zod issues in `details`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/AdminNotConfigured" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/merchants/{id}:
    get:
      tags: [admin]
      summary: Get a single merchant
      security:
        - AdminKey: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Merchant
          content:
            application/json:
              schema:
                type: object
                required: [merchant]
                properties:
                  merchant: { $ref: "#/components/schemas/Merchant" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: Merchant not found (code `MERCHANT_NOT_FOUND`) — or admin surface not enabled (code `NOT_CONFIGURED` when ADMIN_KEY is unset)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/RateLimited" }
    patch:
      tags: [admin]
      summary: Update a merchant
      description: |
        Mutates any combination of `name`, `webhookUrl`, the tolerance /
        cooldown defaults, and the confirmation override maps. `active` has
        its own endpoints (`/deactivate`, `/activate`); the API key rotates
        via `/rotate-key`; the webhook secret rotates via
        `/rotate-webhook-secret`.

        Special first-time `webhookUrl` case: if the merchant was created
        without a webhook URL and this PATCH sets one, the gateway mints a
        fresh HMAC secret, stores it encrypted, and returns the plaintext in
        `webhookSecret` — same one-shot contract as the create endpoint.
        Subsequent URL changes do NOT rotate the secret (signed-HMAC contract
        stays stable; the merchant just receives on a different URL).
        `webhookUrl` cannot be cleared — `null` is rejected by validation;
        deactivate the merchant if deliveries must stop.

        `confirmationThresholds` / `confirmationTiers` are whole-attribute
        writes: pass an object to replace the entire map (partial-key merges
        aren't supported) or explicit `null` to clear the override back to
        gateway defaults. They are the only two fields that accept `null`.

        Tolerance changes apply to invoices created **after** the PATCH;
        existing invoices keep the snapshot they were issued with. Cooldown
        changes apply to releases that happen **after** the PATCH; already-
        stamped `cooldownUntil` deadlines are unaffected. Confirmation-map
        changes likewise only affect invoices/payouts created afterward.
      security:
        - AdminKey: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                name: { type: string, minLength: 1, maxLength: 128 }
                webhookUrl:
                  type: string
                  format: uri
                  description: SSRF-guarded like create (`INVALID_WEBHOOK_URL` on private/loopback/metadata hosts; `http:` only in development/test). Cannot be `null`.
                paymentToleranceUnderBps:
                  type: integer
                  minimum: 0
                  maximum: 2000
                paymentToleranceOverBps:
                  type: integer
                  minimum: 0
                  maximum: 2000
                addressCooldownSeconds:
                  type: integer
                  minimum: 0
                  maximum: 604800
                confirmationThresholds:
                  type: [object, "null"]
                  propertyNames: { pattern: "^\\d+$" }
                  additionalProperties:
                    type: integer
                    minimum: 1
                    maximum: 10000
                  description: |
                    Per-chain confirmation override map. Pass an object to
                    replace the merchant's current map whole-sale (partial-key
                    updates aren't supported); pass `null` to clear the
                    override and revert to gateway defaults for new invoices.
                    Already-issued invoices keep their snapshotted thresholds.
                    Values below the chain's gateway default are accepted and
                    WARN-logged (`merchant_confirmation_below_default`).
                  example:
                    "1": 24
                    "137": 8
                confirmationTiers:
                  type: [object, "null"]
                  propertyNames: { pattern: "^\\d+:[A-Z][A-Z0-9]*$" }
                  additionalProperties:
                    type: array
                    minItems: 1
                    maxItems: 20
                    items:
                      type: object
                      properties:
                        amount: { type: string, pattern: "^\\d+(\\.\\d+)?$" }
                        op: { type: string, enum: ["<", "<=", ">", ">=", "=", "<>"] }
                        confirmations: { type: integer, minimum: 1, maximum: 10000 }
                      required: [confirmations]
                  description: |
                    Per-(chain, token) amount-tiered confirmation rules.
                    Whole-sale replace (pass an object) or clear (`null`).
                    Keys: `"{chainId}:{TOKEN}"`. `amount` + `op` must be
                    provided together; only the trailing catch-all rule may
                    omit both. See POST `/admin/merchants` for full semantics.
                    New invoices/payouts snapshot the tier map at create time;
                    in-flight resources are unchanged.
                  example:
                    "801:LTC":
                      - { amount: "3", op: "<", confirmations: 1 }
                      - { confirmations: 12 }
      responses:
        "200":
          description: Merchant updated
          content:
            application/json:
              schema:
                type: object
                required: [merchant]
                properties:
                  merchant:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      name: { type: string }
                      webhookUrl: { type: [string, "null"] }
                      active: { type: boolean }
                      paymentToleranceUnderBps: { type: integer }
                      paymentToleranceOverBps: { type: integer }
                      addressCooldownSeconds: { type: integer }
                      confirmationThresholds:
                        type: [object, "null"]
                        additionalProperties: { type: integer }
                      confirmationTiers:
                        type: [object, "null"]
                        additionalProperties:
                          type: array
                          items: { type: object }
                      updatedAt: { type: string, format: date-time }
                  webhookSecret:
                    type: string
                    description: Plaintext webhook secret; present ONLY when this PATCH set a `webhookUrl` on a merchant that didn't previously have one. Shown once.
                    pattern: "^[0-9a-f]{64}$"
        "400":
          description: |
            Malformed JSON (code `BAD_JSON`), SSRF-rejected webhook URL (code
            `INVALID_WEBHOOK_URL`), or schema violation (code `VALIDATION` —
            including an empty PATCH body, which fails the ≥1-field rule).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: Merchant not found (code `MERCHANT_NOT_FOUND`) — or admin surface not enabled (code `NOT_CONFIGURED` when ADMIN_KEY is unset)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/merchants/{id}/rotate-key:
    post:
      tags: [admin]
      summary: Rotate a merchant's API key
      description: |
        Generates a fresh `sk_<hex>` plaintext and replaces the stored hash
        in one UPDATE. The returned `apiKey` is the one and only chance to
        capture it. The prior key is rejected on the next request (auth
        hashes inbound tokens and looks them up by hash). Webhook URL/secret
        are intentionally not rotated here — rotating those mid-flight would
        orphan pending outbox rows signed under the old secret.
      security:
        - AdminKey: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Key rotated; new plaintext returned once
          content:
            application/json:
              schema:
                type: object
                required: [merchant, apiKey]
                properties:
                  merchant:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      name: { type: string }
                      active: { type: boolean }
                      updatedAt: { type: string, format: date-time }
                  apiKey:
                    type: string
                    description: Plaintext API key. Shown once; store it immediately.
                    pattern: "^sk_[0-9a-f]{64}$"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: Merchant not found (code `MERCHANT_NOT_FOUND`) — or admin surface not enabled (code `NOT_CONFIGURED` when ADMIN_KEY is unset)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/merchants/{id}/rotate-webhook-secret:
    post:
      tags: [admin]
      summary: Rotate a merchant's webhook HMAC signing secret
      description: |
        Generates a fresh 32-byte hex plaintext, encrypts at rest, and
        returns the plaintext once so the operator can hand it to the
        merchant.

        **Coordinated-rotation caveat.** Outbox rows dispatched AFTER this
        call — including any queued before the rotation — are signed with
        the NEW secret (the dispatcher reads merchant state at send time).
        The merchant's verifier must hold the new secret when those arrive
        or they'll 401 and land in `webhook_deliveries.status='dead'`.
        Sequence it: announce → rotate → hand secret off → merchant updates.
        Failed retries can be replayed via
        `POST /admin/webhook-deliveries/{id}/replay` once the merchant
        confirms.

        Requires the merchant to have a `webhookUrl` configured (else 400,
        code `NO_WEBHOOK_URL`). For first-time webhook setup, set the URL via
        `PATCH /admin/merchants/{id}` instead — that flow mints a fresh
        secret automatically.
      security:
        - AdminKey: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Webhook secret rotated; new plaintext returned once
          content:
            application/json:
              schema:
                type: object
                required: [merchant, webhookSecret]
                properties:
                  merchant:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      name: { type: string }
                      webhookUrl: { type: string, format: uri }
                      active: { type: boolean }
                      updatedAt: { type: string, format: date-time }
                  webhookSecret:
                    type: string
                    description: Plaintext HMAC secret. Shown once; deliver to the merchant securely.
                    pattern: "^[0-9a-f]{64}$"
        "400":
          description: Merchant has no `webhookUrl` — nothing to sign for (code `NO_WEBHOOK_URL`)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: Merchant not found (code `MERCHANT_NOT_FOUND`) — or admin surface not enabled (code `NOT_CONFIGURED` when ADMIN_KEY is unset)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/merchants/{id}/deactivate:
    post:
      tags: [admin]
      summary: Deactivate a merchant
      description: |
        Sets `active=false`. Inbound API requests with the merchant's API
        key are rejected with 401 while inactive. Idempotent (deactivating
        an already-inactive merchant returns 200 with `active=false`).
        Deactivation does NOT invalidate the stored key hash — reactivation
        restores access with the same credential. Rotate the key first if
        deactivation is prompted by a credential leak.
      security:
        - AdminKey: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Merchant deactivated
          content:
            application/json:
              schema:
                type: object
                required: [merchant]
                properties:
                  merchant:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      name: { type: string }
                      active: { type: boolean }
                      updatedAt: { type: string, format: date-time }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: Merchant not found (code `MERCHANT_NOT_FOUND`) — or admin surface not enabled (code `NOT_CONFIGURED` when ADMIN_KEY is unset)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/merchants/{id}/activate:
    post:
      tags: [admin]
      summary: Reactivate a merchant
      description: Sets `active=true`. Idempotent. Restores access with the same (un-rotated) API key.
      security:
        - AdminKey: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Merchant activated
          content:
            application/json:
              schema:
                type: object
                required: [merchant]
                properties:
                  merchant:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      name: { type: string }
                      active: { type: boolean }
                      updatedAt: { type: string, format: date-time }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: Merchant not found (code `MERCHANT_NOT_FOUND`) — or admin surface not enabled (code `NOT_CONFIGURED` when ADMIN_KEY is unset)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/bootstrap/alchemy-webhooks:
    post:
      tags: [admin]
      summary: Idempotently create Alchemy webhooks for the configured chains
      description: |
        For each requested chainId, checks whether an Alchemy ADDRESS_ACTIVITY
        webhook already exists with the target URL + network (list-first, so
        re-runs never pile up duplicates); creates it if not. Returns
        per-chain status plus the `signingKey` for any newly created webhook.
        Requires `ALCHEMY_NOTIFY_TOKEN` env (the webhook-management "Auth
        Token" from the Alchemy dashboard, NOT the JSON-RPC API key) and
        `GATEWAY_PUBLIC_URL` env.

        The target webhook URL is NOT accepted in the body. It is always
        `GATEWAY_PUBLIC_URL` + the canonical path `/webhooks/alchemy` —
        env-only so a leaked ADMIN_KEY cannot redirect Alchemy's traffic to
        an arbitrary host.

        **Per-chain statuses** (see the `AlchemyBootstrapResult` schema):
        `created` rows carry `signingKey` + `persisted`; `existing` rows
        carry `webhookId` but never a `signingKey` (Alchemy only reveals it
        at create time — if an existing webhook's key was never persisted,
        rotate it in the dashboard and register via
        `POST /admin/alchemy-webhooks/signing-keys`); `unsupported` means
        Alchemy doesn't serve the chainId (Tron, Bitcoin/Litecoin, Monero);
        `failed` means the Alchemy API call threw (`error` has the message).
        Rows with `failed`/`unsupported` still return HTTP 200 — inspect
        `results`; only persistence failures escalate to 500.

        **Placeholder seeding.** Alchemy requires ≥1 watched address at
        creation. By default the gateway seeds a chain-family placeholder
        (EVM zero address / a deterministic inert Solana pubkey) and removes
        it from the watch list immediately post-create
        (`placeholderRemoved=true`) — watching the EVM zero address would
        flood the gateway with every ERC-20 mint/burn. Re-runs self-heal
        existing webhooks by removing a leftover placeholder. Addresses
        supplied via `seedAddressByChainId` are used as-is and are NOT
        removed (they stay watched).

        **Partial failure.** If any webhook was created in Alchemy but its
        registry row could not be persisted, the response is **500** with
        code `BOOTSTRAP_PARTIAL_FAILURE` and STILL carries the full
        `results` array — the `signingKey` in that body is the only copy;
        re-register it via `POST /admin/alchemy-webhooks/signing-keys`.

        Body is optional: an empty body is treated as `{}`; malformed JSON
        returns 400 `BAD_JSON` (typos never silently fall through to
        defaults).
      security:
        - AdminKey: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                chainIds:
                  type: array
                  items: { type: integer, minimum: 1 }
                  description: Defaults to the `ALCHEMY_CHAINS` env list, then the mainnet set `[1, 10, 137, 8453, 42161, 43114, 56]`.
                seedAddressByChainId:
                  type: object
                  additionalProperties: { type: string }
                  description: |
                    Per-chain initial watched address, keyed by chainId as a
                    string (non-numeric keys are ignored). Alchemy requires ≥1
                    address at create. Omit to use the family placeholder,
                    which is removed immediately post-create; operator-supplied
                    seeds are kept watched.
              description: |
                The target webhook URL is NOT accepted in the body. It is sourced from
                `GATEWAY_PUBLIC_URL` env (base origin) plus the canonical path
                `/webhooks/alchemy`. Env-only so a leaked ADMIN_KEY cannot be
                used to redirect Alchemy's traffic to an arbitrary host.
      responses:
        "200":
          description: Bootstrap complete and every created webhook's signing key persisted; per-chain status in body (`failed` / `unsupported` rows do not change the HTTP status)
          content:
            application/json:
              schema:
                type: object
                required: [results]
                properties:
                  results:
                    type: array
                    items: { $ref: "#/components/schemas/AlchemyBootstrapResult" }
        "400":
          description: |
            `ALCHEMY_NOTIFY_TOKEN` env missing (code `NOT_CONFIGURED`),
            `GATEWAY_PUBLIC_URL` env missing (code `MISSING_GATEWAY_PUBLIC_URL`),
            malformed JSON body (code `BAD_JSON`), or schema violation
            (code `VALIDATION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/AdminNotConfigured" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "500":
          description: |
            One or more webhooks were created in Alchemy but their registry
            rows could not be persisted (code `BOOTSTRAP_PARTIAL_FAILURE`).
            The body still carries the full `results` array — capture each
            orphaned row's `signingKey` (it is the ONLY copy; Alchemy never
            returns it again) and re-register via
            `POST /admin/alchemy-webhooks/signing-keys`. A generic `INTERNAL`
            500 without `results` is also possible if the Alchemy list call
            itself throws.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Error"
                  - type: object
                    properties:
                      results:
                        type: array
                        items: { $ref: "#/components/schemas/AlchemyBootstrapResult" }

  /admin/chains:
    get:
      tags: [admin]
      summary: Discovery — chains the gateway recognises and their bootstrap state
      description: |
        Read of the static chain registry, augmented with readiness flags per
        chain so the dashboard can decide what still needs bootstrapping in a
        single call:

        - `wired`             — a `ChainAdapter` for the chainId is loaded in `deps.chains`
        - `webhooksSupported` — chain *can* use Alchemy webhooks (the EVM +
          Solana networks Alchemy serves). False for Tron, UTXO (Bitcoin /
          Litecoin) and Monero chains — they are RPC-poll only and have no
          webhook concept. **Frontend should hide the "register webhook" CTA
          when this is false.**
        - `alchemyConfigured` — operator's `ALCHEMY_CHAINS` env actually
          includes this chainId. Independent of whether a webhook is registered.
        - `webhooks`          — a row exists in `alchemy_webhook_registry`.
          Only meaningful when `webhooksSupported=true`; false-and-irrelevant
          for RPC-poll chains.
        - `feeWallets`        — the chain's **family** has at least one
          address in the shared address pool (a candidate payout / gas source
          exists) and the chain has a loaded adapter. Family-scoped, not
          per-chain — one pool row for `evm` flips this on for every wired
          EVM chain. Always `false` for Monero chains (Monero uses its own
          subaddress allocator, never the shared pool) and for chains without
          a wired adapter.
        - `detection`         — `"alchemy"` when `webhooksSupported=true`, else
          `"rpc-poll"`. Pure derived field surfaced so the frontend doesn't
          have to know our chain-family taxonomy.
        - `bootstrapReady`    — convenience: chain is fully provisioned for
          payments + payouts. Formula adjusts for detection strategy:
          `wired && (!webhooksSupported || webhooks) && feeWallets`. So
          RPC-poll chains (Tron, UTXO) can be ready with just
          `wired+feeWallets`, while EVM/Solana also need `webhooks`.

        Response order is stable: static-registry order first, then any
        wired-but-unregistered chainIds appended at the end (defensive — a
        loaded adapter missing from the registry is a config bug, surfaced
        with fallback `slug: "chain-<id>"` / `displayName: "Chain <id>"`).

        The synthetic dev chain (chainId 999, slug `dev`) is **excluded** from
        this response — it's a test-harness chain only and operators should
        never attempt to register Alchemy webhooks or fee wallets for it.

        `confirmationsRequired` is the operator-level threshold
        (`FINALITY_OVERRIDES` env, falling back to the per-chain gateway
        default) — per-merchant `confirmationThresholds` overrides are NOT
        reflected here.

        Tokens come from the static `TOKEN_REGISTRY` — they are the same for
        every operator and never include any per-merchant overrides. The
        endpoint never returns secrets (signing keys, seeds, env values).
      security:
        - AdminKey: []
      parameters:
        - in: query
          name: family
          description: |
            Narrow to one family. Any other value is rejected with 400, code
            `BAD_FAMILY` (the error message currently enumerates only
            evm/tron/solana, but the full accepted set is this enum).
          schema: { type: string, enum: [evm, tron, solana, utxo, monero] }
        - in: query
          name: wired
          description: |
            `true` returns only chains with a loaded adapter; `false` returns
            registry-only entries; omit for both. Values other than the
            literal strings `true`/`false` are silently ignored (no filter).
          schema: { type: string, enum: ["true", "false"] }
      responses:
        "200":
          description: Chain inventory
          content:
            application/json:
              schema:
                type: object
                required: [chains]
                properties:
                  chains:
                    type: array
                    items:
                      type: object
                      required: [chainId, slug, family, displayName, wired, webhooksSupported, alchemyConfigured, webhooks, feeWallets, detection, bootstrapReady, confirmationsRequired, tokens]
                      properties:
                        chainId: { type: integer }
                        slug: { type: string, description: "Stable short id, e.g. 'ethereum' / 'tron-nile'. Falls back to 'chain-<id>' for wired chains missing from the static registry." }
                        family: { type: string, enum: [evm, tron, solana, utxo, monero] }
                        displayName: { type: string }
                        wired: { type: boolean, description: "True when a ChainAdapter for this chainId is loaded." }
                        webhooksSupported: { type: boolean, description: "True when this chain can use Alchemy Notify webhooks (EVM + Solana). False for RPC-poll chains (Tron, UTXO, Monero) — frontend should hide webhook CTAs." }
                        alchemyConfigured: { type: boolean, description: "True when operator's ALCHEMY_CHAINS env includes this chainId." }
                        webhooks: { type: boolean, description: "True when a row exists in alchemy_webhook_registry. Only meaningful if webhooksSupported is true." }
                        feeWallets: { type: boolean, description: "True when the chain's family has ≥1 address in the shared address pool AND the chain is wired. Family-scoped, not per-chain; always false for Monero chains (own subaddress allocator)." }
                        detection: { type: string, enum: [alchemy, rpc-poll], description: "Which detection strategy this chain uses. Pure derived field for frontend convenience." }
                        bootstrapReady: { type: boolean, description: "wired && (!webhooksSupported || webhooks) && feeWallets — webhook requirement is dropped for RPC-poll chains." }
                        confirmationsRequired:
                          type: integer
                          description: "Operator-level confirmation threshold (FINALITY_OVERRIDES env, else the per-chain gateway default); transactions promote to `confirmed` at this count. Per-merchant overrides are not reflected."
                        tokens:
                          type: array
                          items:
                            type: object
                            required: [symbol, decimals, isStable, displayName, contractAddress]
                            properties:
                              symbol: { type: string }
                              decimals: { type: integer }
                              isStable: { type: boolean }
                              displayName: { type: string }
                              contractAddress:
                                type: [string, "null"]
                                description: "Token contract / SPL mint address. Null for native assets (ETH, POL, BNB, AVAX, TRX, BTC, LTC, XMR, SOL, DEV)."
        "400":
          description: "`family` not one of the accepted values (code `BAD_FAMILY`)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/AdminNotConfigured" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/alchemy-webhooks:
    get:
      tags: [admin]
      summary: List Alchemy webhook registrations (one per chain)
      description: |
        Read-only view of `alchemy_webhook_registry`, sorted by `chainId`
        ascending. The dashboard uses this to decide which chains are already
        wired versus which still need bootstrapping via
        `POST /admin/bootstrap/alchemy-webhooks`.

        The signing key is **never** returned (it's encrypted at rest via
        `SECRETS_ENCRYPTION_KEY`). Operators who need to verify a key should
        rotate it with `POST /admin/alchemy-webhooks/signing-keys`.

        Out-of-range paging values are clamped rather than rejected (`limit`
        into 1..500, `offset` floored at 0). `hasMore` is derived by probing
        one row past the page.
      security:
        - AdminKey: []
      parameters:
        - in: query
          name: chainId
          description: Narrow to a single chain. Non-numeric values are rejected with code `BAD_CHAIN_ID`.
          schema: { type: integer }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        "200":
          description: Paginated list of registered webhooks
          content:
            application/json:
              schema:
                type: object
                required: [webhooks, limit, offset, hasMore]
                properties:
                  webhooks:
                    type: array
                    items:
                      type: object
                      required: [chainId, chain, webhookId, webhookUrl, createdAt, updatedAt]
                      properties:
                        chainId: { type: integer }
                        chain:
                          type: [string, "null"]
                          description: "Slug like 'ethereum' / 'polygon'; null when chainId is not in the static registry."
                        webhookId: { type: string }
                        webhookUrl: { type: string, format: uri }
                        createdAt: { type: string, format: date-time }
                        updatedAt: { type: string, format: date-time }
                  limit: { type: integer, description: Effective (clamped) page size }
                  offset: { type: integer }
                  hasMore: { type: boolean }
        "400":
          description: "`chainId` was not a number (code `BAD_CHAIN_ID`)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/AdminNotConfigured" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/alchemy-webhooks/signing-keys:
    post:
      tags: [admin]
      summary: Register an Alchemy webhook's signing key manually
      description: |
        For operators who created a webhook through the Alchemy dashboard UI
        (not via bootstrap) or who need to push a key back in after a
        bootstrap partial failure (`persisted=false` rows). Each field comes
        directly from Alchemy's create-webhook response. The signing key is
        encrypted via `SECRETS_ENCRYPTION_KEY` before being written to
        `alchemy_webhook_registry`. Re-running with the same chainId upserts
        — intended for rotation after a dashboard delete+recreate produces a
        new key.

        `webhookUrl` should match `GATEWAY_PUBLIC_URL` + `/webhooks/alchemy`
        in practice; it is stored for operator visibility (registry listing,
        debugging) and is not re-validated against env.
      security:
        - AdminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chainId, webhookId, signingKey, webhookUrl]
              properties:
                chainId: { type: integer, minimum: 1 }
                webhookId: { type: string, minLength: 1, maxLength: 128 }
                signingKey: { type: string, minLength: 1, maxLength: 256 }
                webhookUrl: { type: string, format: uri }
      responses:
        "201":
          description: Signing key persisted encrypted-at-rest
          content:
            application/json:
              schema:
                type: object
                required: [registered]
                properties:
                  registered:
                    type: object
                    required: [chainId, webhookId, webhookUrl]
                    properties:
                      chainId: { type: integer }
                      webhookId: { type: string }
                      webhookUrl: { type: string, format: uri }
        "400":
          description: Malformed JSON (code `BAD_JSON`) or schema violation (code `VALIDATION` with Zod issues in `details`)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/AdminNotConfigured" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/pool/initialize:
    post:
      tags: [admin]
      summary: Seed or top up the shared address pool per family
      description: |
        Idempotent top-up: each requested family is brought up to
        `initialSize` rows. Families already at or above the target return
        `already-sufficient` with zero additions; families without a wired
        chain adapter in the deployment return `skipped-no-adapter`. Safe to
        call repeatedly — this is also the recovery path when the pool
        exhausts in production (`POOL_EXHAUSTED` on a live invoice-create).

        Family notes:
          - `evm`, `tron`, `solana` are the account-model families the
            shared pool exists for.
          - `utxo` is accepted by validation and, when a UTXO adapter is
            wired, DOES insert `address_pool` rows — but the invoice flow
            never allocates UTXO addresses from the shared pool (Bitcoin /
            Litecoin invoices derive a fresh per-invoice address via
            `address_index_counters` for privacy). Leave it out.
          - `monero` is accepted by validation but always fails with 500:
            the Monero adapter deliberately does not implement generic HD
            derivation (the gateway is view-key-only for XMR). Use
            `POST /admin/monero-pool/initialize` instead.

        `added` can come back lower than requested (even 0 on a `topped-up`
        outcome) when a concurrent refill held the per-family refill lock —
        re-check `GET /admin/pool/stats` and re-run if needed. Every newly
        inserted row emits `pool.address.created` so the Alchemy
        subscription tracker registers it for detection.
      security:
        - AdminKey: []
      requestBody:
        required: false
        description: Empty or absent body permitted; every field has a default. Unknown fields are ignored (schema is non-strict), but malformed JSON returns `BAD_JSON`.
        content:
          application/json:
            schema:
              type: object
              properties:
                families:
                  type: array
                  minItems: 1
                  items: { type: string, enum: [evm, tron, solana, utxo, monero] }
                  default: [evm, tron, solana]
                  description: |
                    Families to seed. See the family notes above — in
                    practice send only `evm`, `tron`, `solana`.
                initialSize:
                  type: integer
                  minimum: 1
                  maximum: 500
                  default: 5
                  description: Target pool size per family AFTER the call (a floor, not an increment).
      responses:
        "200":
          description: Initialization outcome per requested family, in request order
          content:
            application/json:
              schema:
                type: object
                required: [results]
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      required: [family, outcome, priorCount, added]
                      properties:
                        family: { type: string, enum: [evm, tron, solana, utxo, monero] }
                        outcome:
                          type: string
                          enum: [topped-up, already-sufficient, skipped-no-adapter]
                        priorCount:
                          type: integer
                          description: Rows the family pool held before this call (0 for skipped-no-adapter).
                        added:
                          type: integer
                          description: Rows actually inserted by this call.
        "400":
          description: Malformed JSON body (`BAD_JSON`), or invalid `families` / `initialSize` (`VALIDATION`, details = Zod issues)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/AdminNotConfigured" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "500":
          description: "`INTERNAL` — e.g. `families` included `monero`, or HD derivation failed (`MASTER_SEED` unset)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /admin/pool/stats:
    get:
      tags: [admin]
      summary: Per-family pool utilization snapshot
      description: |
        One array entry per chain family that has at least one
        `address_pool` row (families with an empty pool are absent), sorted
        by family name. Operators watch this + an alert on `available`
        under a threshold to catch "address supply running low" before
        `POOL_EXHAUSTED` fires on a live invoice-create.

        `quarantined` counts parked rows — operator-disabled addresses (see
        `POST /admin/pool/addresses/disable`) — which the allocator only
        borrows back under pool-exhaustion pressure. `highestIndex` is the
        highest HD `address_index` ever derived for the family; it grows
        monotonically and is never reused.

        Monero is NOT included here — its subaddress pool lives in a
        separate table. Use `GET /admin/monero-pool/stats`.
      security:
        - AdminKey: []
      responses:
        "200":
          description: Pool statistics, one entry per family present in the pool
          content:
            application/json:
              schema:
                type: object
                required: [stats]
                properties:
                  stats:
                    type: array
                    items:
                      type: object
                      required: [family, available, allocated, quarantined, total, highestIndex]
                      properties:
                        family: { type: string, enum: [evm, tron, solana, utxo] }
                        available:
                          type: integer
                          description: Rows ready to allocate. Includes rows still inside a release cooldown (the allocator skips those until it lapses).
                        allocated: { type: integer }
                        quarantined:
                          type: integer
                          description: Operator-parked (disabled) rows.
                        total: { type: integer }
                        highestIndex:
                          type: [integer, "null"]
                          description: Highest HD address_index derived for this family.
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/AdminNotConfigured" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/pool/addresses:
    get:
      tags: [admin]
      summary: List pool addresses with allocation/disable state
      description: |
        Paginated list of individual pool addresses so an operator can SEE
        the pool before deciding what to disable. Filter by `family` and/or
        `status` (AND-combined). Rows are ordered by `(family,
        addressIndex)` ascending for stable paging; `total` counts the full
        filtered set across all pages. Cross-reference
        `GET /admin/balances?kind=pool` to see which addresses hold funds —
        empty + `available` rows are the safe ones to park.

        `status=quarantined` rows are operator-parked (disabled) addresses;
        `disabledAt` says when. Unknown query parameter NAMES are ignored;
        invalid VALUES are rejected with 400. Monero subaddresses never
        appear here (they live in the separate Monero subaddress pool —
        `family=monero` is accepted but always yields an empty page).
      security:
        - AdminKey: []
      parameters:
        - in: query
          name: family
          required: false
          schema: { type: string, enum: [evm, tron, solana, utxo, monero] }
        - in: query
          name: status
          required: false
          schema: { type: string, enum: [available, allocated, quarantined] }
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
        - in: query
          name: offset
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        "200":
          description: Pool addresses page
          content:
            application/json:
              schema:
                type: object
                required: [addresses, total, limit, offset]
                properties:
                  addresses:
                    type: array
                    items: { $ref: "#/components/schemas/PoolAddressAdminView" }
                  total:
                    type: integer
                    description: Rows matching the filters across ALL pages.
                  limit: { type: integer }
                  offset: { type: integer }
        "400":
          description: Invalid `family` / `status` / `limit` / `offset` value (`VALIDATION`, details = Zod issues)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/AdminNotConfigured" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/pool/addresses/disable:
    post:
      tags: [admin]
      summary: Disable (park) a pool address
      description: |
        Pull a pool address out of normal allocation to keep the active
        address set small (cheaper detection, less stranded dust, fewer
        addresses cycling). A SOFT preference: when the family pool is
        otherwise exhausted the allocator BORROWS a parked address back into
        rotation rather than failing invoice creation, then re-parks it on
        release — the pool self-balances without manual intervention.

        Semantics by current status:
          - `available` row → parks immediately (`status` becomes
            `quarantined`, `disabledAt` stamped).
          - `allocated` row → keeps serving its current invoice (response
            shows `status: allocated` with `disabledAt` set), then re-parks
            as `quarantined` on release instead of returning to rotation.
          - Idempotent: re-disabling preserves the original `disabledAt`.

        Always safe by construction — a parked address stays in the pool,
        is still swept by consolidation, and late payments follow the usual
        cooldown/orphan path; account-model keys are HD-derived so funds
        remain recoverable. There is no on-chain "destroy" for EVM/Tron
        EOAs — this is DB-level only.

        The address is canonicalized through the family adapter before the
        lookup (EVM input is case-insensitive; Tron base58 and Solana
        base58 are case-sensitive). The body is strict — unknown fields are
        rejected with 400 `VALIDATION`.
      security:
        - AdminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [family, address]
              additionalProperties: false
              properties:
                family:
                  type: string
                  enum: [evm, tron, solana, utxo, monero]
                  description: |
                    Family pool the address belongs to. `monero` passes
                    validation but always 404s — Monero subaddresses live
                    in their own pool, not `address_pool`.
                address: { type: string, minLength: 1, maxLength: 128 }
      responses:
        "200":
          description: The updated pool address (post-disable state)
          content:
            application/json:
              schema:
                type: object
                required: [address]
                properties:
                  address: { $ref: "#/components/schemas/PoolAddressAdminView" }
        "400":
          description: Malformed JSON (`BAD_JSON`), or missing/unknown body fields (`VALIDATION`)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: "`ADDRESS_NOT_FOUND` — address not in the family pool, or the family has no wired chain adapter to canonicalize against — or admin surface not enabled (code `NOT_CONFIGURED` when ADMIN_KEY is unset)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "500":
          description: "`INTERNAL` — the address failed the family adapter's canonicalization (malformed hex / base58)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /admin/pool/addresses/enable:
    post:
      tags: [admin]
      summary: Re-enable a disabled pool address
      description: |
        Clears the disable intent (`disabledAt` → null) and un-parks an
        idle row (`quarantined` → `available`). A currently-`allocated` row
        keeps serving its invoice and simply releases back to `available`
        as normal now that the disable flag is gone. Idempotent. Mirrors
        `POST /admin/pool/addresses/disable`, including address
        canonicalization and the strict two-field body.
      security:
        - AdminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [family, address]
              additionalProperties: false
              properties:
                family:
                  type: string
                  enum: [evm, tron, solana, utxo, monero]
                  description: |
                    Family pool the address belongs to. `monero` passes
                    validation but always 404s (separate Monero pool).
                address: { type: string, minLength: 1, maxLength: 128 }
      responses:
        "200":
          description: The updated pool address (post-enable state)
          content:
            application/json:
              schema:
                type: object
                required: [address]
                properties:
                  address: { $ref: "#/components/schemas/PoolAddressAdminView" }
        "400":
          description: Malformed JSON (`BAD_JSON`), or missing/unknown body fields (`VALIDATION`)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: "`ADDRESS_NOT_FOUND` — address not in the family pool, or the family has no wired chain adapter to canonicalize against — or admin surface not enabled (code `NOT_CONFIGURED` when ADMIN_KEY is unset)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "500":
          description: "`INTERNAL` — the address failed the family adapter's canonicalization (malformed hex / base58)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /admin/pool/addresses/disabled:
    get:
      tags: [admin]
      summary: List disabled (parked / borrowed) pool addresses
      description: |
        Every pool address with a disable intent (`disabledAt` set),
        optionally filtered by `family`, ordered by `(family,
        addressIndex)` ascending. Includes rows currently parked
        (`status=quarantined`) AND rows the allocator borrowed back under
        pool-exhaustion pressure (`status=allocated` with `disabledAt`
        still set — they re-park on release). Not paginated — the disabled
        set is expected to stay small.
      security:
        - AdminKey: []
      parameters:
        - in: query
          name: family
          required: false
          schema: { type: string, enum: [evm, tron, solana, utxo, monero] }
      responses:
        "200":
          description: Disabled pool addresses
          content:
            application/json:
              schema:
                type: object
                required: [addresses]
                properties:
                  addresses:
                    type: array
                    items: { $ref: "#/components/schemas/PoolAddressAdminView" }
        "400":
          description: Invalid `family` value (`VALIDATION`)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/AdminNotConfigured" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/pool/consolidate:
    post:
      tags: [admin]
      summary: Defragment a token balance across pool addresses into one target
      description: |
        Account-model chains (EVM, Tron, Solana) pick a single sender per
        payout — they don't coin-select like UTXO. So when a token's balance
        is split across many pool addresses, no single address may hold
        enough to fund a large payout even though the AGGREGATE balance
        does. This endpoint plans one internal sweep tx per source-with-
        balance, sending each address's sweepable balance to a designated
        target. After the legs confirm, a regular `POST /payouts` from
        that target succeeds.

        Each leg is a `consolidation_sweep` payout under the sentinel
        system merchant; legs share a `batchId` (the returned
        `consolidationId`) and ride the regular executor cron through
        top-up → broadcast → confirmation. They're filtered out of
        merchant-facing list endpoints — operators poll
        `GET /admin/pool/consolidations/{id}` to track completion.

        Response status is **202 Accepted**: legs are reserved/topping-up
        but full confirmation happens asynchronously. Each leg may need a
        gas sponsor (a pool address with native, or the registered fee
        wallet on Tron). Sources whose leg couldn't be planned (no
        sponsor available) appear in `skipped[]` with a reason — the
        operation succeeds for the legs that COULD be planned, and `legs`
        can even come back EMPTY (still 202) with every source skipped.
        Re-run after funding sponsors to pick up the rest.

        Dust floors: the optional static `minSourceBalanceRaw` silently
        drops sources below it. Independently, when the operator sets the
        `CONSOLIDATION_DUST_GAS_MULTIPLIER` env knob (> 0, off by
        default), a gas-aware dynamic floor (≈ multiplier × per-sweep gas
        cost converted to token units via the price oracle; doubled for
        token sweeps that also need a native top-up tx) applies on top;
        sources that clear the static floor but not the dynamic one show
        up in `skipped[]` with a `BELOW_DYNAMIC_DUST_FLOOR` reason instead
        of being swept at a loss.

        Consolidating the chain's NATIVE token behaves specially: each
        source retains a buffer (2× the quoted sweep gas + the chain's
        minimum native reserve) because the source itself pays for its
        broadcast, and the gas quote is REQUIRED — a failed quote rejects
        the whole call with `INVALID_CHAIN`.

        The body is strict: unknown fields are rejected with 400
        `VALIDATION`.
      security:
        - AdminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chainId, token, targetAddress]
              additionalProperties: false
              properties:
                chainId:
                  type: integer
                  minimum: 1
                  description: Chain whose pool addresses hold fragmented `token` balances.
                token:
                  type: string
                  minLength: 1
                  maxLength: 16
                  pattern: "^[A-Z0-9]+$"
                  description: |
                    Token symbol (uppercase, must be registered on `chainId`).
                    Use the chain's native symbol to consolidate native — note
                    that native consolidation still requires each source to
                    retain enough for its own gas + minimum reserve.
                targetAddress:
                  type: string
                  minLength: 1
                  maxLength: 128
                  description: |
                    Pool address that receives every consolidated balance.
                    MUST exist in `address_pool` for the chain's family;
                    consolidating to a non-pool address is rejected (the
                    target must be addressable by the gateway's signer for
                    later payouts).
                minSourceBalanceRaw:
                  type: string
                  pattern: "^\\d+$"
                  description: |
                    Optional static per-source dust floor, decimal string in
                    the token's smallest unit (e.g. "10000000" = 10 USDT at
                    6 decimals). Sources whose spendable balance is below it
                    are dropped silently. Omit (or pass any floor >= "1") to
                    sweep every non-zero source. Passing "0" is NOT the same
                    as omitting: it lowers the floor to zero, so zero-balance
                    pool addresses also qualify and produce zero-amount legs
                    that land in `skipped[]` with a planner error. The
                    auto-consolidation cron passes each schedule's configured
                    floor through this same field.
                maxSources:
                  type: integer
                  minimum: 1
                  maximum: 200
                  description: |
                    Optional cap on legs planned in this single call. When
                    more sources qualify, they're sorted by address before
                    truncation — deterministic, so a re-run resumes exactly
                    where the previous call left off. Omit for no cap.
      responses:
        "202":
          description: |
            Consolidation planned. Legs are inserted in `reserved` (or
            `topping-up` when a sponsor is needed); the executor advances
            them asynchronously.
          content:
            application/json:
              schema:
                type: object
                required: [consolidationId, chainId, token, targetAddress, legs, skipped]
                properties:
                  consolidationId:
                    type: string
                    format: uuid
                    description: |
                      Group identifier shared across legs (stored as
                      `batchId` on each row). Use this to poll group status.
                  chainId: { type: integer }
                  token: { type: string }
                  targetAddress: { type: string }
                  legs:
                    type: array
                    description: Sources that were successfully planned + reserved. Can be empty when every source was skipped.
                    items:
                      type: object
                      required: [payoutId, sourceAddress, amountRaw]
                      properties:
                        payoutId: { type: string, format: uuid }
                        sourceAddress: { type: string }
                        amountRaw:
                          type: string
                          description: Balance being swept from this source (smallest unit). For native consolidation this is the balance MINUS the retained gas buffer.
                  skipped:
                    type: array
                    description: |
                      Sources with a token balance that were NOT swept.
                      Two flavors:
                        - couldn't be planned — most often
                          `NO_GAS_SPONSOR_AVAILABLE` (the registered fee
                          wallet ran dry, or no pool address has enough
                          native to top up this source). Fund a sponsor and
                          re-run.
                        - deliberately left — `BELOW_DYNAMIC_DUST_FLOOR`
                          when the gas-aware dust floor decided the balance
                          isn't worth the sweep gas (only when
                          `CONSOLIDATION_DUST_GAS_MULTIPLIER` is set).
                    items:
                      type: object
                      required: [sourceAddress, amountRaw, reason]
                      properties:
                        sourceAddress: { type: string }
                        amountRaw: { type: string }
                        reason:
                          type: string
                          description: |
                            Underlying error code + message from the per-leg
                            planner (e.g. `NO_GAS_SPONSOR_AVAILABLE: ...`),
                            or the `BELOW_DYNAMIC_DUST_FLOOR: ...` marker,
                            or the deepest SQLite diagnostic on a DB-level
                            failure.
        "400":
          description: |
            Validation failure or operator-actionable rejection. Codes:
              - `BAD_JSON` — malformed body
              - `VALIDATION` — missing/mistyped/unknown fields (body is strict)
              - `INVALID_CHAIN` — no chain adapter wired for `chainId`, or
                the required gas quote failed on a NATIVE consolidation
              - `INVALID_TOKEN` — `token` not registered on `chainId`
              - `TARGET_NOT_IN_POOL` — `targetAddress` isn't in the family pool
              - `NO_SOURCES_WITH_BALANCE` — no pool address (other than the
                target) clears the effective dust floor
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/AdminNotConfigured" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/pool/consolidations/{id}:
    get:
      tags: [admin]
      summary: Status of a previously-planned consolidation
      description: |
        Returns per-leg status plus a summary roll-up. Operators poll until
        `summary.pendingOrInFlight === 0` before kicking off the actual
        merchant payout from the target address.

        Legs are the `consolidation_sweep` payout rows sharing
        `batchId = consolidationId`; the same data is queryable via
        `GET /admin/payouts?batchId=<id>`, but this view is shaped
        specifically for the consolidation flow. Auto-consolidation runs
        (see `/admin/consolidation-schedules`) are polled the same way —
        pass the schedule's `lastConsolidationId`.
      security:
        - AdminKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
          description: The `consolidationId` returned from POST /admin/pool/consolidate (or a schedule's `lastConsolidationId`).
      responses:
        "200":
          description: Per-leg status + roll-up summary
          content:
            application/json:
              schema:
                type: object
                required: [consolidationId, legs, summary]
                properties:
                  consolidationId: { type: string, format: uuid }
                  legs:
                    type: array
                    items:
                      type: object
                      required: [payoutId, sourceAddress, amountRaw, status, txHash, topUpTxHash, lastError]
                      properties:
                        payoutId: { type: string, format: uuid }
                        sourceAddress: { type: string }
                        amountRaw: { type: string }
                        status:
                          type: string
                          enum: [planned, reserved, topping-up, submitted, confirmed, failed, canceled]
                        txHash:
                          type: [string, "null"]
                          description: Main sweep transaction hash; null until broadcast.
                        topUpTxHash:
                          type: [string, "null"]
                          description: Gas top-up transaction hash when the leg needed a sponsor; null otherwise.
                        lastError:
                          type: [string, "null"]
                  summary:
                    type: object
                    required: [total, pendingOrInFlight, confirmed, failed, canceled]
                    properties:
                      total: { type: integer }
                      pendingOrInFlight:
                        type: integer
                        description: |
                          Legs still in any pre-terminal state:
                          planned/reserved/topping-up/submitted. Poll until
                          this hits 0 (and `failed === 0`) before the next
                          merchant payout.
                      confirmed: { type: integer }
                      failed: { type: integer }
                      canceled: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: "`NOT_FOUND` — no consolidation exists with this id — or admin surface not enabled (code `NOT_CONFIGURED` when ADMIN_KEY is unset)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/consolidation-schedules:
    post:
      tags: [admin]
      summary: Create an auto-consolidation schedule
      description: |
        Configures the gateway to recurringly consolidate fragmented
        token balances on a (chainId, token) into one target pool address.
        The cron job `runAutoConsolidations` runs on every scheduled-jobs
        tick (~1 min on Workers); it atomically claims due schedules and
        calls the same `planPoolConsolidation` machinery the manual
        endpoint uses (passing `minSourceBalanceRaw` and
        `maxSourcesPerRun` through). A tick is skipped — deferred to the
        next interval — when the previous run's legs are still in flight,
        or when `maxFeeUsd` is set and the live low-tier fee exceeds it
        (or can't be quoted).

        **Per-source dust gate (`minSourceBalanceRaw`)** is the single
        most important parameter for cost control: any pool address
        holding LESS than this amount of `token` is silently skipped
        when the schedule fires. Set this above the per-tx gas cost in
        token units so you don't burn $0.50 in gas to consolidate $5 of
        dust. For example: USDT on Ethereum L1 with $0.50/tx → set
        `minSourceBalanceRaw` to ~50 USDT raw (`"50000000"` at 6 decimals).

        Returns 201 with the created schedule; the first fire happens one
        full interval later (`nextRunDue = now + intervalHours`). For an
        immediate sweep use `POST /admin/pool/consolidate`. Returns 409 if
        a schedule already exists for the (chainId, token) pair (PATCH the
        existing one instead). The body is strict — unknown fields are
        rejected with 400 `VALIDATION`.
      security:
        - AdminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chainId, token, targetAddress, intervalHours, minSourceBalanceRaw]
              additionalProperties: false
              properties:
                chainId: { type: integer, minimum: 1 }
                token:
                  type: string
                  minLength: 1
                  maxLength: 16
                  pattern: "^[A-Z0-9]+$"
                  description: Token symbol (uppercase, registered on `chainId`).
                targetAddress:
                  type: string
                  minLength: 1
                  maxLength: 128
                  description: |
                    Pool address that receives every consolidated balance.
                    MUST exist in `address_pool` for the chain's family.
                intervalHours:
                  type: integer
                  minimum: 1
                  maximum: 720
                  description: Hours between cron firings (1..720, max 30 days).
                minSourceBalanceRaw:
                  type: string
                  pattern: "^\\d+$"
                  description: |
                    Per-source-address dust floor in the token's smallest
                    unit (decimal string). Sources below this are silently
                    skipped at fire time so the cron doesn't burn gas on
                    addresses where consolidating costs more than the
                    recovered balance.
                maxFeeUsd:
                  type: string
                  pattern: "^\\d+(\\.\\d+)?$"
                  description: |
                    Optional gas ceiling as a USD decimal string (e.g. "5.00").
                    When set, the cron quotes the live low-tier network fee,
                    converts it to USD via the price oracle, and DEFERS the
                    firing (retrying next interval) when the fee exceeds this
                    ceiling — clustering internal sweeps into cheap-gas
                    windows. A FAILED quote also defers ("don't sweep
                    blind"). Omit for no ceiling (always run). Primarily an
                    EVM L1 tool; on Tron prefer energy delegation.
                maxSourcesPerRun:
                  type: integer
                  minimum: 1
                  maximum: 200
                  default: 25
                  description: |
                    Cap on legs planned per cron tick. Bounds per-tick CPU
                    + avoids broadcasting many simultaneous consolidations
                    that drive gas prices up. Remaining sources pick up
                    next tick.
                enabled:
                  type: boolean
                  default: true
                  description: Soft-disable flag. Cron skips disabled schedules entirely.
      responses:
        "201":
          description: Schedule created. `nextRunDue = now + intervalHours` (epoch ms).
          content:
            application/json:
              schema:
                type: object
                required: [schedule]
                properties:
                  schedule: { $ref: "#/components/schemas/AutoConsolidationSchedule" }
        "400":
          description: |
            Validation failure. Codes:
              - `BAD_JSON` — malformed body
              - `VALIDATION` — missing/mistyped/unknown fields (strict body)
              - `INVALID_CHAIN` — no chain adapter wired
              - `INVALID_TOKEN` — token not registered on chainId
              - `TARGET_NOT_IN_POOL` — targetAddress not in family pool
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/AdminNotConfigured" }
        "409":
          description: |
            `SCHEDULE_ALREADY_EXISTS` — a schedule for this (chainId, token)
            pair already exists. PATCH it to change settings.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/RateLimited" }
    get:
      tags: [admin]
      summary: List auto-consolidation schedules
      description: |
        Returns all schedules, newest first (`createdAt DESC`). Supports
        filtering by `chainId`, `token`, and `enabled` (AND-combined).

        Gotcha: the query schema is STRICT — an unknown or typo'd query
        parameter name is rejected with 400 `VALIDATION`, not ignored.
      security:
        - AdminKey: []
      parameters:
        - name: chainId
          in: query
          required: false
          schema: { type: integer, minimum: 1 }
        - name: token
          in: query
          required: false
          schema: { type: string, minLength: 1, maxLength: 32 }
        - name: enabled
          in: query
          required: false
          schema: { type: string, enum: ["true", "false"] }
      responses:
        "200":
          description: Schedule list (possibly empty)
          content:
            application/json:
              schema:
                type: object
                required: [schedules]
                properties:
                  schedules:
                    type: array
                    items: { $ref: "#/components/schemas/AutoConsolidationSchedule" }
        "400":
          description: "`VALIDATION` — invalid filter value, or an UNKNOWN query parameter (strict query schema)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/AdminNotConfigured" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/consolidation-schedules/{id}:
    get:
      tags: [admin]
      summary: Get one auto-consolidation schedule
      description: |
        Returns the schedule including the snapshot of the most recent
        cron firing (`lastRunAt`, `lastConsolidationId`, `lastLegCount`,
        `lastSkippedCount`, `lastSkippedReasons`) — all null until the
        cron has fired this schedule at least once. Use the
        `lastConsolidationId` with `GET /admin/pool/consolidations/{id}`
        to get full per-leg status of the most recent run.
      security:
        - AdminKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: The schedule
          content:
            application/json:
              schema:
                type: object
                required: [schedule]
                properties:
                  schedule: { $ref: "#/components/schemas/AutoConsolidationSchedule" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: "`SCHEDULE_NOT_FOUND` — no schedule with this id — or admin surface not enabled (code `NOT_CONFIGURED` when ADMIN_KEY is unset)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/RateLimited" }
    patch:
      tags: [admin]
      summary: Update an auto-consolidation schedule
      description: |
        Update one or more fields on an existing schedule. All fields are
        optional but at least one must be provided; unknown fields are
        rejected (strict body). `chainId`/`token` cannot be changed —
        delete and recreate for a different pair.

        Updating `intervalHours` recomputes `nextRunDue` from the existing
        baseline (`lastRunAt` if the schedule has fired, else `createdAt`)
        — so lowering the interval makes the next fire happen sooner and
        raising it defers, both intuitively, without arbitrarily resetting
        the cycle. Changing `targetAddress` re-validates pool membership
        against the schedule's chain family.
      security:
        - AdminKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              additionalProperties: false
              properties:
                targetAddress: { type: string, minLength: 1, maxLength: 128 }
                intervalHours:
                  type: integer
                  minimum: 1
                  maximum: 720
                minSourceBalanceRaw:
                  type: string
                  pattern: "^\\d+$"
                maxFeeUsd:
                  type: [string, "null"]
                  description: |
                    USD gas ceiling decimal string (e.g. "5.00"); pass
                    explicit `null` to clear it (back to "always run").
                    Absent = unchanged. See POST for semantics.
                maxSourcesPerRun:
                  type: integer
                  minimum: 1
                  maximum: 200
                enabled: { type: boolean }
      responses:
        "200":
          description: The updated schedule
          content:
            application/json:
              schema:
                type: object
                required: [schedule]
                properties:
                  schedule: { $ref: "#/components/schemas/AutoConsolidationSchedule" }
        "400":
          description: |
            Codes:
              - `BAD_JSON` — malformed body
              - `VALIDATION` — empty body, unknown field, or bad value
              - `TARGET_NOT_IN_POOL` — new `targetAddress` isn't in the family pool
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: "`SCHEDULE_NOT_FOUND` — no schedule with this id — or admin surface not enabled (code `NOT_CONFIGURED` when ADMIN_KEY is unset)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/RateLimited" }
    delete:
      tags: [admin]
      summary: Delete an auto-consolidation schedule
      description: |
        Removes the schedule entirely. Prefer PATCH `enabled: false` when
        you expect to re-enable later — that preserves the lastRun snapshot
        for forensic value. DELETE is for "this schedule is wrong, start
        over". In-flight `consolidation_sweep` legs from earlier firings
        are unaffected — they finish under the executor as usual.
      security:
        - AdminKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted: { type: boolean, enum: [true] }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: "`SCHEDULE_NOT_FOUND` — no schedule with this id — or admin surface not enabled (code `NOT_CONFIGURED` when ADMIN_KEY is unset)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/webhook-deliveries:
    get:
      tags: [admin]
      summary: List webhook deliveries by status
      description: |
        Operator view of the outbox. Use `status=dead` (default) to surface
        deliveries that exhausted the retry schedule and need manual
        intervention (merchant-side fix, then POST the replay endpoint).
        `pending` shows rows still queued for retry; `delivered` shows
        successful deliveries (mostly useful for audit).

        ### Outbound event types (`eventType` field)

        Two scopes, distinct prefixes:
          - `invoice:payment_*` — per-transaction events (one fires per
            contributing on-chain tx)
          - `invoice:*` (no `payment_`) — whole-invoice lifecycle events
            (one fires when the invoice itself transitions)

        Per-transfer audit (key `{event}:{invoiceId}:{txHash}` — detect→confirm
        produces TWO distinct rows for the same tx):
          - `invoice:payment_detected` — first sighting of a pending
            transfer. `data.transactions[]` includes the tx with status
            `detected`.
          - `invoice:payment_confirmed` — same transfer reached the
            confirmation threshold. Fires for every contributing tx, even
            on partial-payment invoices that haven't completed yet — gives
            merchants per-payment running-total visibility.

        Whole-invoice lifecycle (key `{event}:{invoiceId}:{status}`,
        except `invoice:processing` which appends the extra-status slug):
          - `invoice:processing` — invoice flipped into the in-flight
            state: full amount detected but unconfirmed, a partial
            payment landed (`extraStatus='partial'`), or the partial
            flag cleared after a top-up. Key is
            `invoice:processing:{invoiceId}:processing:{extraStatus|none}`,
            so each distinct (status, extraStatus) flavor delivers
            exactly once — at most two deliveries per invoice (`partial`
            then `none`). A reorg cycle reuses the earlier key; the
            reorg itself is signaled by `invoice:demoted`.
          - `invoice:completed` — invoice transitioned to
            `status='completed'`. Overpaid invoices fire this same event
            with `data.invoice.extraStatus='overpaid'` on the snapshot —
            overpayment is a fidelity signal, not a separate stage.
          - `invoice:expired` — past `expiresAt` with no completion.
          - `invoice:canceled` — merchant aborted via admin route.
          - `invoice:demoted` — reorg un-confirmation; key includes
            `{previousStatus}:{newStatus}` instead of one status. Carries
            `previousStatus` and `poolReacquired` / `poolCollided` extras.

        Payload shape (every invoice event):
          ```jsonc
          {
            "event": "invoice:payment_confirmed",
            "timestamp": "2026-04-26T14:32:15.123Z",
            "data": {
              "invoice": { "status": "processing", "extraStatus": "partial", ... },
              "transactions": [
                {
                  "hash": "0x...", "chainId": 56, "chainName": "bsc",
                  "token": "USDT", "isNative": false,
                  "amount": "5.00", "amountRaw": "5000000000000000000",
                  "amountUsd": "5.00", "confirmations": 12,
                  "status": "confirmed"
                }
              ],
              "triggerTxHash": "0x..."  // null for status-only events
            }
          }
          ```

        Payout lifecycle (unchanged dot format for now):
          - `payout.submitted`, `payout.confirmed`, `payout.failed`

        URL/secret resolution: per-resource override → merchant default
        → silently skipped (with a `warn` log so operators can detect
        misconfiguration). Body is signed with HMAC-SHA256 in
        `X-Webhook-Signature`; merchants should de-dup on
        `X-Webhook-Idempotency-Key`. Each row gets up to 5 outer retry
        rounds × 4 inline HTTP attempts before going `dead`.
      security:
        - AdminKey: []
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [pending, delivered, dead], default: dead }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500, default: 50 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        "200":
          description: Page of delivery rows (newest first)
          content:
            application/json:
              schema:
                type: object
                properties:
                  deliveries:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        merchantId: { type: string }
                        eventType: { type: string }
                        idempotencyKey:
                          type: string
                          description: De-dup key; also sent to the merchant as `X-Webhook-Idempotency-Key`.
                        payload:
                          type: object
                          additionalProperties: true
                          description: Full JSON body the dispatcher POSTs to the merchant (see payload shape above).
                        targetUrl:
                          type: string
                          description: Destination URL snapshotted at enqueue time (per-resource override or merchant default).
                        resourceType:
                          type: [string, "null"]
                          enum: [invoice, payout, null]
                          description: Entity the event is about. Null on rows created before per-resource webhooks shipped (those fall back to merchant-only lookup on retry).
                        resourceId: { type: [string, "null"] }
                        status: { type: string, enum: [pending, delivered, dead] }
                        attempts: { type: integer }
                        lastStatusCode: { type: [integer, "null"] }
                        lastError: { type: [string, "null"] }
                        nextAttemptAt:
                          type: integer
                          description: Epoch ms. Always set — on `dead` rows it is the last scheduled attempt time (kept for audit).
                        deliveredAt: { type: [integer, "null"], description: "Epoch ms" }
                        createdAt: { type: integer, description: "Epoch ms" }
                        updatedAt: { type: integer, description: "Epoch ms" }
        "400":
          description: Unknown status value (BAD_STATUS)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/AdminNotConfigured" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/webhook-deliveries/{id}/replay:
    post:
      tags: [admin]
      summary: Replay a dead webhook delivery
      description: |
        Resets a delivery from `dead` back to `pending` with `next_attempt_at`
        set to now, so the next scheduled-jobs sweep re-drives it. Only rows
        in `dead` status are replayable — `pending` rows are already queued
        and `delivered` rows have already succeeded. Intended for when the
        merchant has fixed the underlying cause of permanent failure (TLS
        cert, URL change, etc.) and you want to push the event through.
      security:
        - AdminKey: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Row reset to pending and queued for retry
          content:
            application/json:
              schema:
                type: object
                properties:
                  replayed:
                    type: object
                    properties:
                      id: { type: string }
                      nextAttemptAt: { type: integer, description: "Epoch ms" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: Delivery not found or not in dead status (NOT_DEAD) — or admin surface not enabled (code `NOT_CONFIGURED` when ADMIN_KEY is unset)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/orphan-transactions:
    get:
      tags: [admin]
      summary: List open orphan transactions
      description: |
        Orphans are detected on-chain transfers that could not be attributed
        to an active invoice at ingest time — typically payments on an
        address whose invoice has already expired / been canceled and whose
        pool cooldown window has elapsed.

        The list is backed by a partial index over `(chain_id, detected_at)`
        WHERE `invoice_id IS NULL AND dismissed_at IS NULL`, so the queue
        stays cheap even with millions of historical tx rows. Dismissed rows
        are hidden but remain in `transactions` for audit.
      security:
        - AdminKey: []
      parameters:
        - in: query
          name: chainId
          required: false
          schema: { type: integer, minimum: 1 }
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 500, default: 50 }
        - in: query
          name: offset
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        "200":
          description: Open orphan queue
          content:
            application/json:
              schema:
                type: object
                properties:
                  orphans:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        chainId: { type: integer }
                        txHash: { type: string }
                        logIndex: { type: [integer, "null"] }
                        fromAddress: { type: string }
                        toAddress: { type: string }
                        token: { type: string }
                        amountRaw: { type: string }
                        amountUsd: { type: [string, "null"] }
                        usdRate: { type: [string, "null"] }
                        blockNumber: { type: [integer, "null"] }
                        confirmations: { type: integer }
                        status: { type: string, enum: [orphaned] }
                        detectedAt: { type: string, format: date-time }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/AdminNotConfigured" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/orphan-transactions/{id}/attribute:
    post:
      tags: [admin]
      summary: Attribute an orphan transaction to an invoice
      description: |
        Re-points an orphan's `invoice_id` at the target invoice, promotes
        its tx status (`orphaned` → `detected`/`confirmed`), and runs
        `recomputeInvoiceFromTransactions` with `viaAdminOverride=true`.

        The promote bar is the confirmation threshold snapshotted on the
        DESTINATION invoice at create time (`invoices.confirmation_threshold`),
        falling back to the gateway's per-chain default only for legacy
        invoices created before thresholds were snapshotted. If the orphan's
        `confirmations` already meet the bar it lands directly as `confirmed`
        (`confirmedAt` backfilled to now unless already set); otherwise
        `detected`, and the normal confirmation poller finishes it.

        The override allows a terminal invoice (`expired` / `canceled`) to
        flip to `confirmed` or `overpaid` when the attributed tx clears the
        confirm bar. Partial credits against a terminal invoice stay parked
        — the merchant's prior decision stands if the payment doesn't cover
        the invoice. No per-tx webhook fires for the attribution itself; the
        invoice-level lifecycle event from the recompute is the merchant's
        signal for an admin-driven credit.
      security:
        - AdminKey: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invoiceId]
              properties:
                invoiceId: { type: string, format: uuid }
      responses:
        "200":
          description: Orphan attributed
          content:
            application/json:
              schema:
                type: object
                properties:
                  attribution:
                    type: object
                    properties:
                      txId: { type: string }
                      invoiceId: { type: string, format: uuid }
                      invoiceStatusBefore: { type: string }
                      invoiceStatusAfter: { type: string }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "404":
          description: "`ORPHAN_NOT_FOUND` (no transaction with that id) or `INVOICE_NOT_FOUND` (no invoice with the supplied invoiceId) — or admin surface not enabled (code `NOT_CONFIGURED` when ADMIN_KEY is unset)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: "`NOT_ORPHAN` (transaction already attributed to an invoice) or `ORPHAN_DISMISSED` (row was dismissed; un-dismiss before attributing)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /admin/orphan-transactions/{id}/dismiss:
    post:
      tags: [admin]
      summary: Dismiss an orphan transaction
      description: |
        Marks an orphan as reviewed-and-ignored by stamping `dismissed_at`
        and `dismiss_reason`. The row stays in `transactions` for audit but
        drops out of the open-orphans queue via the partial index.
      security:
        - AdminKey: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string, minLength: 1, maxLength: 512 }
      responses:
        "200":
          description: Orphan dismissed
          content:
            application/json:
              schema:
                type: object
                properties:
                  dismissal:
                    type: object
                    properties:
                      txId: { type: string }
                      dismissedAt: { type: string, format: date-time }
                      reason: { type: string }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "404": { description: Transaction not found — or admin surface not enabled (code `NOT_CONFIGURED` when ADMIN_KEY is unset) }
        "409": { description: Transaction is attributed or already dismissed }

  /admin/audit-address:
    post:
      tags: [admin]
      summary: Audit an address by diffing on-chain history against stored transactions
      description: |
        Queries the chain adapter's `scanIncoming` for every registered token
        on `chainId` (plus the native symbol), diffs results against
        `transactions`, and ingests missing rows through the normal ingest
        path. Idempotent — already-stored txs are silently skipped via the
        UNIQUE `(chain_id, tx_hash, log_index)` constraint.

        Use when a merchant reports a missing payment: operator runs audit
        against the invoice's receive address, and any newly-discovered
        transfer either credits the invoice (if it's still active) or lands
        as an orphan for attribution / dismissal.

        `sinceMs` defaults to 30 days before the current server time; the
        adapter's own max-scan window still clamps the final range.
      security:
        - AdminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chainId, address]
              properties:
                chainId: { type: integer, minimum: 1 }
                address: { type: string, minLength: 1, maxLength: 128 }
                sinceMs: { type: integer, minimum: 0, description: "Epoch ms lower bound; defaults to now - 30 days" }
      responses:
        "200":
          description: Audit complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  audit:
                    type: object
                    properties:
                      chainId: { type: integer }
                      address: { type: string }
                      sinceMs: { type: integer }
                      scanned: { type: integer, description: "Total transfers returned by the chain adapter" }
                      inserted: { type: integer, description: "Newly-added tx rows" }
                      alreadyPresent: { type: integer, description: "Rows skipped (already in transactions)" }
                      insertedTxIds:
                        type: array
                        items: { type: string }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/AdminNotConfigured" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "500":
          description: "`INTERNAL` — `chainId` has no chain adapter wired on this deployment (the adapter lookup throws a plain error rather than returning a typed 400), or the adapter's scan itself failed"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /admin/balances:
    get:
      tags: [admin]
      summary: Snapshot gateway-owned address balances (DB-derived by default)
      description: |
        Returns per-address + per-chain + per-family token balances with USD
        totals, shaped as:

          token → address → chain → family → grand total

        Each level carries its own `totalUsd`. The top-level `source` field
        tells the caller which math produced the numbers: `"db"` or `"rpc"`.

        ### Mode — `source="db"` (default, fast)

        Computes balances from recorded activity only — no RPC traffic:

          * spendable = SUM(`transactions.amountRaw` confirmed inbound)
            − SUM(`payouts.amountRaw` confirmed outbound from this address)
            − SUM(active `payout_reservations.amountRaw` for this address),
            clamped at 0.

        Returns in ~50ms regardless of pool size. Addresses with no
        recorded activity are omitted. **Caveat:** off-system movements
        are invisible (rare on chains with Alchemy webhooks; dust sent to
        unsubscribed addresses). Use `?live=true` when reconciling.

        ### Mode — `source="rpc"` (opts-in via `?live=true`)

        Asks every wired chain adapter for the live on-chain balance of
        every (address, chainId) pair. Authoritative but expensive:
        typical 15–30s cold for a full mainnet pool. Use for post-topup
        reconciliation or audit; do not bind to dashboard auto-refresh.

        Pricing (both modes): USD rates are fetched once per snapshot via
        `priceOracle.getUsdRates([...symbols])`. Tokens the oracle can't
        price get `usdRate=null` and `usd="0.00"` so callers can
        distinguish "really zero" from "couldn't price".

        ### Caching

        Keyed by mode + query string (`family`, `chainId`, `kind`,
        `address`). DB mode uses a 5s TTL (it's cheap to recompute);
        RPC mode uses 60s (dashboard refresh would otherwise hammer the
        provider). `db` and `rpc` entries do not share a slot. The
        response includes `cached: true|false` so dashboards can show
        staleness.
      security:
        - AdminKey: []
      parameters:
        - in: query
          name: family
          schema: { type: string, enum: [evm, tron, solana, utxo, monero] }
          description: |
            Narrow to one family. `monero` is accepted by validation but
            no Monero address ever appears in this snapshot, so it yields
            an empty snapshot rather than 400 `BAD_FAMILY` (whose message
            enumerates only evm/tron/solana/utxo).
        - in: query
          name: chainId
          schema: { type: integer }
          description: Narrow to one chainId. Implicitly narrows family.
        - in: query
          name: kind
          schema: { type: string, enum: [pool, fee] }
          description: |
            Address kind filter. Only `pool` exists today — every HD address
            is a payout source. The legacy `fee` value is accepted and
            silently coerced to `pool` for backward compatibility with old
            clients.
        - in: query
          name: address
          schema: { type: string }
          description: Spot-check one address without paying the full sweep cost.
        - in: query
          name: live
          schema: { type: string, enum: ["true", "1"] }
          description: |
            Flip to `true` or `1` to force a live RPC snapshot
            (`source="rpc"`). Omit for the fast DB-derived default.
      responses:
        "200":
          description: Snapshot computed (or served from cache)
          content:
            application/json:
              schema:
                type: object
                required: [snapshot, cached]
                properties:
                  snapshot: { $ref: "#/components/schemas/BalanceSnapshot" }
                  cached:
                    type: boolean
                    description: True when this response came from the in-memory cache instead of a fresh compute.
        "400":
          description: Invalid query parameter (BAD_FAMILY, BAD_CHAIN_ID, BAD_KIND)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/AdminNotConfigured" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/balances/reconcile:
    post:
      tags: [admin]
      summary: Reconcile the derived ledger to live on-chain balances (dry-run by default)
      description: |
        Ledger ⇄ chain reconciliation for account-model pool addresses. The
        derived ledger (confirmed inbound + intra-pool credits − confirmed
        outbound + prior adjustments) can drift from on-chain reality —
        unrecorded ambiguous-broadcast sweeps, self-ingested payout txs,
        gas-accounting gaps. This pass reads each `address_pool` row's LIVE
        balance via the chain adapter and computes, per token,
        `delta = onChain − settledLedger`. With `dryRun: false` it writes one
        signed `balance_adjustments` row per non-zero delta (reason
        `rpc-reconciliation`) so the ledger reads exactly the chain.

        Properties:
          - **append-only** — never edits transaction/payout history;
          - **idempotent** — a second run sees delta 0 and writes nothing;
          - **reservation-agnostic** — compares the SETTLED ledger (no
            in-flight holds) against the chain, so an active reservation is
            not mistaken for drift. The settled value is not zero-clamped;
            a negative ledger (over-count) is compared as-is.

        Scope: every `address_pool` row × every supported chainId of its
        family. UTXO and Monero are intentionally excluded (UTXO
        spendability lives in the `utxos` table, not address arithmetic), so
        `family: "utxo"` / `"monero"` filters always yield `checked: 0`.
        Tokens reconciled per address = union of what's on-chain now and
        every token the ledger ever touched there — an over-count where the
        chain now reads 0 is still caught.

        `dryRun` defaults to **true** (preview only; `adjusted` stays 0).
        Re-invoke with `dryRun: false` to write the adjustments. Run with
        consolidation schedules paused so balances are quiescent. A missing
        or malformed JSON body is treated as `{}` — a full-scope dry run.
        Per-address RPC failures land in `errors[]` without aborting the
        sweep; a non-empty `errors` means the result is partial.
      security:
        - AdminKey: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                dryRun:
                  type: boolean
                  default: true
                  description: Set false to write the adjustment rows. Defaults to preview-only.
                family:
                  type: string
                  enum: [evm, tron, solana, utxo, monero]
                  description: Narrow to one family. `utxo`/`monero` are accepted but out of scope (always 0 checks).
                chainId: { type: integer, minimum: 1 }
                address:
                  type: string
                  minLength: 1
                  maxLength: 128
                  description: Narrow to a single pool address (exact match as stored in address_pool).
            example:
              dryRun: true
              family: evm
              chainId: 137
      responses:
        "200":
          description: Reconciliation result (deltas always reported; adjustment rows written only when dryRun=false)
          content:
            application/json:
              schema:
                type: object
                required: [dryRun, checked, adjusted, deltas, errors]
                properties:
                  dryRun: { type: boolean }
                  checked: { type: integer, description: "Number of (address, chainId) pairs probed." }
                  adjusted: { type: integer, description: Adjustment rows written. Always 0 on a dry run. }
                  deltas:
                    type: array
                    description: |
                      One entry per (chainId, address, token) whose live on-chain
                      balance differs from the settled ledger.
                    items:
                      type: object
                      required: [chainId, address, token, onChainRaw, ledgerRaw, deltaRaw]
                      properties:
                        chainId: { type: integer }
                        address: { type: string }
                        token: { type: string }
                        onChainRaw: { type: string, description: Live on-chain balance in raw units. }
                        ledgerRaw: { type: string, description: Signed settled-ledger balance (negative on over-count). }
                        deltaRaw: { type: string, description: Signed onChainRaw − ledgerRaw; the adjustment that would be (or was) written. }
                  errors:
                    type: array
                    description: Addresses the sweep could not probe (RPC failure). Non-empty means the result is partial.
                    items:
                      type: object
                      required: [chainId, address, error]
                      properties:
                        chainId: { type: integer }
                        address: { type: string }
                        error: { type: string }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/AdminNotConfigured" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/pool/audit:
    get:
      tags: [admin]
      summary: Audit address_pool rows against current MASTER_SEED derivation
      description: |
        For each account-model family (`evm`, `tron`, `solana` — `utxo` is
        excluded because it uses its own per-invoice address counter, and
        `monero` has no shared-pool topology), walks the pool, derives the
        expected address for each row's `address_index` using the current
        `MASTER_SEED` + the family's adapter, and compares to the stored
        address. Mismatches mean the gateway can NOT sign for those rows —
        either `MASTER_SEED` rotated since the pool was populated, or the
        rows were inserted by some external tool that doesn't match our HD
        path. Funding a mismatched address is money lost.

        Run this before funding a new pool with real money, after any
        deployment where the seed might have changed, or when a payout
        fails with a signer-mismatch error. Read-only; no state is
        modified. Families without a wired adapter are omitted from
        `reports` entirely.

        Scan bound: the FIRST 500 rows per family (ordered by
        `address_index` ascending) are checked per call.
        `unscannedBeyondLimit > 0` signals the family has more rows than
        were scanned (the fetch is capped at scanLimit+1, so this is an
        indicator — 0 or 1 — not a remaining-row count). In practice a
        seed rotation corrupts the whole pool at once, so mismatches of
        concern surface in the sample. A row whose stored address can't
        even be parsed is reported as a mismatch whose `expectedAddress`
        carries a `DERIVATION_ERROR: <message>` sentinel instead of an
        address.

        Response `status` is `healthy` when no mismatches exist across any
        scanned family; `mismatches-detected` otherwise.
      security:
        - AdminKey: []
      responses:
        "200":
          description: Audit outcome
          content:
            application/json:
              schema:
                type: object
                required: [status, scanLimit, reports]
                properties:
                  status:
                    type: string
                    enum: [healthy, mismatches-detected]
                  scanLimit:
                    type: integer
                    description: Max rows inspected per family in one call (500).
                  reports:
                    type: array
                    description: One entry per wired account-model family (evm/tron/solana).
                    items:
                      type: object
                      required: [family, scanned, matches, mismatches, unscannedBeyondLimit]
                      properties:
                        family: { type: string, enum: [evm, tron, solana] }
                        scanned: { type: integer }
                        matches: { type: integer }
                        unscannedBeyondLimit:
                          type: integer
                          description: "> 0 means more rows exist beyond the scan window (indicator, not a count)."
                        mismatches:
                          type: array
                          items:
                            type: object
                            required: [family, addressIndex, storedAddress, expectedAddress]
                            properties:
                              family: { type: string, enum: [evm, tron, solana] }
                              addressIndex: { type: integer }
                              storedAddress: { type: string }
                              expectedAddress:
                                type: string
                                description: "Canonical derived address — or `DERIVATION_ERROR: <message>` when the row couldn't be derived/parsed at all."
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/AdminNotConfigured" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "500":
          description: "`INTERNAL` — audit could not run (e.g. `MASTER_SEED` unset)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /admin/fee-wallets:
    get:
      tags: [admin, fee-wallets]
      summary: List per-family fee-wallet configuration
      description: |
        Returns one entry per chain family (`evm`, `tron`, `solana`). Each
        entry reports:
          - `capability`: what the family's adapter supports for offloading
            payout gas onto a dedicated wallet. Values the gateway returns
            today:
              - `none`    — family cannot use a fee wallet (EVM, pending
                            account abstraction). Registration is still
                            accepted so operators can pre-register before
                            the capability flips on, but the planner
                            ignores it.
              - `top-up`  — fee wallet holds spendable native and sponsors
                            gas top-up txs to source pool addresses (Tron
                            today). Sources still burn TRX, but the operator
                            funds one wallet instead of seeding every pool
                            address. The zero-burn `delegate` mode is staged
                            behind the /fee-wallets/tron/* Stake 2.0
                            endpoints and lands with Phase 4 planner
                            integration.
              - `co-sign` — fee wallet signs every payout as fee payer
                            (Solana `message.feePayer`), covering sig fees
                            and ATA rent.
          - `configured`: null when no wallet is registered, else
            `{ mode, address }`. `mode='hd-pool'` means the address is an
            existing pool row whose key is derived from MASTER_SEED;
            `mode='imported'` means an external key was uploaded and is
            encrypted at rest via secretsCipher.

        Operators read this to render a dashboard showing where fee wallets
        are set vs missing, and to decide whether the selected family is
        ready for the gas-offload topology. Monero and UTXO families never
        appear here — Monero is inbound-only in v1, and UTXO chains have no
        separate fee-payer concept.
      security:
        - AdminKey: []
      responses:
        "200":
          description: Per-family configuration matrix
          content:
            application/json:
              schema:
                type: object
                properties:
                  feeWallets:
                    type: array
                    items:
                      type: object
                      properties:
                        family:
                          type: string
                          enum: [evm, tron, solana]
                        capability:
                          type: string
                          enum: [none, top-up, delegate, co-sign]
                          description: |
                            How the fee wallet covers gas for payouts on this family:
                              - `none`: fee-wallet not used by the planner
                                (EVM today, pending account abstraction).
                              - `top-up`: fee wallet holds native and is offered
                                as a top-up sponsor candidate alongside pool
                                addresses (Tron today). The source still burns
                                native for gas, but funded by a top-up tx from
                                the fee wallet rather than its own balance.
                              - `delegate`: fee wallet pre-delegates resources
                                out-of-band so payouts spend zero native (Tron
                                future, pending Phase 4 planner integration).
                              - `co-sign`: fee wallet signs every payout as the
                                tx fee payer (Solana).
                        configured:
                          oneOf:
                            - type: "null"
                            - type: object
                              properties:
                                mode: { type: string, enum: [hd-pool, imported] }
                                address: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/AdminNotConfigured" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/fee-wallets/{family}/use-pool:
    post:
      tags: [admin, fee-wallets]
      summary: Register an existing HD pool address as the family's fee wallet
      description: |
        Zero-new-secret setup. The supplied address must already live in
        `address_pool` for this family — we verify that before writing the
        row. Signing still goes through MASTER_SEED + the pool row's
        `address_index`, identical to how pool payouts already derive keys.

        The planner immediately respects the registration on the next
        `POST /payouts` or `POST /payouts/estimate`. No restart needed.

        To swap to a different address: `DELETE` then `POST` again. To swap
        between modes: same — the `fee_wallets` row's uniqueness is per
        family.
      security:
        - AdminKey: []
      parameters:
        - name: family
          in: path
          required: true
          schema: { type: string, enum: [evm, tron, solana, utxo] }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [address]
              properties:
                address:
                  type: string
                  minLength: 1
                  description: Canonical form for the family (hex for EVM, base58 for Tron/Solana).
      responses:
        "200":
          description: Registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  feeWallet:
                    type: object
                    properties:
                      family: { type: string }
                      mode: { type: string, enum: [hd-pool] }
                      address: { type: string }
        "400":
          description: |
            BAD_FAMILY, BAD_JSON, NO_ADAPTER (family not wired), or
            INVALID_ADDRESS (not a valid address for this family).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: POOL_ADDRESS_NOT_FOUND — address does not live in address_pool for this family — or admin surface not enabled (code `NOT_CONFIGURED` when ADMIN_KEY is unset).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/fee-wallets/{family}/import:
    post:
      tags: [admin, fee-wallets]
      summary: Import an externally-generated private key as the fee wallet
      description: |
        Use when you have an external wallet whose key you want to reuse —
        for example, a Tron wallet that has already accumulated staked TRX
        and whose 14-day unfreeze cooldown you don't want to pay to reset.

        The private key is encrypted at the boundary via `secretsCipher`
        (AES-256-GCM, same primitive used for webhook HMAC secrets and
        Alchemy signing keys). Plaintext is only in memory for the duration
        of the encrypt call. At sign time, the ciphertext is decrypted for
        one `signAndBroadcast` call and the buffer is immediately zeroed.

        **Cross-checked at import time:** the declared `address` is
        verified against the private key's derived address via the adapter's
        `addressFromPrivateKey`. A mismatch returns 400
        `ADDRESS_KEY_MISMATCH` with both values in the error message — no
        row is persisted. This prevents a silent signer-mismatch failure on
        the first payout.
      security:
        - AdminKey: []
      parameters:
        - name: family
          in: path
          required: true
          schema: { type: string, enum: [evm, tron, solana, utxo, monero] }
          description: |
            `monero` passes family validation on this route (there is no
            explicit rejection like `use-pool` has), but the import then
            fails 400 `INVALID_PRIVATE_KEY` — the Monero adapter cannot
            derive an address from a private key (view-key-only,
            inbound-only in v1).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [privateKey, address]
              properties:
                privateKey:
                  type: string
                  minLength: 1
                  description: Hex-encoded private key (with or without 0x prefix). Length per family.
                address:
                  type: string
                  minLength: 1
                  description: Canonical form for the family; must match the key's derived address.
      responses:
        "200":
          description: Registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  feeWallet:
                    type: object
                    properties:
                      family: { type: string }
                      mode: { type: string, enum: [imported] }
                      address: { type: string }
        "400":
          description: |
            BAD_FAMILY, BAD_JSON, NO_ADAPTER, INVALID_ADDRESS,
            INVALID_PRIVATE_KEY (key could not be parsed for this family), or
            ADDRESS_KEY_MISMATCH (declared address doesn't match key).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/AdminNotConfigured" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/fee-wallets/{family}:
    delete:
      tags: [admin, fee-wallets]
      summary: Remove the fee wallet registration for a family
      description: |
        Idempotent. The planner immediately falls back to the self-pay /
        sponsor-topup flow on the next plan; in-flight payouts are
        unaffected because fee-wallet selection is a per-plan decision.

        Removing does NOT unfreeze staked TRX or unsend any previously-
        submitted delegation transactions — for Tron specifically, call
        `/admin/fee-wallets/tron/undelegate` on each delegated address and
        `/admin/fee-wallets/tron/unfreeze` on any frozen stake before
        removing, or the funds stay locked on-chain.
      security:
        - AdminKey: []
      parameters:
        - name: family
          in: path
          required: true
          schema: { type: string, enum: [evm, tron, solana, utxo, monero] }
          description: |
            `monero` is accepted on this route (no explicit rejection) and
            — since no Monero fee-wallet row can ever exist — returns 200
            `{ removed: false }` rather than 400 `BAD_FAMILY`.
      responses:
        "200":
          description: Removal result
          content:
            application/json:
              schema:
                type: object
                properties:
                  removed:
                    type: boolean
                    description: True when a row was deleted; false when no row existed.
        "400":
          description: BAD_FAMILY
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/AdminNotConfigured" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/fee-wallets/tron/resources:
    get:
      tags: [admin, fee-wallets, tron]
      summary: Query the Tron fee wallet's staking/delegation resource budget
      description: |
        Reads `/wallet/getaccountresource` against the registered Tron fee
        wallet and returns its energy + bandwidth budgets. Operators poll
        this to decide when to stake more TRX, re-delegate, or audit a
        suspected delegation shortfall.

        `energyAvailable` and `bandwidthAvailable` fields include both the
        account's own stake AND resources delegated IN to it; they're what
        the chain actually lets the account consume today before burning.
      security:
        - AdminKey: []
      responses:
        "200":
          description: Resource snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  feeWallet: { type: string, description: Fee wallet address (base58). }
                  resources:
                    type: object
                    properties:
                      energyAvailable: { type: integer, description: Energy units still consumable today. }
                      energyLimit: { type: integer, description: Daily energy budget from own stake + delegations in. }
                      bandwidthAvailable: { type: integer, description: Bytes still consumable today (incl. ~600/day free). }
                      bandwidthLimit: { type: integer, description: Daily bandwidth budget. }
        "409":
          description: NO_FEE_WALLET — Tron fee wallet is not registered.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: |
            `INTERNAL` — Tron adapter not wired on this deployment (the
            adapter lookup throws before the typed `NO_TRON_ADAPTER`
            branch is reached, so that code is unreachable in practice),
            or the resource RPC failed across all backends.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/AdminNotConfigured" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/payouts/{id}/bump-fee:
    post:
      tags: [admin, payouts, utxo]
      summary: RBF — replace a stuck UTXO payout's tx at a higher fee
      description: |
        UTXO-only. Bumps the fee on a payout whose tx is sitting in the
        mempool unconfirmed past the merchant's patience. Builds a
        BIP125-compliant replacement tx that shares inputs with the prior
        attempt and has strictly higher absolute fee. Replacement strategy
        in order:
          - **shrink_change** — same inputs, change output reduced to absorb the bump
          - **drop_change** — same inputs, no change output (everything left becomes fee)
          - **add_inputs** — same inputs PLUS additional spendable UTXOs

        Each attempt is journaled in `payout_broadcasts` (txid, fee, vsize,
        inputs, change). Cap of 10 bumps per payout.

        Errors:
          - 404 `PAYOUT_NOT_FOUND` — no payout with that id
          - 400 `WRONG_FAMILY` — non-UTXO chain (EVM/Tron/Solana)
          - 400 `WRONG_STATUS` — payout not currently `submitted`
          - 400 `ALREADY_CONFIRMED` — tx already mined; bump is moot
          - 400 `MAX_ATTEMPTS` — payout has hit the 10-bump cap
          - 400 `FEE_NOT_HIGHER` — replacement fee wouldn't beat prior fee
          - 409 `CONFLICT` — concurrent bump in flight; retry once it completes
          - 422 `INSUFFICIENT_FUNDS` — even Step 3 (add inputs) can't cover the fee
          - 502 `BROADCAST_FAILED` — relay rejected the replacement
      security:
        - AdminKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              description: |
                The server schema is a non-strict union tried in order —
                unknown keys are silently stripped, and a body carrying BOTH
                `tier` and `satPerVb` is accepted with `tier` winning
                (`satPerVb` ignored). Send exactly one of the two shapes.
              oneOf:
                - type: object
                  required: [tier]
                  properties:
                    tier:
                      type: string
                      enum: [low, medium, high]
                      description: Use the adapter's current fee estimate at the requested tier.
                    dryRun:
                      type: boolean
                      description: Preview the replacement without broadcasting.
                - type: object
                  required: [satPerVb]
                  properties:
                    satPerVb:
                      type: number
                      exclusiveMinimum: 0
                      maximum: 10000
                      description: Explicit replacement feerate in sat/vB (any positive number up to 10000).
                    dryRun:
                      type: boolean
            example:
              tier: high
              dryRun: false
      responses:
        "200":
          description: Bump succeeded; new tx broadcast
          content:
            application/json:
              schema:
                type: object
                properties:
                  bump:
                    type: object
                    properties:
                      payoutId: { type: string }
                      attemptNumber: { type: integer, description: "1-indexed; initial broadcast is 1" }
                      txHash: { type: string }
                      priorTxHash: { type: string }
                      priorFeeSats: { type: string }
                      newFeeSats: { type: string }
                      priorFeerateSatVb: { type: string }
                      newFeerateSatVb: { type: string }
                      vsize: { type: integer }
                      strategy:
                        type: string
                        enum: [shrink_change, drop_change, add_inputs]
                      changeAddress: { type: [string, "null"] }
                      changeValueSats: { type: [string, "null"] }
                      dryRun: { type: boolean }
        "400":
          description: |
            `WRONG_FAMILY` / `WRONG_STATUS` / `ALREADY_CONFIRMED` /
            `MAX_ATTEMPTS` / `FEE_NOT_HIGHER` — plus `INVALID_PAYOUT_ID`
            (path id longer than 64 chars) and `VALIDATION` (body present
            but zod-rejected, e.g. `{}`, `{"dryRun": true}` or a bad
            `tier` — only a fully ABSENT body defaults to `tier=high`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "404":
          description: PAYOUT_NOT_FOUND — or admin surface not enabled (code `NOT_CONFIGURED` when ADMIN_KEY is unset)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: CONFLICT — concurrent bump in flight for the same payout
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422":
          description: INSUFFICIENT_FUNDS — even after adding all spendable UTXOs, can't cover the fee
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: "`INTERNAL` — unexpected bump failure (unmapped bump error or unhandled exception)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "502":
          description: BROADCAST_FAILED — relay rejected the replacement
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /admin/payouts/{id}/recover:
    post:
      tags: [admin, payouts]
      summary: Manually recover a held payout leg with an explorer-verified txHash
      description: |
        Escape hatch for a held leg (see `GET /admin/payouts/held`) that the
        operator has confirmed on a block explorer DID land on-chain. The
        auto-reconciler recovers held legs when its exact scan matches; use
        this endpoint for the cases it can't — amount/token drift, or a
        transfer older than the reconciler's scan window.

        The supplied `txHash` is verified on-chain before anything changes,
        re-using the same proof the ledger needs:

          1. **Mined and not reverted** — a reverted sweep moved no funds, so
             confirming it would post a phantom debit (422
             `RECOVERY_TX_NOT_MINED` / `RECOVERY_TX_REVERTED`).
          2. **This leg's exact transfer** — the tx must be the leg's
             source→destination transfer of exactly `token`/`amountRaw`,
             found via the chain adapter's scan over a wide lookback (422
             `RECOVERY_TX_MISMATCH` otherwise; if the hash is right the
             transfer may be older than the scan window).
          3. **Never used twice** — a hash already recorded on another payout
             row is refused (409 `RECOVERY_TX_ALREADY_USED`), since attaching
             one on-chain tx to two rows would double-post the debit.

        On success the row is driven to `submitted` with the verified hash
        (CAS-guarded against concurrent executor activity — a lost race is a
        409 `PAYOUT_NOT_RECOVERABLE`); the normal `confirmPayouts` sweep then
        flips it to `confirmed`, which posts the source debit + destination
        credit and releases the reservation — the only state that clears the
        phantom-balance over-count. The row is never marked failed and never
        deleted; both would leave the over-count in place.
      security:
        - AdminKey: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
          description: Payout id of the held leg.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [txHash]
              additionalProperties: false
              properties:
                txHash:
                  type: string
                  pattern: "^0x[0-9a-fA-F]{64}$"
                  description: The real, successful on-chain transfer hash read off a block explorer.
      responses:
        "200":
          description: Leg recovered — the returned payout reads `status=submitted` with the verified txHash attached
          content:
            application/json:
              schema:
                type: object
                properties:
                  payout: { $ref: "#/components/schemas/Payout" }
        "400":
          description: BAD_JSON (malformed body) or VALIDATION (txHash not a 0x-prefixed 32-byte hex string, or unknown extra keys — the schema is strict)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "404":
          description: PAYOUT_NOT_FOUND — or admin surface not enabled (code `NOT_CONFIGURED` when ADMIN_KEY is unset)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: |
            `PAYOUT_NOT_RECOVERABLE` — not a held leg (wrong kind/status, txHash
            already set, no source address) or the row changed state mid-recovery
            (lost CAS race; re-read and retry). `RECOVERY_TX_ALREADY_USED` — hash
            already recorded on another payout row.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422":
          description: |
            `RECOVERY_TX_NOT_MINED` — tx not mined yet (or not visible to the RPC;
            retry once it has confirmations). `RECOVERY_TX_REVERTED` — tx reverted
            on-chain and moved no funds. `RECOVERY_TX_MISMATCH` — tx is not this
            leg's exact source→destination transfer of token/amount.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /admin/payouts/held:
    get:
      tags: [admin, payouts]
      summary: List held payout legs (ambiguous-broadcast recovery queue)
      description: |
        The recovery queue. A "held" leg is a `standard` or
        `consolidation_sweep` payout whose main-tx broadcast errored
        ambiguously: the executor attempted the send, the RPC reply didn't
        say whether the tx entered the mempool, and the row was parked
        rather than retried (a blind re-broadcast could double-spend).
        Concretely: `status` in `reserved`/`topping-up`, `txHash` NULL,
        `broadcastAttemptedAt` set, and `lastError` containing
        "Broadcast outcome unknown".

        These rows are exactly the set `POST /admin/payouts/{id}/recover`
        acts on. The auto-reconciler clears most of them on its own — its
        exact chain scan either finds the transfer (drives the leg to
        `submitted`) or releases the hold for re-broadcast, at which point
        the leg drops out of this list. Anything still here needs an
        operator: use each entry's source/destination/token/amount to find
        the real OUT tx on a block explorer, then feed its hash to the
        recover endpoint. Ordered oldest-held first; `heldForMs` gives the
        age since the ambiguous broadcast attempt for triage badges.

        Internal `gas_top_up` / `gas_burn` children never appear here —
        recovery only applies to token/sweep legs with a known source.
      security:
        - AdminKey: []
      parameters:
        - in: query
          name: chainId
          required: false
          schema: { type: integer }
          description: Narrow to one chain. Non-integer values are rejected (BAD_QUERY).
        - in: query
          name: token
          required: false
          schema: { type: string }
          description: Narrow to one token symbol (exact match, e.g. `USDT`).
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, default: 100 }
          description: |
            Max rows returned. Values above 500 are silently clamped to 500;
            zero/negative/non-integer values are rejected (BAD_QUERY).
      responses:
        "200":
          description: Recovery queue (oldest-held first)
          content:
            application/json:
              schema:
                type: object
                required: [held, count]
                properties:
                  held:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid }
                        kind: { type: string, enum: [standard, consolidation_sweep] }
                        chainId: { type: integer }
                        token: { type: string }
                        amountRaw: { type: string, description: Raw integer amount in the token's smallest units. }
                        sourceAddress: { type: string }
                        destinationAddress: { type: string }
                        status: { type: string, enum: [reserved, topping-up] }
                        topUpTxHash: { type: [string, "null"] }
                        batchId: { type: [string, "null"] }
                        parentPayoutId: { type: [string, "null"] }
                        lastError: { type: [string, "null"], description: 'Always contains "Broadcast outcome unknown" for held legs.' }
                        broadcastAttemptedAt: { type: [string, "null"], format: date-time }
                        heldForMs: { type: [integer, "null"], description: Milliseconds since the ambiguous broadcast attempt. }
                        createdAt: { type: string, format: date-time }
                        updatedAt: { type: string, format: date-time }
                  count: { type: integer, description: Convenience echo of `held.length`. }
        "400":
          description: BAD_QUERY — `chainId` not an integer, or `limit` not a positive integer
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/AdminNotConfigured" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/fee-wallets/tron/freeze:
    post:
      tags: [admin, fee-wallets, tron]
      summary: Stake TRX on the Tron fee wallet for energy or bandwidth
      description: |
        Wraps `/wallet/freezebalancev2`. Converts spendable TRX on the fee
        wallet into staked TRX, which generates a daily resource allowance
        (ENERGY for TRC-20 execution, BANDWIDTH for tx bytes). Stake is
        reclaimable via `/unfreeze` (14-day unlock), not burned.

        Signed with the fee wallet's key (resolved via signerStore under
        `{kind: 'fee-wallet', family: 'tron'}`), broadcast via the same
        `signAndBroadcast` path production payouts use.
      security:
        - AdminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [balance, resource]
              properties:
                balance:
                  type: integer
                  description: TRX to stake, in sun (1 TRX = 1,000,000 sun). Tron's minimum stake is 1 TRX.
                  minimum: 1000000
                resource:
                  type: string
                  enum: [ENERGY, BANDWIDTH]
      responses:
        "200":
          description: Broadcast; resources become active on confirmation (~3s)
          content:
            application/json:
              schema:
                type: object
                properties:
                  txHash: { type: string }
                  balance: { type: integer }
                  resource: { type: string, enum: [ENERGY, BANDWIDTH] }
        "400":
          description: BAD_JSON — body missing/mis-typed, or balance below 1,000,000 sun.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: NO_FEE_WALLET — register via /use-pool or /import first.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
          description: |
            `INTERNAL` — Tron adapter not wired on this deployment (the
            adapter lookup throws before the typed `NO_TRON_ADAPTER`
            branch, which is unreachable in practice), Trongrid RPC
            failure across all backends, fee-wallet signing-key resolution
            failure, or broadcast rejection — e.g. insufficient spendable
            TRX to stake.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/AdminNotConfigured" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/fee-wallets/tron/unfreeze:
    post:
      tags: [admin, fee-wallets, tron]
      summary: Begin the 14-day unstaking cooldown on the Tron fee wallet
      description: |
        Wraps `/wallet/unfreezebalancev2`. TRX becomes withdrawable 14 days
        after broadcast (via a separate on-chain withdrawexpireunfreeze).
        Useful when rebalancing or decommissioning a fee wallet. Call
        `/undelegate` FIRST on any active delegations or the call will fail
        (can't unstake what's currently lent out).
      security:
        - AdminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [balance, resource]
              properties:
                balance:
                  type: integer
                  description: Sun to unfreeze (1 TRX = 1,000,000 sun).
                  minimum: 1000000
                resource:
                  type: string
                  enum: [ENERGY, BANDWIDTH]
      responses:
        "200":
          description: Broadcast; withdrawable after 14-day cooldown
          content:
            application/json:
              schema:
                type: object
                properties:
                  txHash: { type: string }
                  balance: { type: integer }
                  resource: { type: string, enum: [ENERGY, BANDWIDTH] }
        "400": { content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }, description: BAD_JSON }
        "409": { content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }, description: NO_FEE_WALLET }
        "500":
          description: |
            `INTERNAL` — Tron adapter not wired (the adapter lookup
            throws before the typed `NO_TRON_ADAPTER` branch, unreachable
            in practice), or RPC/signing/broadcast failure, including the
            on-chain rejection when the requested balance exceeds
            undelegated stake.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/AdminNotConfigured" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/fee-wallets/tron/delegate:
    post:
      tags: [admin, fee-wallets, tron]
      summary: Delegate staked resources from the Tron fee wallet to a pool address
      description: |
        Wraps `/wallet/delegateresource`. The fee wallet lends a slice of
        its staked resource to `receiver` — the receiver can then consume
        that energy/bandwidth for its own transactions without burning TRX.
        Delegation persists until undelegated (or, when `lock=true`, cannot
        be reclaimed until the 3-day lock expires).

        The handler verifies whether `receiver` is a pool address (reports
        `receiverIsInPool`) but permits delegation to non-pool addresses
        too — intended for one-off delegations to sweep-master / sponsor
        addresses.

        Typical setup: loop this call across every active pool address so
        USDT/USDC payouts from any of them consume delegated energy
        instead of burning TRX.

        Note: an invalid/malformed `receiver` fails canonicalization inside
        the handler and surfaces as 500 INTERNAL, not 400 — validate the
        base58 address client-side.
      security:
        - AdminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [receiver, balance, resource]
              properties:
                receiver:
                  type: string
                  minLength: 1
                  maxLength: 128
                  description: Base58 address to receive delegated resources.
                balance:
                  type: integer
                  description: STAKE amount in sun to delegate (not the energy amount — the delegated stake produces a network-variable energy-per-day rate; query /fee-wallets/tron/resources to tune).
                  minimum: 1000000
                resource:
                  type: string
                  enum: [ENERGY, BANDWIDTH]
                lock:
                  type: boolean
                  description: When true, delegation cannot be reclaimed for 3 days (Tron's default lock period). Defaults false.
      responses:
        "200":
          description: Delegation broadcast
          content:
            application/json:
              schema:
                type: object
                properties:
                  txHash: { type: string }
                  receiver: { type: string, description: Canonicalized base58 receiver. }
                  balance: { type: integer }
                  resource: { type: string, enum: [ENERGY, BANDWIDTH] }
                  lock: { type: boolean }
                  receiverIsInPool: { type: boolean, description: True when the receiver is an address_pool row for family='tron'; false for external addresses (allowed, but double-check intent). }
        "400": { content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }, description: BAD_JSON }
        "409": { content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }, description: NO_FEE_WALLET }
        "500":
          description: |
            `INTERNAL` — Tron adapter not wired (the adapter lookup
            throws before the typed `NO_TRON_ADAPTER` branch, unreachable
            in practice), invalid `receiver` address (canonicalization
            throws), RPC/signing failure, or on-chain rejection (e.g.
            delegating more than the free staked balance).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/AdminNotConfigured" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/fee-wallets/tron/undelegate:
    post:
      tags: [admin, fee-wallets, tron]
      summary: Reclaim delegated resources from a pool address
      description: |
        Wraps `/wallet/undelegateresource`. Returns delegated stake to the
        fee wallet's free pool (still staked — just no longer lent out).
        Must be called BEFORE `/unfreeze` on any delegated stake — Tron
        rejects an unfreeze that would leave active delegations unfunded.

        Note: an invalid/malformed `receiver` fails canonicalization inside
        the handler and surfaces as 500 INTERNAL, not 400.
      security:
        - AdminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [receiver, balance, resource]
              properties:
                receiver: { type: string, minLength: 1, maxLength: 128, description: Base58 address the resources were delegated to. }
                balance: { type: integer, minimum: 1000000, description: Stake in sun to reclaim. }
                resource: { type: string, enum: [ENERGY, BANDWIDTH] }
      responses:
        "200":
          description: Undelegate broadcast
          content:
            application/json:
              schema:
                type: object
                properties:
                  txHash: { type: string }
                  receiver: { type: string, description: Canonicalized base58 receiver. }
                  balance: { type: integer }
                  resource: { type: string, enum: [ENERGY, BANDWIDTH] }
        "400": { content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }, description: BAD_JSON }
        "409": { content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }, description: NO_FEE_WALLET }
        "500":
          description: |
            `INTERNAL` — Tron adapter not wired (the adapter lookup
            throws before the typed `NO_TRON_ADAPTER` branch, unreachable
            in practice), invalid `receiver`, RPC/signing failure, or
            on-chain rejection (e.g. reclaiming more than is delegated to
            this receiver, or within an active 3-day lock).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/AdminNotConfigured" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/migrate:
    post:
      tags: [admin]
      summary: Apply any pending schema migrations
      description: |
        Runs the bundled `drizzle/migrations` set through Drizzle's
        idempotent migrator — it reads `meta/_journal.json` and applies only
        migrations not yet recorded in `__drizzle_migrations`. Node/Deno
        runtimes already run this at boot; the endpoint exists for the ops
        panel's "reapply" button and for re-applying after a hot-patch of
        the migrations directory without a restart.

        Runtimes with no filesystem (Workers / Vercel Edge) have no bundled
        migrations folder and return 501 `MIGRATIONS_NOT_BUNDLED` — apply
        migrations CLI-side with `npx drizzle-kit push` pointed at
        `TURSO_URL` / `TURSO_AUTH_TOKEN` instead. The 501 exists so nobody
        thinks they've run migrations when they haven't.
      security:
        - AdminKey: []
      responses:
        "200":
          description: Migration sweep completed (idempotent — already-applied ids are skipped)
          content:
            application/json:
              schema:
                type: object
                required: [ok, folder]
                properties:
                  ok: { type: boolean }
                  folder:
                    type: string
                    description: Filesystem path of the migrations folder that was applied.
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/AdminNotConfigured" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "501":
          description: No bundled migration set on this runtime (MIGRATIONS_NOT_BUNDLED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /admin/monero-pool/initialize:
    post:
      tags: [admin]
      summary: Seed or top up the Monero subaddress pool
      description: |
        Monero analogue of `POST /admin/pool/initialize`, kept entirely
        separate because Monero is inbound-only: the gateway holds only the
        wallet VIEW key and derives subaddresses under account 0 from the
        view key + primary spend public key. It can never spend from them,
        so Monero must never touch the shared `address_pool` — that table
        is coupled to spend-side machinery (consolidation, fee wallets,
        payout sourcing).

        Idempotent top-up: every WIRED Monero chain (mainnet 1000, stagenet
        1001, testnet 1002 — whichever the deployment registers) is brought
        up to `initialSize` subaddress rows. Chains already at or above the
        target return `already-sufficient` with zero additions. When no
        Monero adapter is wired at all the call is a no-op and `results`
        is an empty array.

        Newly derived indices always start ABOVE both the pool's current
        max index and the legacy per-invoice counter's high-water mark, and
        never below 1 (index 0 is the operator's primary address) — so a
        pooled subaddress can never collide with one already handed to a
        live or historical invoice. Make sure your wallet's subaddress
        lookahead covers the `highestIndex` reported by
        `GET /admin/monero-pool/stats`, or deposits to the newest
        subaddresses become invisible to your wallet RPC.

        Like the shared pool, this pool self-heals: allocation triggers a
        background refill when a chain's available count drops below 3, so
        the explicit seed is mainly for pre-launch visibility. Released
        subaddresses observe a reuse cooldown
        (`MONERO_POOL_COOLDOWN_SECONDS`, default 3600; raised — never
        lowered — by the merchant's `addressCooldownSeconds`) before
        re-entering rotation, shrinking the late-payment misattribution
        window (Monero has no payment IDs, so a payment landing after the
        address was reused is irreducibly ambiguous).
      security:
        - AdminKey: []
      requestBody:
        required: false
        description: Empty or absent body permitted. Unknown fields are ignored; malformed JSON returns `BAD_JSON`.
        content:
          application/json:
            schema:
              type: object
              properties:
                initialSize:
                  type: integer
                  minimum: 1
                  maximum: 200
                  description: |
                    Target subaddress count per wired Monero chain AFTER the
                    call (a floor, not an increment). Omit to fall back to
                    the `MONERO_POOL_INITIAL_SIZE` env knob, then the
                    built-in default of 20.
      responses:
        "200":
          description: Top-up outcome per wired Monero chain (empty array when none are wired)
          content:
            application/json:
              schema:
                type: object
                required: [results]
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      required: [chainId, outcome, priorCount, added]
                      properties:
                        chainId:
                          type: integer
                          description: Synthetic Monero chainId (1000 mainnet, 1001 stagenet, 1002 testnet).
                        outcome:
                          type: string
                          enum: [topped-up, already-sufficient]
                        priorCount:
                          type: integer
                          description: Subaddress rows the chain's pool held before this call.
                        added:
                          type: integer
                          description: |
                            Rows actually inserted. Can be lower than
                            requested (even 0) when a concurrent refill held
                            the per-chain refill lock — re-check stats and
                            re-run if needed.
        "400":
          description: Malformed JSON (`BAD_JSON`), or `initialSize` out of range (`VALIDATION`)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/AdminNotConfigured" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "500":
          description: "`INTERNAL` — subaddress derivation or the pool insert failed"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /admin/monero-pool/stats:
    get:
      tags: [admin]
      summary: Per-chain Monero subaddress pool utilization
      description: |
        One array entry per Monero chainId that has at least one subaddress
        pool row, sorted by chainId ascending. Empty array until
        `POST /admin/monero-pool/initialize` (or the first self-healing
        refill) has run.

        `highestIndex` is the highest account-0 subaddress index ever
        derived on the chain — operators watch it against their wallet's
        subaddress LOOKAHEAD frontier: if the wallet's lookahead window is
        below this index, deposits to the newest subaddresses are invisible
        to the wallet RPC until the lookahead is extended.

        `available` counts by row status only — rows still inside their
        post-release cooldown are included here even though the allocator
        won't hand them out until the cooldown lapses. `quarantined` is a
        reserved status (no current code path parks Monero rows) and is 0
        in practice. The pool has NO hard size cap — it grows on demand so
        a paying customer is never rejected; a persistently large `total`
        (soft-warn at 200) means churn is outrunning reuse (raise
        `MONERO_POOL_INITIAL_SIZE` or lower `MONERO_POOL_COOLDOWN_SECONDS`).
      security:
        - AdminKey: []
      responses:
        "200":
          description: Subaddress pool statistics per Monero chain
          content:
            application/json:
              schema:
                type: object
                required: [stats]
                properties:
                  stats:
                    type: array
                    items:
                      type: object
                      required: [chainId, available, allocated, quarantined, total, highestIndex]
                      properties:
                        chainId:
                          type: integer
                          description: Synthetic Monero chainId (1000 mainnet, 1001 stagenet, 1002 testnet).
                        available: { type: integer }
                        allocated: { type: integer }
                        quarantined:
                          type: integer
                          description: Reserved status — always 0 today.
                        total: { type: integer }
                        highestIndex:
                          type: [integer, "null"]
                          description: Highest account-0 subaddress index derived on this chain.
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/AdminNotConfigured" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/utxo/repair-address-index:
    post:
      tags: [admin, utxo]
      summary: One-shot repair for the multi-family UTXO address_index bug
      description: |
        Fixes rows corrupted by the pre-migration-0006 multi-family bug:
        detection ingest used to stamp `utxos.address_index` (and migration
        0006 backfilled `invoice_receive_addresses.address_index`) with the
        invoice's legacy primary-family index. For universal invoices where
        UTXO was non-primary, that was the EVM/Tron/Solana counter value —
        unrelated to the BTC/LTC slot that actually minted the receive
        address. A wrong index breaks payout signing (the signer derives the
        key from the stored index).

        Per UTXO chain registered on the gateway, the repair:
          1. reads the chain's `address_index_counters.next_index` (upper
             bound on slots ever minted; 0 ⇒ nothing to repair);
          2. derives `address → index` for every slot from `MASTER_SEED`;
          3. rewrites any `invoice_receive_addresses` / `utxos` row whose
             stored `address_index` doesn't match the derived value.

        Idempotent — re-running after a successful repair is a no-op. Run it
        ONCE after deploying migration 0006 (or the equivalent collapsed
        baseline) on a database that had pre-fix multi-family UTXO payments.
        There is no request body and no dry-run mode.

        `unmatchedAddresses` lists rows whose address matches no derived
        slot — typically a different `MASTER_SEED` than at minting time,
        which this endpoint cannot repair (the operator would need the
        original seed). Those rows are left untouched.
      security:
        - AdminKey: []
      responses:
        "200":
          description: Per-chain repair report
          content:
            application/json:
              schema:
                type: object
                required: [chains, totalInvoiceRxFixed, totalUtxosFixed]
                properties:
                  chains:
                    type: array
                    items:
                      type: object
                      required: [chainId, counterValue, invoiceRxScanned, invoiceRxFixed, utxosScanned, utxosFixed, unmatchedAddresses]
                      properties:
                        chainId: { type: integer }
                        counterValue:
                          type: integer
                          description: The chain's next_index counter — HD slots ever minted. 0 means nothing to repair on this chain.
                        invoiceRxScanned: { type: integer }
                        invoiceRxFixed: { type: integer }
                        utxosScanned: { type: integer }
                        utxosFixed: { type: integer }
                        unmatchedAddresses:
                          type: array
                          items: { type: string }
                          description: Rows whose address matches no derived slot (likely a rotated MASTER_SEED). Left untouched.
                  totalInvoiceRxFixed: { type: integer }
                  totalUtxosFixed: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/AdminNotConfigured" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "500":
          description: INTERNAL — e.g. MASTER_SEED is not configured on this deployment
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /admin/debug/monero/inspect-tx:
    post:
      tags: [admin, monero]
      summary: Replay the Monero detection crypto against one tx (read-only)
      description: |
        Diagnostic twin of the cron's `scanIncoming`: fetches ONE tx by hash
        through the exact same daemon-RPC failover stack the cron uses, then
        reports step by step what the gateway's view-key scanner sees. For
        every output it derives the shared secret against BOTH the primary
        tx pubkey (tx_extra tag 0x01) and that output's additional pubkey
        (tag 0x04), compares the expected one-time output key against every
        candidate subaddress, and — on a match — decodes the RingCT
        encrypted amount.

        Use it when a payment landed on-chain but never ingested. The report
        answers, in order: did the RPC fetch succeed? Did the daemon know
        the tx? Did any (txPubkey, subaddress) pair produce a matching
        output key? Did the amount decode?

        There is no `txKey` field — this is receiver-side view-key
        scanning; the sender's per-tx secret is never needed.

        `addresses` defaults to EVERY `invoice_receive_addresses` row with
        family='monero' — including rows whose invoice has expired (this is
        forensics; the cron's hot path filters to live invoices). Pass an
        explicit list to test arbitrary primaries/subaddresses instead.

        Read-only: no DB writes, no cache changes, no ingestion. To actually
        credit a matched output, follow up with
        `POST /admin/debug/monero/force-ingest-tx`.

        Gotchas: RPC failure and tx-not-found both come back as HTTP 200
        with `ok: false` and a `step` marker — check `ok`, not just the
        status. The report includes derived per-output shared secrets;
        treat responses as sensitive operator material.
      security:
        - AdminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [txHash]
              properties:
                txHash:
                  type: string
                  pattern: "^[0-9a-fA-F]{64}$"
                  description: Monero tx hash to inspect (64 hex chars, case-insensitive; lowercased server-side).
                addresses:
                  type: array
                  items: { type: string }
                  description: |
                    Optional override list of Monero base58 addresses
                    (primaries or subaddresses) to match against. Omit to
                    test every family='monero' row in
                    invoice_receive_addresses. Unparseable entries are
                    skipped and listed in `gateway.skippedAddresses`.
            example:
              txHash: "b8e2d477b7d5cc24022bd76ea9e6f1c8c1e4f3a09d9d5b41c9e2b6ff01a3c579"
      responses:
        "200":
          description: |
            Inspection report. `ok: false` covers RPC failure and
            tx-not-found (with `step` naming the stage that failed);
            `ok: true` carries the full per-output match report.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    description: The RPC stage failed, or the daemon doesn't know the tx (wrong hash, orphaned, or not indexed by the public node).
                    properties:
                      ok: { type: boolean, description: Always false in this variant. }
                      step: { type: string, enum: [rpc.getTransactions] }
                      error: { type: string }
                      txHashRequested: { type: string, description: Echoed only on the tx-not-found variant. }
                  - type: object
                    description: Full match report.
                    properties:
                      ok: { type: boolean, description: Always true in this variant. }
                      tx:
                        type: object
                        properties:
                          txHash: { type: string }
                          blockHeight: { type: [integer, "null"], description: null = still in mempool. }
                          isCoinbase: { type: boolean }
                          primaryTxPubkey: { type: string, description: tx_extra tag 0x01 pubkey (hex 32 bytes). May be a decoy when every output pays a subaddress. }
                          additionalPubkeysCount: { type: integer }
                          additionalPubkeys:
                            type: array
                            items: { type: string }
                            description: Per-output tx pubkeys (tag 0x04); index i pairs with output i. Empty for legacy single-pubkey txs.
                          outputCount: { type: integer }
                      gateway:
                        type: object
                        properties:
                          network: { type: string, enum: [mainnet, stagenet, testnet] }
                          primarySpendPubHex: { type: string, description: The configured wallet's primary spend pubkey the gateway derives subaddresses from. }
                          liveSubaddressesChecked: { type: integer }
                          skippedAddresses:
                            type: array
                            items:
                              type: object
                              properties:
                                address: { type: string }
                                reason: { type: string }
                      outputs:
                        type: array
                        items:
                          type: object
                          properties:
                            outputIndex: { type: integer }
                            outputPublicKey: { type: string }
                            candidateKeys:
                              type: array
                              description: The tx pubkeys tested for this output.
                              items:
                                type: object
                                properties:
                                  source: { type: string, enum: [primary, additional] }
                                  txPubkey: { type: string }
                            matched:
                              oneOf:
                                - type: "null"
                                - type: object
                                  properties:
                                    addressStr: { type: string }
                                    via: { type: string, enum: [primary, additional] }
                                    sharedSecret: { type: string, description: Hex derivation secret — sensitive. }
                                    expectedOutputPubkey: { type: string }
                                    amountRaw: { type: [string, "null"], description: Decoded amount in piconero (1 XMR = 1e12). Null when the encrypted amount was absent or malformed. }
                                    amountDecodeError: { type: string, description: Present only when amount decode threw. }
                            nearMisses:
                              type: array
                              description: Up to 4 sample non-matching derivations per output. EC point comparison is match-or-unrelated — these exist for eyeballing, not for fuzzy matching.
                              items:
                                type: object
                                properties:
                                  source: { type: string, enum: [primary, additional] }
                                  subaddress: { type: string }
                                  expectedOutputPubkey: { type: string }
                      summary:
                        type: object
                        properties:
                          anyOutputMatched: { type: boolean }
                          matchedOutputs:
                            type: array
                            items:
                              type: object
                              properties:
                                outputIndex: { type: integer }
                                subaddress: { type: string }
                                via: { type: string, enum: [primary, additional] }
                                amountRaw: { type: [string, "null"] }
        "400":
          description: BAD_JSON (unparseable body) or BAD_TX_HASH (txHash is not a 64-hex-char string).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: MONERO_NOT_WIRED — no Monero adapter configured on this deployment — or admin surface not enabled (code `NOT_CONFIGURED` when ADMIN_KEY is unset).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/debug/monero/scan-state:
    get:
      tags: [admin, monero]
      summary: Show which Monero subaddresses the cron scans, plus scanner height lag
      description: |
        Answers "why isn't my Monero payment being detected?" in one call by
        exposing the gap between what is persisted in
        `invoice_receive_addresses` and what the cron's poll actually
        watches.

        The cron only scans subaddresses whose invoice is BOTH in a live
        status (`pending`/`processing`/`completed`) AND unexpired
        (`expiresAt > now`). An address failing either check silently drops
        out of the scan set — any payment sent to it afterwards is invisible
        to automatic detection. Every family='monero' address row is
        returned with `isLiveForPolling` and, when false, a human-readable
        `droppedReason` naming which check failed.

        `cron.lastScannedHeight` is the scanner's persisted cursor (cache
        key `monero:last_scanned_height:<chainId>`; null when the scanner
        has never completed a tick or the cache entry expired).
        `currentTipHeight` is fetched live from the daemon (best-effort;
        null when all RPC backends fail). `blocksBehindTip` is the lag — a
        growing value means the scanner is stalled or rate-limited.

        Payments to dropped addresses can be recovered manually with
        `POST /admin/debug/monero/force-ingest-tx`.
      security:
        - AdminKey: []
      responses:
        "200":
          description: Scan-state report
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  cron:
                    type: object
                    properties:
                      liveAddressCount: { type: integer, description: Subaddresses the cron scans right now. }
                      totalAddressCount: { type: integer }
                      droppedAddressCount: { type: integer }
                      lastScannedHeight: { type: [integer, "null"] }
                      currentTipHeight: { type: [integer, "null"] }
                      blocksBehindTip: { type: [integer, "null"], description: Null when either height is unknown; otherwise max(0, tip - cursor). }
                  addresses:
                    type: array
                    items:
                      type: object
                      properties:
                        address: { type: string }
                        addressIndex: { type: integer }
                        invoiceId: { type: string }
                        chainId: { type: integer, description: 1000 = Monero mainnet, 1001 = stagenet, 1002 = testnet. }
                        invoiceStatus: { type: [string, "null"], description: Null when the joined invoice row is missing. }
                        invoiceExpiresAt: { type: [integer, "null"], description: Epoch milliseconds. }
                        invoiceExpiresAtIso: { type: [string, "null"] }
                        invoiceCreatedAtIso: { type: [string, "null"] }
                        isLiveForPolling: { type: boolean }
                        droppedReason: { type: [string, "null"], description: Null when live; otherwise names the failed check (non-live status vs expiry, with timestamps). }
        "404":
          description: MONERO_NOT_WIRED — no Monero adapter configured on this deployment — or admin surface not enabled (code `NOT_CONFIGURED` when ADMIN_KEY is unset).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/debug/monero/force-ingest-tx:
    post:
      tags: [admin, monero]
      summary: Force-ingest a Monero tx's matched outputs (late-payment recovery)
      description: |
        Runs the same view-key output matching as the cron against ONE tx,
        then INGESTS every matched output through the standard
        `ingestDetectedTransfer` path — bypassing the cron's live-invoice
        filter. This is the recovery tool for the canonical failure mode
        surfaced by `/scan-state`: a customer paid a subaddress whose
        invoice had already expired, so the cron never saw the payment.

        Preconditions:
          - Monero adapter wired (else 404 MONERO_NOT_WIRED).
          - The daemon must know the tx (else 404 TX_NOT_FOUND). Mempool
            txs are accepted — blockNumber is recorded as 0 until mined.
          - Each output only ingests when it cryptographically matches a
            subaddress present in `invoice_receive_addresses` (any invoice
            status, no expiry filter) AND its RingCT amount decodes to a
            positive value. Non-matching outputs (change, other recipients)
            are reported `matched: false` and skipped.

        Effects of a successful ingest: a `transactions` row is written
        (token XMR, logIndex = output index, sender recorded as the
        placeholder `monero_unknown_sender`), attributed to the owning
        invoice when one exists or recorded as an orphan otherwise. The
        invoice's status recomputes through the standard path and merchant
        webhooks fire as configured — an expired invoice CAN flip as a
        result; be sure that's intended before running this.

        Idempotent: transactions are unique on (chainId, txHash, logIndex),
        so re-running reports already-credited outputs under
        `summary.duplicates` instead of double-crediting.
      security:
        - AdminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [txHash]
              properties:
                txHash:
                  type: string
                  pattern: "^[0-9a-fA-F]{64}$"
                  description: Monero tx hash to ingest (64 hex chars, case-insensitive; lowercased server-side).
            example:
              txHash: "b8e2d477b7d5cc24022bd76ea9e6f1c8c1e4f3a09d9d5b41c9e2b6ff01a3c579"
      responses:
        "200":
          description: Per-output match + ingest report
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  txHash: { type: string }
                  blockHeight: { type: [integer, "null"], description: null = mempool. }
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        outputIndex: { type: integer }
                        matched: { type: boolean }
                        subaddress: { type: string, description: Present when matched. }
                        amountRaw: { type: string, description: Piconero (1 XMR = 1e12). Present when the amount decoded. }
                        ingest:
                          type: object
                          description: Present when ingestion was attempted for this output.
                          properties:
                            inserted: { type: boolean }
                            transactionId: { type: string, description: New transactions row id; absent when not inserted. }
                            invoiceId: { type: [string, "null"], description: Null when the credit landed as an orphan row. }
                            error: { type: string, description: Present when this output's ingest failed (encrypted amount missing/wrong length, amount <= 0, or a thrown ingest error). }
                  summary:
                    type: object
                    properties:
                      outputsMatched: { type: integer }
                      ingested: { type: integer }
                      duplicates: { type: integer, description: Matched outputs with inserted=false and no error — already ingested (unique on chainId+txHash+logIndex) or suppressed by the payout-echo guard. }
                      errors: { type: integer }
        "400":
          description: BAD_JSON (unparseable body) or BAD_TX_HASH (txHash is not a 64-hex-char string).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: MONERO_NOT_WIRED (adapter not configured) or TX_NOT_FOUND (daemon returned no tx for this hash — wrong hash, orphaned, or not indexed by the public node) — or admin surface not enabled (code `NOT_CONFIGURED` when ADMIN_KEY is unset).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "502":
          description: RPC_FAILED — every configured Monero daemon backend failed the tx fetch.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /internal/cron/tick:
    post:
      tags: [internal]
      summary: Trigger the full scheduled-jobs sweep
      description: |
        HTTP trigger for external schedulers — Vercel Cron, Upstash
        QStash, a k8s CronJob's `curl`. Runs the exact same job sequence
        as the Workers `scheduled` handler and `Deno.cron`, so every
        scheduler gets identical behavior. No request body.

        Jobs run sequentially, in this order (detections must land before
        confirmations, confirmations before payout follow-ups):
        `warmRateCache → pollPayments → confirmTransactions →
        recheckConfirmedForReorg → executeReservedPayouts →
        reconcileUnknownBroadcastPayouts → confirmPayouts →
        reconcileFailedPayoutGasBurns → reconcileConfirmedPayoutGasBurns →
        sweepStuckPayoutReservations → sweepExpiredInvoices →
        reconcileOrphanedAllocations → reconcileOrphanedMoneroAllocations
        → sweepWebhookDeliveries → runAutoConsolidations`, plus
        `alchemySyncAddresses` (only when Alchemy Notify is configured).
        A missing optional key means "provider not wired", not failure.

        Every job is individually try/caught: one slow or failing provider
        can't mask the others, and the endpoint still returns **200** with
        that job's `{ ok: false, error }` outcome — alerting should
        inspect the per-job `ok` flags, not just the HTTP status. Per-job
        batch caps (~200 payouts / 200 txs / 100 webhook deliveries per
        tick) keep the sweep inside the Workers 30 s CPU budget; backlogs
        drain across successive ticks, so schedule this at least once a
        minute.

        Auth: `Authorization: Bearer <CRON_SECRET>`, constant-time
        compared (Vercel Cron sets the header automatically when
        `CRON_SECRET` is defined on the project). Not rate limited.
      security:
        - CronSecret: []
      responses:
        "200":
          description: |
            Sweep completed. Per-job failures are still 200 — check each
            outcome's `ok`.
          content:
            application/json:
              schema:
                type: object
                required: [ok, result]
                properties:
                  ok: { type: boolean, const: true }
                  result:
                    type: object
                    description: |
                      One key per job, in the run order listed in the
                      endpoint description. `alchemySyncAddresses` is
                      present only when Alchemy Notify is configured.
                    additionalProperties:
                      type: object
                      required: [ok]
                      properties:
                        ok: { type: boolean }
                        value:
                          description: |
                            Job-specific result payload, present when `ok`
                            is true. Shape varies per job (counts, swept
                            ids, ...) — treat as opaque diagnostics.
                        error:
                          type: string
                          description: Failure message, present when `ok` is false.
        "401":
          description: Missing or wrong Bearer token (`UNAUTHORIZED`)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: Cron endpoint not enabled — `CRON_SECRET` not set (`NOT_CONFIGURED`)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

components:
  securitySchemes:
    MerchantApiKey:
      type: http
      scheme: bearer
      description: |
        Merchant API key returned once at `POST /admin/merchants`.
        Also accepted as `X-API-Key: <key>`.
    AdminKey:
      type: http
      scheme: bearer
      description: Shared admin key from `ADMIN_KEY` env. Also accepted as `X-Admin-Key`.
    AlchemySignature:
      type: apiKey
      in: header
      name: X-Alchemy-Signature
      description: HMAC-SHA256 hex of the raw body under the per-webhook signing key stored in `alchemy_webhook_registry` (looked up by the payload's top-level `webhookId` — NOT one nested under `event`).
    CronSecret:
      type: http
      scheme: bearer
      description: Shared secret from `CRON_SECRET` env.

  headers:
    X-Request-Id:
      description: UUID correlation id. Accepts a caller-supplied value if it's a valid UUID; otherwise minted.
      schema: { type: string, format: uuid }
    X-RateLimit-Limit:
      description: Window cap for this route's rate-limit scope
      schema: { type: integer }
    X-RateLimit-Remaining:
      description: Requests left in the current window after this one
      schema: { type: integer }
    X-RateLimit-Reset:
      description: Unix seconds when the window rolls
      schema: { type: integer }

  responses:
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    MerchantInactive:
      description: Merchant is deactivated
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Entity not found (or not owned by this merchant)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    ValidationError:
      description: Request body failed schema validation
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    RateLimited:
      description: Too many requests in the current window
      headers:
        Retry-After:
          description: Seconds until the window rolls
          schema: { type: integer }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    AdminNotConfigured:
      description: |
        Admin surface not enabled — `ADMIN_KEY` env is unset, so every
        `/admin` route answers 404 with code `NOT_CONFIGURED`
        (fail-closed; deliberately indistinguishable from a nonexistent
        route).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    Merchant:
      type: object
      description: |
        Merchant row as returned by the admin GET endpoints. Secret-adjacent
        fields (`api_key_hash`, `webhook_secret_ciphertext`) are never
        included.
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        webhookUrl: { type: [string, "null"] }
        active: { type: boolean }
        paymentToleranceUnderBps: { type: integer, minimum: 0, maximum: 2000 }
        paymentToleranceOverBps: { type: integer, minimum: 0, maximum: 2000 }
        addressCooldownSeconds: { type: integer, minimum: 0, maximum: 604800 }
        confirmationThresholds:
          type: [object, "null"]
          additionalProperties:
            type: integer
            minimum: 1
            maximum: 10000
          description: Per-chain confirmation override map (or `null`).
        confirmationTiers:
          type: [object, "null"]
          additionalProperties:
            type: array
            items: { type: object }
          description: Per-(chain, token) amount-tiered confirmation rules (or `null`).
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code]
          properties:
            code: { type: string, description: Stable machine-readable code }
            message: { type: string }
            details:
              type: [object, array]
              additionalProperties: true
              description: |
                Optional per-code payload. `VALIDATION` errors carry the
                Zod issues ARRAY here; other codes attach an object (e.g.
                `POOL_EXHAUSTED`'s `{ family, hint }`).

    PoolAddressAdminView:
      type: object
      required: [family, address, addressIndex, status, disabledAt, allocatedToInvoiceId]
      properties:
        family: { type: string, enum: [evm, tron, solana, utxo] }
        address: { type: string }
        addressIndex: { type: integer }
        status: { type: string, enum: [available, allocated, quarantined] }
        disabledAt:
          type: [integer, "null"]
          description: Epoch ms when disabled; null = not disabled.
        allocatedToInvoiceId:
          type: [string, "null"]

    AutoConsolidationSchedule:
      type: object
      required:
        - id
        - chainId
        - token
        - targetAddress
        - intervalHours
        - minSourceBalanceRaw
        - maxSourcesPerRun
        - enabled
        - nextRunDue
        - createdAt
        - updatedAt
      properties:
        id: { type: string, format: uuid }
        chainId: { type: integer }
        token: { type: string }
        targetAddress: { type: string }
        intervalHours:
          type: integer
          minimum: 1
          maximum: 720
        minSourceBalanceRaw:
          type: string
          description: Per-source dust floor in token's smallest unit.
        maxFeeUsd:
          type: [string, "null"]
          description: |
            Gas ceiling as a USD decimal string, or null for no ceiling. When
            set, the cron defers firing while the live low-tier fee exceeds it.
        maxSourcesPerRun:
          type: integer
          description: Cap on legs planned per cron tick.
        enabled: { type: boolean }
        lastRunAt:
          type: [integer, "null"]
          description: Epoch ms of the most recent cron firing. NULL until first run.
        lastConsolidationId:
          type: [string, "null"]
          description: |
            UUID of the consolidationId returned by the most recent firing.
            Use with GET /admin/pool/consolidations/{id} for full per-leg
            status of the most recent run.
        lastLegCount:
          type: [integer, "null"]
          description: How many legs the most recent firing planned.
        lastSkippedCount:
          type: [integer, "null"]
          description: How many sources the most recent firing skipped (per-leg failures).
        lastSkippedReasons:
          type: [array, "null"]
          description: |
            Per-leg skip reasons from the most recent firing. Capped at
            50 entries server-side. NULL when the most recent firing had
            zero skips, OR when the schedule hasn't fired yet. Most
            common reasons:
              - `NO_GAS_SPONSOR_AVAILABLE` — source holds the token but
                no native; no other pool address (or fee wallet on Tron)
                has enough native to top it up. Fix by funding a sponsor.
              - `INSUFFICIENT_BALANCE_ANY_SOURCE` — race; balance moved
                between discovery and plan. Self-heals next tick.
              - `INVALID_DESTINATION` — operator-supplied targetAddress
                stopped validating (rare; would also break manual flow).
            Each entry: `{ sourceAddress, amountRaw, reason }`.
          items:
            type: object
            required: [sourceAddress, amountRaw, reason]
            properties:
              sourceAddress: { type: string }
              amountRaw:
                type: string
                description: Source's token balance (smallest unit) at fire time.
              reason:
                type: string
                description: "Error code + message, e.g. `NO_GAS_SPONSOR_AVAILABLE: Token holder exists but no sponsor has enough native to top it up.`"
        nextRunDue:
          type: integer
          description: Epoch ms when the cron will next attempt to fire this schedule.
        createdAt: { type: integer }
        updatedAt: { type: integer }

    CreateInvoiceInput:
      type: object
      description: |
        Provide EXACTLY ONE pricing mode:
          - `amountUsd` — USD-pegged. Pair with `acceptedFamilies` to make the
            invoice payable from any family/token the gateway supports. Rates
            are pinned for 10 minutes at creation (refreshed per detection
            window afterward).
          - `amountRaw` — legacy single-token. Payer must pay in `token` on
            `chainId`, exact amount.
          - `fiatAmount` + `fiatCurrency` — legacy fiat-quoted. Converted to
            a token amount at creation via the price oracle; the applied rate
            is echoed on the invoice as `quotedRate`.

        Zero or multiple pricing modes → 400 `VALIDATION`. `merchantId` is
        never read from the body — it is injected from the API key.
      required: [chainId, token]
      properties:
        chainId:
          type: integer
          description: |
            Primary chain. Must be wired in the deployment. Determines the
            primary family and the legacy `chainId` + `receiveAddress`
            denormalization on the response.
        token:
          type: string
          pattern: "^[A-Z0-9]+$"
          maxLength: 16
          description: |
            Any symbol registered on this `chainId`, including native gas
            tokens (ETH/POL/BNB/AVAX/TRX/SOL/BTC/LTC/XMR) — natives are
            first-class alongside USDC/USDT. Discover the valid symbols per
            chain via `GET /admin/chains` (each row's `tokens` array).
        amountUsd:
          type: string
          pattern: "^\\d+(\\.\\d{1,8})?$"
          description: |
            USD-pegged target — the invoice can be settled in **any
            combination** of registered tokens at the receive address. Each
            transfer is converted to USD via the rate snapshot at detection
            time and summed. e.g. $50 USDC + $50 ETH satisfies a $100
            invoice. Pair with `acceptedFamilies` to span every wired chain.
        acceptedFamilies:
          type: array
          items: { type: string, enum: [evm, tron, solana, utxo, monero] }
          minItems: 1
          description: |
            Families the invoice will accept payment from. Each accepted
            family gets one allocated receive address — except UTXO as a
            non-primary family, which gets one address per wired UTXO chain
            (BTC + LTC simultaneously; their address formats differ). Omit
            for single-family (derived from `chainId`'s family). Every
            listed family must have a wired chain adapter or the request
            fails 400 `TOKEN_NOT_SUPPORTED`.

            Token-availability rule: with `amountRaw` / `fiatAmount`
            (legacy single-token), `token` must be registered on EVERY
            accepted family; with `amountUsd`, only on the primary chain's
            family (other families pay in their own natives + stables).
        amountRaw:
          type: string
          pattern: "^\\d+$"
          description: |
            Raw token amount in smallest units (wei for 18-dec ETH/POL/BNB/AVAX,
            sun for TRX, lamports for SOL, micro-units for 6-dec USDC/USDT).
            Single-token invoices: only the quoted `token` credits toward this
            target — wrong-token transfers at the receive address are logged for
            audit but ignored. Use `amountUsd` if you want universal acceptance.
        fiatAmount:
          type: string
          pattern: "^\\d+(\\.\\d+)?$"
          description: Fiat amount as a decimal string (e.g. "49.99"). Requires `fiatCurrency`.
        fiatCurrency:
          type: string
          pattern: "^[A-Z]{3}$"
          description: ISO-4217 currency code, uppercase (e.g. "USD").
        externalId:
          type: string
          maxLength: 256
          description: |
            Merchant's opaque reference (e.g. cart id). Doubles as a Stripe-
            style idempotency key: a second `POST /api/v1/invoices` from the
            same merchant with the same `externalId` returns the original
            invoice (HTTP 201 again, identical body) instead of creating a
            duplicate. Safe to retry on network errors. Omit it and every
            POST creates a new invoice.
        metadata:
          type: object
          additionalProperties: true
          description: |
            Opaque merchant JSON, echoed on merchant reads. Never exposed on
            the public checkout view.
        expiresInMinutes:
          type: integer
          minimum: 1
          maximum: 1440
          default: 30
          description: Hard ceiling 24h — the scheduler sweeps long-expired invoices.
        webhookUrl:
          type: string
          format: uri
          description: |
            Per-invoice webhook destination override. When set, dispatch for
            this invoice's events goes here instead of the merchant-account
            webhook. Must be supplied together with `webhookSecret` — passing
            one without the other is a 400. Echoed in responses; the secret is
            never returned.
        webhookSecret:
          type: string
          minLength: 16
          maxLength: 512
          writeOnly: true
          description: |
            HMAC secret paired with `webhookUrl`. Encrypted at rest and never
            echoed back. Required if `webhookUrl` is set.
        paymentToleranceUnderBps:
          type: integer
          minimum: 0
          maximum: 2000
          description: |
            Per-invoice under-payment tolerance override in basis points. Omit
            to inherit the merchant default (snapshotted at create time). See
            `POST /admin/merchants` for the math semantics.
        paymentToleranceOverBps:
          type: integer
          minimum: 0
          maximum: 2000
          description: |
            Per-invoice over-payment tolerance override in basis points. Omit
            to inherit the merchant default.

    Invoice:
      type: object
      description: |
        Merchant view of an invoice, as serialized by every
        `/api/v1/invoices*` response. All monetary fields are decimal
        strings (never floats); timestamps are ISO-8601 date-time strings.
        Every field below is always present (null-capable ones carry `null`).
      required:
        [id, merchantId, status, extraStatus, chainId, token, receiveAddress,
         addressIndex, acceptedFamilies, receiveAddresses, requiredAmountRaw,
         receivedAmountRaw, fiatAmount, fiatCurrency, quotedRate, amountUsd,
         paidUsd, overpaidUsd, rateWindowExpiresAt, rates, externalId,
         metadata, webhookUrl, paymentToleranceUnderBps,
         paymentToleranceOverBps, confirmationThreshold, confirmationTiers,
         createdAt, expiresAt, confirmedAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        merchantId: { type: string, format: uuid }
        status:
          type: string
          enum: [pending, processing, completed, expired, canceled]
          description: |
            Lifecycle stage:
              - `pending`     — no on-chain activity yet
              - `processing`  — at least one tx seen (may be `partial` per
                                 `extraStatus`); threshold not yet met OR
                                 met but unconfirmed
              - `completed`   — confirmed payment ≥ threshold (within
                                 tolerance). Overpaid invoices read as
                                 `completed` with `extraStatus='overpaid'`.
              - `expired`     — past `expiresAt` with no completion
              - `canceled`    — merchant aborted via admin route
        extraStatus:
          type: [string, "null"]
          enum: [partial, overpaid, null]
          description: |
            Payment-fidelity signal, orthogonal to `status`:
              - `null`        — normal flow, nothing special
              - `"partial"`   — `0 < paid < threshold` (paired with
                                 `status='processing'`)
              - `"overpaid"`  — `paid > threshold × (1 + over_bps/10000)`
                                 (paired with `status='completed'`)
        chainId:
          type: integer
          description: Primary chain (the one named at create time). Multi-family invoices carry the full set in `receiveAddresses`.
        token: { type: string }
        receiveAddress:
          type: string
          description: Primary family's receive address, denormalized for single-chain clients. Authoritative set = `receiveAddresses`.
        addressIndex:
          type: integer
          description: HD derivation index of the primary receive address.
        acceptedFamilies:
          type: array
          items: { type: string, enum: [evm, tron, solana, utxo, monero] }
          description: Families this invoice accepts payment on. Derived from `receiveAddresses` (deduped).
        receiveAddresses:
          type: array
          description: |
            One entry per accepted family — except UTXO, which yields one
            entry per wired UTXO chain (BTC and LTC addresses are
            structurally different). Sorted by family, then chainId.
          items:
            type: object
            required: [family, chainId, address, poolAddressId]
            properties:
              family: { type: string, enum: [evm, tron, solana, utxo, monero] }
              chainId:
                type: integer
                description: |
                  Informational on EVM/Tron/Solana rows (the address is valid
                  on every chain in the family); authoritative on UTXO rows
                  (each chain derives a different address).
              address: { type: string }
              poolAddressId:
                type: [string, "null"]
                format: uuid
                description: |
                  Backing `address_pool` row. Null on UTXO rows
                  (fresh-per-invoice derivation, never pooled) and Monero
                  rows (dedicated subaddress pool).
              addressIndex:
                type: integer
                description: |
                  HD derivation index backing this entry. Present ONLY on
                  the fresh-create `POST /api/v1/invoices` 201 response;
                  GET / list / expire / idempotent-replay responses hydrate
                  the documented four fields from the DB and omit it.
        requiredAmountRaw:
          type: string
          description: |
            Legacy single-token target in the token's smallest units. `"0"`
            on USD-path invoices (the authoritative target is `amountUsd`).
        receivedAmountRaw:
          type: string
          description: Sum of confirmed inbound raw-unit transfers (legacy single-token axis).
        fiatAmount: { type: [string, "null"] }
        fiatCurrency: { type: [string, "null"] }
        quotedRate:
          type: [string, "null"]
          description: Token/fiat rate pinned at creation. Non-null only on fiat-quoted invoices.
        amountUsd:
          type: [string, "null"]
          description: USD target. Non-null only on USD-path invoices.
        paidUsd:
          type: string
          description: |
            Sum of confirmed transactions' USD value. Always present —
            `"0"` on fresh invoices and on legacy invoices that never
            aggregate USD.
        overpaidUsd:
          type: string
          description: max(paidUsd - amountUsd, 0). Always present — `"0"` unless overpaid.
        rateWindowExpiresAt:
          type: [string, "null"]
          format: date-time
          description: |
            When the current 10-minute pinned-rate window closes. Null on
            legacy invoices. Detection refreshes the window past expiry.
        rates:
          type: [object, "null"]
          additionalProperties: { type: string }
          description: |
            Pinned USD-per-token rates for this invoice's window (USD-path
            only). Keys are token symbols, values are decimal strings.
        externalId: { type: [string, "null"] }
        metadata: { type: [object, "null"] }
        webhookUrl:
          type: [string, "null"]
          format: uri
          description: |
            Per-invoice webhook URL override (echo-only). Null when the
            invoice falls back to the merchant-account webhook. The matching
            secret is write-only and never returned.
        paymentToleranceUnderBps:
          type: integer
          minimum: 0
          maximum: 2000
          description: |
            Effective under-payment tolerance for this invoice in basis points
            (snapshot of merchant default or per-invoice override at create time).
        paymentToleranceOverBps:
          type: integer
          minimum: 0
          maximum: 2000
          description: |
            Effective over-payment tolerance for this invoice in basis points
            (snapshot of merchant default or per-invoice override at create time).
        confirmationThreshold:
          type: [integer, "null"]
          minimum: 1
          description: |
            Confirmations required for a transfer paying this invoice to flip
            `detected` → `confirmed`. Snapshotted at create time (merchant
            per-chain override → env override → chain default) and frozen for
            the invoice's lifetime; applies to every accepted family. Null
            only on pre-migration rows.
        confirmationTiers:
          type: [object, "null"]
          description: |
            Snapshot of the merchant's amount-tiered confirmation rules at
            create time, keyed by `"{chainId}:{TOKEN}"`. Each transfer is
            matched against its key's rule list (first match wins); no match
            falls back to `confirmationThreshold`. Null = no tiers.
          additionalProperties:
            type: array
            items:
              type: object
              required: [confirmations]
              properties:
                amount: { type: string }
                op: { type: string, enum: ["<", "<=", ">", ">=", "=", "<>"] }
                confirmations: { type: integer, minimum: 1 }
        createdAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        confirmedAt: { type: [string, "null"], format: date-time }
        updatedAt: { type: string, format: date-time }

    InvoiceAmountsBreakdown:
      type: object
      description: |
        USD-axis breakdown of an invoice's progress. All fields null on legacy
        single-token invoices (use `requiredAmountRaw` / `receivedAmountRaw`
        on the invoice itself for those).
      properties:
        requiredUsd: { type: [string, "null"] }
        confirmedUsd:
          type: [string, "null"]
          description: Sum of CONFIRMED contributing transactions' USD values.
        confirmingUsd:
          type: [string, "null"]
          description: Sum of DETECTED-but-not-yet-confirmed transactions' USD values.
        remainingUsd:
          type: [string, "null"]
          description: max(requiredUsd - confirmedUsd, 0).
        overpaidUsd:
          type: [string, "null"]
          description: max(confirmedUsd - requiredUsd, 0).

    InvoiceTransaction:
      type: object
      description: |
        One on-chain payment tied to the invoice. All statuses (`detected`,
        `confirmed`, `reverted`, `orphaned`) are returned so debugging can
        see rows that no longer count toward the invoice total.
      properties:
        id: { type: string, format: uuid }
        txHash: { type: string }
        logIndex: { type: [integer, "null"] }
        chainId: { type: integer }
        chain:
          type: [string, "null"]
          description: Short slug like `ethereum`, `polygon`, `tron`, `solana`. Null if chainId is unknown to the registry.
        token: { type: string }
        fromAddress: { type: string }
        toAddress: { type: string }
        amountRaw:
          type: string
          description: Raw integer string in the token's smallest units.
        amount:
          type: string
          description: Human-readable decimal (e.g. `"1"`, `"0.04"`). Convenience for UIs.
        amountUsd:
          type: [string, "null"]
          description: USD valuation pinned at detection time.
        usdRate: { type: [string, "null"] }
        status:
          type: string
          enum: [detected, confirmed, reverted, orphaned]
        confirmations: { type: integer }
        blockNumber: { type: [integer, "null"] }
        detectedAt: { type: string, format: date-time }
        confirmedAt: { type: [string, "null"], format: date-time }

    InvoiceDetails:
      type: object
      description: Hydrated GET response — invoice plus USD breakdown plus per-tx detail.
      required: [invoice, amounts, transactions]
      properties:
        invoice: { $ref: "#/components/schemas/Invoice" }
        amounts: { $ref: "#/components/schemas/InvoiceAmountsBreakdown" }
        transactions:
          type: array
          items: { $ref: "#/components/schemas/InvoiceTransaction" }

    PublicInvoice:
      type: object
      description: |
        Public checkout projection of an invoice — everything a hosted
        checkout page needs and nothing merchant-private. Compared to the
        merchant `Invoice` shape this deliberately EXCLUDES `merchantId`,
        `externalId`, `metadata`, `webhookUrl`, tolerance/confirmation
        policy fields, `addressIndex`, `quotedRate` and `updatedAt`; its
        `receiveAddresses` entries carry only `family` + `address`.
      required:
        [id, status, extraStatus, chainId, token, receiveAddress,
         acceptedFamilies, receiveAddresses, requiredAmountRaw,
         receivedAmountRaw, fiatAmount, fiatCurrency, amountUsd, paidUsd,
         overpaidUsd, rates, rateWindowExpiresAt, payableTokens, createdAt,
         expiresAt, confirmedAt]
      properties:
        id: { type: string, format: uuid }
        status:
          type: string
          enum: [pending, processing, completed, expired, canceled]
        extraStatus:
          type: [string, "null"]
          enum: [partial, overpaid, null]
          description: Payment-fidelity signal (`partial` while processing, `overpaid` on completed).
        chainId:
          type: integer
          description: Primary chain id — a label for simple single-chain UIs.
        token: { type: string }
        receiveAddress:
          type: string
          description: |
            Primary family's address. Simple UIs can render just this +
            `chainId`; multi-family UIs should render `receiveAddresses`.
        acceptedFamilies:
          type: array
          items: { type: string, enum: [evm, tron, solana, utxo, monero] }
        receiveAddresses:
          type: array
          description: |
            One gateway-owned address per accepted family (UTXO: per chain).
            Render all of them so the payer chooses which chain to pay on.
          items:
            type: object
            required: [family, address]
            properties:
              family: { type: string, enum: [evm, tron, solana, utxo, monero] }
              address: { type: string }
        requiredAmountRaw:
          type: string
          description: Legacy single-token target in raw units. `"0"` on USD-path invoices.
        receivedAmountRaw: { type: string }
        fiatAmount: { type: [string, "null"] }
        fiatCurrency: { type: [string, "null"] }
        amountUsd:
          type: [string, "null"]
          description: USD target. Non-null only on USD-path invoices.
        paidUsd:
          type: string
          description: Confirmed USD received so far (`"0"` on fresh/legacy invoices).
        overpaidUsd: { type: string }
        rates:
          type: [object, "null"]
          additionalProperties: { type: string }
          description: |
            Pinned USD-per-token rates for the current window, keyed by token
            symbol. Null on legacy (non-USD) invoices.
        rateWindowExpiresAt:
          type: [string, "null"]
          format: date-time
          description: When the pinned rates (and `payableTokens` amounts) expire.
        payableTokens:
          type: [array, "null"]
          items: { $ref: "#/components/schemas/PayableToken" }
          description: |
            USD-path only (null otherwise): every "pay with TOKEN on CHAIN"
            option the deployment can settle for this invoice, priced at the
            pinned rates. Sorted family → chainId → token. Lets the UI render
            a chooser like "Pay 100.00 USDC on Polygon" / "Pay 0.04 ETH on
            Ethereum" without knowing token decimals or doing rate math.
        createdAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        confirmedAt: { type: [string, "null"], format: date-time }

    PlanPayoutInput:
      type: object
      required: [chainId, token, destinationAddress]
      description: |
        Shared request body for `POST /api/v1/payouts` and
        `POST /api/v1/payouts/estimate`. The server-side schema rejects
        unknown keys with 400 `VALIDATION` — but it is the same zod schema
        the gateway's internal consolidation machinery uses, so the two
        internal-only keys documented at the bottom (`forceSourceAddress`,
        `internalKind`) are ALSO accepted on the public routes. A
        `merchantId` key is tolerated but always overwritten from the API
        key — it can never target another merchant.

        Provide **exactly one** of `amountRaw`, `amount`, or `amountUSD`
        (none, or more than one, → 400 `VALIDATION`).
        - `amountRaw` — integer string in the token's smallest unit (e.g. `"1000000"` for 1 USDC).
        - `amount` — human decimal string (e.g. `"1.5"`); converted via BigInt
          against `token.decimals`. Must not have more decimal places than the
          token supports — e.g. USDC (6 decimals) accepts up to 6; rejected
          with `BAD_AMOUNT` (400) otherwise.
        - `amountUSD` — fiat-pegged decimal string (e.g. `"10.00"`); converted
          via the price oracle at create time. The resolved rate is
          snapshotted onto `quotedRate` and `quotedAmountUsd` for audit.
          Supported on **all** tokens (stable + volatile). For non-stable
          tokens (ETH/MATIC/…) the actual broadcast happens seconds-to-minutes
          later, so the executed payout's market value drifts from
          `amountUSD` — accepted as v1 cost. If the oracle is unavailable, the
          create fails with `503 ORACLE_FAILED`; we never substitute a stale
          rate.
      properties:
        chainId:
          type: integer
          minimum: 1
          description: Must be a positive integer — 0 or negative values fail 400 `VALIDATION` before any registry lookup.
        token:
          type: string
          minLength: 1
          maxLength: 16
          pattern: "^[A-Z0-9]+$"
          description: |
            Any symbol registered on this `chainId`, including native gas
            tokens (ETH/POL/BNB/AVAX/TRX/SOL/BTC/LTC) — natives are
            first-class for payouts, not just stablecoins. Discover the valid
            symbols per chain via `GET /admin/chains` (each row's `tokens`
            array). Malformed symbols (lowercase, longer than 16 chars,
            non-alphanumeric) fail 400 `VALIDATION` before the registry
            check; well-formed unknown symbols → 400 `TOKEN_NOT_SUPPORTED`.
        amountRaw:
          type: string
          pattern: "^\\d+$"
          description: Smallest-unit integer string. Mutually exclusive with `amount` / `amountUSD`.
        amount:
          type: string
          pattern: "^(0|[1-9]\\d*)(\\.\\d+)?$"
          description: Human decimal. Mutually exclusive with `amountRaw` / `amountUSD`.
        amountUSD:
          type: string
          pattern: "^(0|[1-9]\\d*)(\\.\\d+)?$"
          description: Fiat-pegged decimal. Mutually exclusive with `amountRaw` / `amount`.
        destinationAddress:
          type: string
          minLength: 1
          maxLength: 128
          description: |
            Canonicalized and validated against the chain family before the
            plan is accepted; failures reject with 400 `INVALID_DESTINATION`.
            EVM accepts 0x-hex, Tron base58, Solana base58; UTXO chains
            accept native-segwit bech32 only (`bc1q…` / `ltc1q…` — legacy
            and P2SH-segwit destinations are not supported in v1). Monero
            chains reject the whole plan with 400
            `PAYOUT_NOT_SUPPORTED_ON_FAMILY` (inbound-only in v1).
        feeTier:
          type: string
          enum: [low, medium, high]
          description: |
            Optional fee tier for the broadcast tx. Meaningful today on chains
            whose `tieringSupported` flag (from `GET /admin/chains` or
            `POST /payouts/estimate`) is `true` — **EVM** binds
            maxFeePerGas/maxPriorityFeePerGas at this tier via
            `estimateFeesPerGas`-scaled multipliers (0.8× / 1.0× / 1.5×);
            **Solana** binds a `setComputeUnitPrice` instruction at the 25th
            / 50th / 75th percentile of recent prioritization fees; **UTXO**
            picks the tier's sat/vB rate for coinselect. **Tron** has no
            tier concept — the field is accepted for uniformity but has no
            effect on broadcast.
            When omitted, the planner still budgets gas at `medium` for
            source selection; the persisted row's `feeTier` stays null on
            account-model chains (UTXO rows record `medium`), and the
            broadcast uses the chain default (viem's default on EVM; no
            priority fee on Solana).
        batchId:
          type: string
          minLength: 1
          maxLength: 64
          description: |
            Optional grouping id. Set automatically by `POST /payouts/batch`
            (same UUID on every row of a batch); ALSO honored on the
            single-create path — the value is persisted verbatim on the row
            and filterable via `GET /payouts?batchId=<id>`.
        webhookUrl:
          type: string
          format: uri
          description: |
            Per-payout webhook destination override. When set, dispatch for
            this payout's events goes here instead of the merchant-account
            webhook. Must be supplied together with `webhookSecret` — passing
            one without the other is a 400. Echoed in responses; the secret is
            never returned. SSRF-guarded: URLs pointing at loopback /
            link-local / cloud-metadata addresses are rejected with
            `INVALID_DESTINATION` at plan time.
        webhookSecret:
          type: string
          minLength: 16
          maxLength: 512
          writeOnly: true
          description: |
            HMAC secret paired with `webhookUrl`. Encrypted at rest and never
            echoed back. Required if `webhookUrl` is set.
        forceSourceAddress:
          type: string
          minLength: 1
          maxLength: 128
          description: |
            RESERVED — internal. Pins the HD funding source instead of
            letting the planner pick one; used by the gateway's own
            consolidation sweeps. Accepted (not rejected) on the public
            routes, but merchants MUST NOT set it — its behavior on
            merchant payouts is unsupported and may change without notice.
        internalKind:
          type: string
          enum: [consolidation_sweep]
          description: |
            RESERVED — internal. Marks the row as an internal consolidation
            sweep: it is hidden from `GET /api/v1/payouts` (which returns
            only `standard` rows), cannot be canceled via
            `POST /api/v1/payouts/{id}/cancel` (404 `PAYOUT_NOT_FOUND`),
            and confirms at the internal 1-confirmation threshold. Accepted
            on the public routes for the internal machinery's benefit;
            merchants MUST NOT set it — behavior may change without notice.

    PayoutFeeEstimate:
      type: object
      description: |
        Fee-tier quote + source preview for a hypothetical payout. Returned
        by `POST /api/v1/payouts/estimate`. The planner's `selectSource`
        runs in dry-run mode here so the response shows EXACTLY what would
        happen on a real plan: which HD address would fund the payout,
        whether a JIT gas top-up is needed, and what alternatives exist.
        On UTXO chains the preview is aggregate-level (see `source`).
      required: [amountRaw, quotedAmountUsd, quotedRate, tiers, source, alternatives, warnings]
      properties:
        amountRaw:
          type: string
          description: Resolved raw amount for the quoted payout, in the token's smallest unit.
        quotedAmountUsd: { type: [string, "null"] }
        quotedRate: { type: [string, "null"] }
        tiers:
          type: object
          required: [tieringSupported, nativeSymbol, low, medium, high]
          properties:
            tieringSupported:
              type: boolean
              description: |
                False on chains without a fee-priority concept (Tron), on
                Solana with no recent samples, and whenever the fee quote
                failed (then all three tiers are `"0"` and `warnings`
                carries `fee_quote_unavailable`).
            nativeSymbol: { type: string, description: "ETH / POL / BNB / AVAX / TRX / SOL / BTC / LTC." }
            low: { $ref: "#/components/schemas/PayoutFeeQuoteTier" }
            medium: { $ref: "#/components/schemas/PayoutFeeQuoteTier" }
            high: { $ref: "#/components/schemas/PayoutFeeQuoteTier" }
        source:
          type: [object, "null"]
          description: |
            HD address the planner would pick. Null when no candidate has
            enough token balance (see `warnings`).

            On UTXO chains there is no per-address source — the field is a
            synthetic aggregate with `address: "<utxo-aggregate>"` and the
            sentinel `derivationIndex: -1`; `tokenBalance` /
            `nativeBalance` both carry the total confirmed spendable UTXO
            balance in sats.
          required: [address, derivationIndex, tokenBalance, nativeBalance, feeCoveredByDelegatedEnergy]
          properties:
            address: { type: string }
            derivationIndex: { type: integer, description: "-1 on the synthetic UTXO aggregate." }
            tokenBalance: { type: string, description: "Spendable token balance (smallest units, ledger-derived)." }
            nativeBalance: { type: string }
            feeCoveredByDelegatedEnergy:
              type: boolean
              description: |
                True when this source has enough delegated chain
                resources to broadcast the token transfer WITHOUT
                burning native gas — Tron's delegated-energy model.

                When true, the chain-level `tiers` quote does NOT
                apply to this source: the real broadcast cost is ~0
                (just bandwidth, normally covered by the free daily
                allowance). The frontend should render "$0 — covered
                by delegated energy" for this source instead of the
                `tiers` figure. The `tiers` block is a CHAIN-level
                worst-case quote — on Tron it always returns the
                burn-all-SUN figure (~20 TRX) because it can't know
                which source the picker will choose. Always false on
                non-Tron chains and for native-asset payouts.
        topUp:
          type: object
          description: |
            Set ONLY when the chosen source lacks native gas and a separate
            sponsor address must top it up before the main tx (token payouts
            on account-model chains; never for native payouts or UTXO).
            Omitted entirely when the source has both token and gas.
            `sponsor: null` means a token-holding source exists but no
            funded sponsor — payout would fail with
            `NO_GAS_SPONSOR_AVAILABLE` if planned; in that case `amountRaw`
            is the uncovered gas gap rather than the gap + cushion.
          required: [required, sponsor, amountRaw]
          properties:
            required: { type: boolean, enum: [true] }
            sponsor:
              type: [object, "null"]
              required: [address, nativeBalance]
              properties:
                address: { type: string }
                nativeBalance: { type: string }
            amountRaw: { type: string, description: "Native amount the sponsor would send to the source (gas gap + 20% cushion when a sponsor exists)." }
        alternatives:
          type: array
          maxItems: 4
          description: |
            Next-best HD source candidates by token balance descending,
            for operator visibility. The picker would only fall back to
            these on race or when the chosen `source` has insufficient
            spendable at insert time. Always empty on UTXO chains.
          items:
            type: object
            required: [address, derivationIndex, tokenBalance, nativeBalance, feeCoveredByDelegatedEnergy]
            properties:
              address: { type: string }
              derivationIndex: { type: integer }
              tokenBalance: { type: string }
              nativeBalance: { type: string }
              feeCoveredByDelegatedEnergy:
                type: boolean
                description: "See `source.feeCoveredByDelegatedEnergy` — same per-source semantics."
        feeWallet:
          type: object
          description: |
            Diagnostic block for the registered fee wallet. Present ONLY
            when the chain's `feeWalletCapability` is `top-up` (Tron today)
            AND a fee wallet is registered for the family. Lets operators
            see at a glance why the fee wallet was or wasn't picked as
            the top-up sponsor — the most common confusion when a payout
            returns `no_gas_sponsor_available` despite a fee wallet being
            configured (typical cause: the operator staked the TRX into
            energy thinking it'd help; under "top-up" capability only
            liquid native is counted).
          required: [address, capability, nativeBalance, topUpRequired, shortfall, selected]
          properties:
            address:
              type: string
              description: Registered fee wallet address.
            capability:
              type: string
              enum: [none, top-up, delegate, co-sign]
              description: |
                The chain's current capability. The diagnostic block is
                only emitted when this is `top-up`; other values are
                listed here for type stability.
            nativeBalance:
              type: string
              description: |
                Live on-chain native balance at estimate time, in
                smallest units (sun on Tron, wei on EVM, etc.).
            topUpRequired:
              type: string
              description: |
                Native units the fee wallet would need to send to fund
                this specific payout's top-up — top-up amount + sponsor's
                own broadcast gas + chain rent-exempt keeper. 0 when no
                top-up was needed (Tier A direct picked).
            shortfall:
              type: string
              description: |
                `max(topUpRequired - nativeBalance, 0)`. 0 means the fee
                wallet has enough native to sponsor; positive means the
                operator needs to send the FEE WALLET (not the pool
                address) that many native units to enable sponsorship.
            selected:
              type: boolean
              description: |
                True when this fee wallet was actually picked as the
                top-up sponsor in the response above; false when it was
                considered but rejected (insufficient native), not
                applicable (Tier A direct), or not in the running.
        warnings:
          type: array
          description: |
            Non-fatal operator-facing notices. Known codes:
              - `no_source_address_has_sufficient_token_balance` — `source: null`
                (no single pool address holds enough of the requested token)
              - `single_source_insufficient_consolidate_required` — emitted
                ALONGSIDE the previous warning when the AGGREGATE token balance
                across the pool IS sufficient but it's split across multiple
                addresses. Account-model chains pick one sender per payout, so
                fragmented holdings can't be sent in a single tx. Run
                `POST /admin/pool/consolidate` to defragment, then retry.
              - `no_gas_sponsor_available` — `topUp.sponsor: null` (token holder
                identified but no funded sponsor exists for the top-up)
              - `fee_quote_unavailable` — chain RPC failed during tier quoting;
                `tieringSupported=false` with zeroed tiers (a real plan would
                503 `FEE_ESTIMATE_FAILED`)
              - `fee_quote_degraded` — the adapter served conservative
                hardcoded rates because its fee oracle was unreachable;
                broadcast still works but the tiers aren't market-fresh
              - `fee_market_uniform` — low == medium == high; the tier choice
                carries no price differentiation right now (empty mempool or
                sparse upstream data)
              - `insufficient_utxo_balance` — UTXO chains only: the confirmed
                spendable UTXO balance can't cover amount + fee; `source: null`
              - `max_amount_exceeds_net_spendable` — companion to the 400 error
          items: { type: string }

    PayoutFeeQuoteTier:
      type: object
      required: [tier, nativeAmountRaw, usdAmount]
      properties:
        tier: { type: string, enum: [low, medium, high] }
        nativeAmountRaw:
          type: string
          description: Total fee in native smallest units (wei on EVM, sun on Tron, lamports on Solana).
        usdAmount:
          type: [string, "null"]
          description: |
            USD value of the tier amount via the price oracle. Null when the
            oracle is unavailable for the chain's native symbol — the fee is
            still quoted in native; USD display degrades gracefully.

    PayoutBatchInput:
      type: object
      required: [payouts]
      properties:
        payouts:
          type: array
          minItems: 0
          maxItems: 100
          items:
            $ref: "#/components/schemas/PlanPayoutInput"
      description: |
        Up to 100 `PlanPayoutInput` rows. Each row is validated and planned
        independently — per-row errors do NOT abort the batch. Rows are
        processed in order, so earlier rows' reservations reduce the balance
        available to later rows. More than 100 rows → 400 `BATCH_TOO_LARGE`.
        An empty array is accepted and returns 200 with `batchId: ""` and
        empty `results`. The request consumes N tokens from the merchant's
        `merchantPerMinute` quota (proportional rate limit, not a
        single-request charge).

    PayoutBatchResponse:
      type: object
      description: |
        HTTP 200 whenever the batch envelope was well-formed — even when
        every row failed. Inspect `results[]` per row and `summary` for the
        roll-up.
      required: [batchId, results, summary]
      properties:
        batchId:
          type: string
          description: |
            UUID shared across every successfully-planned row in the batch
            (persisted in each payout's `batchId` field). Filter list
            responses with `GET /payouts?batchId=<id>`. Empty string (`""`)
            for the degenerate empty batch.
        results:
          type: array
          description: |
            One entry per input row, in request order; `index` echoes the
            input position. `status: "planned"` rows embed the full payout —
            already `reserved`, same serialization as single-create.
          items:
            oneOf:
              - type: object
                required: [index, status, payout]
                properties:
                  index: { type: integer }
                  status: { type: string, enum: [planned] }
                  payout: { $ref: "#/components/schemas/Payout" }
              - type: object
                required: [index, status, error]
                properties:
                  index: { type: integer }
                  status: { type: string, enum: [failed] }
                  error:
                    type: object
                    required: [code, message]
                    properties:
                      code:
                        type: string
                        description: |
                          Any single-create error code
                          (`TOKEN_NOT_SUPPORTED`, `INVALID_DESTINATION`,
                          `BAD_AMOUNT`, `MAX_AMOUNT_EXCEEDS_NET_SPENDABLE`,
                          `INSUFFICIENT_BALANCE_ANY_SOURCE`,
                          `NO_GAS_SPONSOR_AVAILABLE`, `ORACLE_FAILED`,
                          `FEE_ESTIMATE_FAILED`,
                          `PAYOUT_NOT_SUPPORTED_ON_FAMILY`, ...), plus
                          `VALIDATION_FAILED` (row failed schema validation;
                          `message` joins the individual issues) and
                          `INTERNAL` (unexpected failure planning the row).
                      message: { type: string }
        summary:
          type: object
          required: [planned, failed]
          properties:
            planned: { type: integer }
            failed: { type: integer }

    BalanceSnapshot:
      type: object
      required: [generatedAt, source, totalUsd, families]
      properties:
        generatedAt: { type: string, format: date-time }
        source:
          type: string
          enum: [db, rpc]
          description: |
            Where the numbers came from. `db` = derived from recorded
            transactions/payouts (fast default). `rpc` = live chain
            snapshot (opts-in via `?live=true`).
        totalUsd:
          type: string
          description: Grand total USD across every family in the snapshot, fixed to 2 decimal places.
        families:
          type: array
          items: { $ref: "#/components/schemas/FamilyBalance" }

    FamilyBalance:
      type: object
      required: [family, totalUsd, chains]
      properties:
        family: { type: string, enum: [evm, tron, solana, utxo] }
        totalUsd: { type: string }
        chains:
          type: array
          items: { $ref: "#/components/schemas/ChainBalance" }

    ChainBalance:
      type: object
      required: [chainId, totalUsd, tokens, addresses, errors]
      properties:
        chainId: { type: integer }
        totalUsd: { type: string }
        tokens:
          type: array
          description: Per-token roll-up across every address on this chain.
          items:
            type: object
            required: [token, amountRaw, amountDecimal, usd]
            properties:
              token: { type: string }
              amountRaw: { type: string, description: Sum of raw token amounts (smallest units). }
              amountDecimal: { type: string }
              usd: { type: string }
        addresses:
          type: array
          items: { $ref: "#/components/schemas/AddressBalance" }
        errors:
          type: integer
          description: |
            Number of addresses on this chain we tried to snapshot but couldn't
            (RPC error, missing adapter). Non-zero means the totals are partial
            and shouldn't be read as authoritative.

    AddressBalance:
      type: object
      required: [address, kind, totalUsd, tokens]
      description: |
        Every gateway-controlled HD address. The legacy "fee" kind has been
        removed — `address_pool` is now the single source of payout-source
        addresses, and the picker treats every pool row as a candidate.
      properties:
        address: { type: string }
        kind: { type: string, enum: [pool] }
        poolStatus:
          type: string
          enum: [available, allocated, quarantined]
        poolAllocatedToInvoiceId:
          type: [string, "null"]
          description: Invoice this address is currently allocated to (when `poolStatus=allocated`).
        totalUsd: { type: string }
        tokens:
          type: array
          items: { $ref: "#/components/schemas/TokenBalance" }
        error:
          type: string
          description: |
            Present (rpc mode only) when `getAccountBalances` failed for this
            address — provider rate-limit, network timeout, malformed
            response. When set, `tokens` is empty / un-reconciled for this
            address (NOT "zero") and the address counts toward the parent
            chain's `errors` roll-up.

    TokenBalance:
      type: object
      required: [token, decimals, amountRaw, amountDecimal, usd, usdRate]
      properties:
        token: { type: string }
        decimals: { type: integer }
        amountRaw:
          type: string
          description: Raw integer string in the token's smallest units.
        amountDecimal:
          type: string
          description: Human-readable decimal form (UI convenience).
        usd:
          type: string
          description: USD value of this balance. `"0.00"` when the token isn't priced (oracle miss); check `usdRate` to distinguish.
        usdRate:
          type: [string, "null"]
          description: USD-per-token rate at snapshot time. `null` when the price oracle had no entry.

    Payout:
      type: object
      required:
        - id
        - merchantId
        - kind
        - parentPayoutId
        - status
        - chainId
        - token
        - amountRaw
        - quotedAmountUsd
        - quotedRate
        - feeTier
        - feeQuotedNative
        - batchId
        - destinationAddress
        - sourceAddress
        - txHash
        - topUpTxHash
        - topUpSponsorAddress
        - topUpAmountRaw
        - feeEstimateNative
        - lastError
        - webhookUrl
        - confirmationThreshold
        - confirmationTiers
        - createdAt
        - submittedAt
        - confirmedAt
        - broadcastAttemptedAt
        - updatedAt
      properties:
        id: { type: string, format: uuid }
        merchantId: { type: string, format: uuid }
        kind:
          type: string
          enum: [standard, gas_top_up, gas_burn, consolidation_sweep]
          description: |
            `standard` = merchant-facing payout.

            `gas_top_up` = internal sibling row inserted when the source
            needed JIT gas top-up; references the parent via
            `parentPayoutId`.

            `gas_burn` = synthetic debit row recording the native fee a
            failed-but-broadcast tx burned on chain (so `computeSpendable`
            stays in sync with the chain's actual debit). Carries
            `parentPayoutId` pointing at the failed payout, status =
            `confirmed`, and amountRaw = the burned native units.

            `consolidation_sweep` = admin-triggered internal token
            transfer between two HD pool addresses, used to defragment a
            token balance into one address before a large merchant
            payout. Created by `POST /admin/pool/consolidate`; legs share
            a `batchId` (the consolidationId) and reference the sentinel
            system merchant via `merchantId`.

            All three internal kinds (gas_top_up, gas_burn,
            consolidation_sweep) are filtered out of merchant-facing list
            endpoints; `GET /payouts` returns only `standard` rows.
        parentPayoutId:
          type: [string, "null"]
          format: uuid
          description: |
            Set on `gas_top_up` rows to the standard payout that triggered
            the top-up. Always null on standard rows.
        status:
          type: string
          enum: [planned, reserved, topping-up, submitted, confirmed, failed, canceled]
          description: |
            New rows are inserted directly at `reserved` — the funding
            source is picked synchronously during `POST /payouts`, so
            `planned` only matches legacy rows. `topping-up` indicates the
            source lacked native gas and the executor is waiting for the
            sponsor → source top-up tx (`topUpTxHash`) to confirm before
            broadcasting the main payout. Only `reserved` rows can be
            canceled.
        chainId: { type: integer }
        token: { type: string }
        amountRaw: { type: string, description: "Integer string in the token's smallest unit." }
        quotedAmountUsd:
          type: [string, "null"]
          description: |
            Original USD-pegged input from the create request. Populated only
            when the create used `amountUSD`; null for `amountRaw` / `amount` paths.
        quotedRate:
          type: [string, "null"]
          description: |
            Price-oracle rate (USD per 1 whole token) snapshotted at create time.
            Populated only when the create used `amountUSD`. For non-stable
            tokens the broadcast may happen later — this is the create-time
            rate, not the executed-time rate.
        feeTier:
          type: [string, "null"]
          enum: [low, medium, high, null]
          description: |
            Fee tier bound at create time (echo of the `feeTier` input).
            Null when the create didn't specify one — EXCEPT on UTXO-family
            payouts, which record `medium` (the planner's budgeting default)
            even when unspecified. EVM binds this into `maxFeePerGas` /
            `maxPriorityFeePerGas` at broadcast; Solana binds a matching
            `setComputeUnitPrice`; Tron ignores.
        feeQuotedNative:
          type: [string, "null"]
          description: |
            Native-unit fee cost quoted at plan time for the chosen `feeTier`,
            captured from `quoteFeeTiers().{tier}.nativeAmountRaw`. Lets
            operators compare quoted vs. actual (post-confirm) for drift
            analysis. Null when no tier was requested — EXCEPT on
            UTXO-family payouts, where it is always set to coinselect's
            realistic plan-time fee for the actual UTXO set.
        batchId:
          type: [string, "null"]
          description: |
            Grouping id for mass-payout batches. Same UUID across every row
            of a `POST /payouts/batch` call; also persisted when supplied on
            single-create. Null when never set.
        destinationAddress: { type: string }
        sourceAddress:
          type: [string, "null"]
          description: |
            HD address that funds the payout, picked synchronously at plan
            time from `address_pool` (richest token holder first) on
            account-model chains. ALWAYS null on UTXO-family payouts — there
            is no single source; coin selection runs across every owned UTXO
            at broadcast. Also null on legacy `planned` rows.
        txHash: { type: [string, "null"] }
        topUpTxHash:
          type: [string, "null"]
          description: |
            Hash of the sponsor → source gas top-up tx, when one was
            needed. Stays set after the main tx confirms — the parent row
            carries both hashes for audit. Null when no top-up was required.
        topUpSponsorAddress:
          type: [string, "null"]
          description: |
            HD address that sent the top-up. The actual ledger debit is
            captured by the sibling `gas_top_up` payout row referenced via
            `parentPayoutId` lookups.
        topUpAmountRaw:
          type: [string, "null"]
          description: |
            Native amount the sponsor sends to the source (gas gap + safety
            cushion), fixed at plan time; the executor reads it to build the
            top-up tx. Null when no top-up is needed.
        feeEstimateNative: { type: [string, "null"] }
        lastError:
          type: [string, "null"]
          description: |
            Merchant-safe failure reason after a `failed` transition. Chain
            RPC diagnostics pass through with RPC URLs and foreign addresses
            redacted; internal failures use stable canned messages.
        webhookUrl:
          type: [string, "null"]
          format: uri
          description: |
            Per-payout webhook URL override (echo-only). Null when the payout
            falls back to the merchant-account webhook. The matching secret
            is write-only and never returned.
        confirmationThreshold:
          type: [integer, "null"]
          description: |
            Confirmations required for this payout's tx to flip `submitted`
            → `confirmed`. Snapshotted at plan time from the merchant's
            per-chain override (or the gateway's OUTBOUND default table) and
            frozen for the row's lifetime — merchant policy edits don't
            reshape in-flight payouts. Null on pre-migration rows.
        confirmationTiers:
          type: [object, "null"]
          description: |
            Snapshot of the merchant's amount-tiered confirmation rules at
            plan time, keyed `"{chainId}:{token}"`. The confirmation sweep
            evaluates the matching rule list against the payout's amount;
            on no match it falls back to the flat `confirmationThreshold`.
            Null when the merchant has no tier map.
          additionalProperties:
            type: array
            items:
              type: object
              required: [confirmations]
              properties:
                amount: { type: string }
                op: { type: string, enum: ["<", "<=", ">", ">=", "=", "<>"] }
                confirmations: { type: integer, minimum: 1 }
        createdAt: { type: string, format: date-time }
        submittedAt: { type: [string, "null"], format: date-time }
        confirmedAt: { type: [string, "null"], format: date-time }
        broadcastAttemptedAt:
          type: [string, "null"]
          format: date-time
          description: |
            Set by the broadcast-slot CAS the first time the executor tried
            to broadcast. Distinguishes "never attempted" (still planned /
            reserved, cron hasn't picked it up) from "attempted at least
            once" (crashed mid-broadcast → stuck reservation candidate for
            the sweeper). Handy for operator triage of stuck payouts.
        updatedAt: { type: string, format: date-time }

    PayableToken:
      type: object
      description: |
        One payment option for a USD-path invoice on the public checkout
        view: a specific (family, chainId, token) combination the gateway
        can accept, priced at the invoice's pinned rate window. Only chains
        actually wired in the deployment — and only tokens the oracle quoted
        a rate for — appear.
      required: [family, chainId, token, decimals, amountRawMinimum, amountDisplay, rate, address]
      properties:
        family: { type: string, enum: [evm, tron, solana, utxo, monero] }
        chainId: { type: integer }
        token: { type: string }
        decimals: { type: integer }
        amountRawMinimum:
          type: string
          description: |
            Minimum raw-units amount the payer must send on this
            (chain, token) pair to satisfy the full invoice at the pinned
            rate. Ceiling-rounded so truncation can't leave the payer one
            unit short (over-send is at most 1 raw unit).
        amountDisplay:
          type: string
          description: |
            Human-readable token amount (e.g. "100" for USDC, "0.04" for
            ETH) — `amountRawMinimum / 10^decimals` with trailing zeros
            trimmed. Render directly; no reformatting needed.
        rate:
          type: string
          description: USD per whole token as pinned in the invoice's rate window (e.g. "1.00", "2500.00").
        address:
          type: string
          description: |
            Gateway-owned receive address on this family. Identical across
            entries of the same family (EVM chains share one address);
            repeated per row for convenience.

    AlchemyBootstrapResult:
      type: object
      description: Per-chain outcome row from `POST /admin/bootstrap/alchemy-webhooks`. Returned in both the 200 body and the 500 `BOOTSTRAP_PARTIAL_FAILURE` body.
      required: [chainId, status]
      properties:
        chainId: { type: integer }
        status:
          type: string
          enum: [created, existing, unsupported, failed]
          description: |
            `created` — webhook created just now (signingKey present);
            `existing` — a webhook with the same URL + network + ADDRESS_ACTIVITY
            type already existed (no signingKey — Alchemy only reveals it at
            create time); `unsupported` — Alchemy doesn't serve this chainId
            (Tron, UTXO, Monero); `failed` — the Alchemy API call threw.
        webhookId:
          type: string
          description: Alchemy webhook id. Present on `created` and `existing` rows.
        signingKey:
          type: string
          description: |
            Only present when `status=created`. Automatically persisted
            encrypted into `alchemy_webhook_registry` when `persisted=true`;
            when `persisted=false` this response field is the ONLY copy —
            re-register it via `POST /admin/alchemy-webhooks/signing-keys`.
        persisted:
          type: boolean
          description: |
            Only on `created` rows. `true` when the encrypted registry row was
            written; `false` means the webhook exists in Alchemy but the
            gateway cannot verify its inbound HMACs until the key is
            registered manually (the request as a whole then returns 500
            `BOOTSTRAP_PARTIAL_FAILURE`).
        placeholderRemoved:
          type: boolean
          description: |
            Present when the default placeholder seed was used (`created`
            rows, and `existing` rows via self-heal on re-run). `true` = the
            placeholder was removed from the webhook's watch list; `false` =
            the remove call failed (non-fatal) — remove it via the Alchemy
            dashboard or update-webhook-addresses. Absent when an
            operator-supplied `seedAddressByChainId` entry was used (that
            seed is intentionally kept watched).
        error:
          type: string
          description: Failure detail on `status=failed`, or persistence-failure detail on `created` rows with `persisted=false`.
