openapi: 3.1.0
info:
  title: crypto-gateway
  version: 0.0.0
  description: |
    Runtime-agnostic crypto payment gateway with pluggable chain adapters
    (EVM / Tron / Solana), DB adapters (D1 / libSQL / Postgres), cache
    adapters, detection strategies, and webhook delivery.

    Deploys on Cloudflare Workers, Node/Bun, Deno, and Vercel Edge from one
    codebase.

    ### Deployment knobs (not HTTP routes)

    The behaviors below are server-side config read at boot and do not
    surface as endpoints. They're documented here so operators who only
    have the OpenAPI spec can discover them.

    **Price oracle fallback chain.** Invoice quoting walks a chained list
    of providers on every request; each link tries itself first and
    delegates to the next on error/timeout/unmapped symbol. Only the
    terminal `static-peg` link serves hardcoded values. Default ordering
    when `ALCHEMY_API_KEY` is set:
    `CoinGecko → Alchemy → CoinCap → Binance → static-peg`.
    Knobs: `PRICE_ADAPTER=alchemy|coingecko|static-peg` (swaps the primary
    or collapses to the static link), `COINGECKO_API_KEY` +
    `COINGECKO_PLAN=demo|pro`, `COINCAP_API_KEY`, and per-provider
    opt-outs `DISABLE_COINGECKO=1` / `DISABLE_COINCAP=1` /
    `DISABLE_BINANCE=1` / `DISABLE_ALCHEMY=1`. `PRICE_ADAPTER=alchemy`
    without a key logs a warning and falls back to the default ordering.

    **Log shipping + alerting.** Setting `ALERT_WEBHOOK_URL` attaches an
    HTTP sink to the structured logger; every `error` or `fatal` log is
    POSTed as `{ ts, level, msg, ...fields }` JSON. Sliding-window rate
    limited to 30/min with a `droppedSinceLast` counter piggybacked on
    the next successful delivery. Use `ALERT_WEBHOOK_AUTH_HEADER` for the
    `Authorization` header value (e.g. `Bearer xyz`). Fire-and-forget —
    a broken sink never breaks the caller's log path.

    See the repository README for the full env-var table.

servers:
  - url: http://localhost:8787
    description: Local Node dev
  - url: https://crypto-gateway-dev.workers.dev
    description: Dev Workers (placeholder — replace with your subdomain)

tags:
  - name: invoices
    description: Merchant-facing invoice lifecycle
  - name: payouts
    description: Merchant-facing payout lifecycle
  - name: checkout
    description: Public invoice view (for hosted checkout UIs)
  - name: webhooks
    description: Inbound webhook ingest from on-chain providers
  - name: admin
    description: Operator-only setup
  - name: internal
    description: Scheduler-driven maintenance
  - name: health

security:
  - MerchantApiKey: []

paths:
  /health:
    get:
      tags: [health]
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: Service up
          content:
            application/json:
              schema:
                type: object
                required: [status, phase]
                properties:
                  status: { type: string, enum: [ok] }
                  phase: { type: integer }

  /api/v1/invoices:
    post:
      tags: [invoices]
      summary: Create an invoice
      description: |
        Creates an invoice and allocates a receive address derived from the
        gateway's HD seed. The merchant is resolved from the API key — the
        caller MUST NOT include `merchantId` in the body; if they do, it's
        ignored.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateInvoiceInput" }
      responses:
        "201":
          description: Invoice created
          content:
            application/json:
              schema:
                type: object
                required: [invoice]
                properties:
                  invoice: { $ref: "#/components/schemas/Invoice" }
          headers:
            X-Request-Id: { $ref: "#/components/headers/X-Request-Id" }
            X-RateLimit-Limit: { $ref: "#/components/headers/X-RateLimit-Limit" }
            X-RateLimit-Remaining: { $ref: "#/components/headers/X-RateLimit-Remaining" }
            X-RateLimit-Reset: { $ref: "#/components/headers/X-RateLimit-Reset" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/MerchantInactive" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/v1/invoices/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [invoices]
      summary: Fetch an invoice with USD breakdown and per-transaction detail
      description: |
        Returns the invoice along with two extra blocks not surfaced on POST
        responses:
          - `amounts` — USD-axis recomputation (required / confirmed /
            confirming / remaining / overpaid). All-null on legacy
            single-token invoices.
          - `transactions` — every on-chain row tied to this invoice (all
            statuses, including `reverted` and `orphaned` for debugging).
      responses:
        "200":
          description: Invoice found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InvoiceDetails" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/invoices/{id}/expire:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [invoices]
      summary: Force-expire an invoice before its expiry window elapses
      responses:
        "200":
          description: Invoice expired
          content:
            application/json:
              schema:
                type: object
                properties:
                  invoice: { $ref: "#/components/schemas/Invoice" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Invoice is in a terminal state and cannot be expired
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/payouts:
    post:
      tags: [payouts]
      summary: Plan a payout
      description: |
        Creates a payout in `planned` state. A background job
        (`executeReservedPayouts`) reserves a fee wallet, signs, and
        broadcasts. Confirmation is surfaced via `payout.*` webhooks or a
        subsequent GET.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PlanPayoutInput" }
      responses:
        "201":
          description: Payout planned
          content:
            application/json:
              schema:
                type: object
                properties:
                  payout: { $ref: "#/components/schemas/Payout" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/MerchantInactive" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/v1/payouts/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [payouts]
      summary: Fetch a payout
      responses:
        "200":
          description: Payout found
          content:
            application/json:
              schema:
                type: object
                properties:
                  payout: { $ref: "#/components/schemas/Payout" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /checkout/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [checkout]
      summary: Public invoice snapshot (for checkout UIs)
      description: |
        Narrow projection of an invoice suitable for end-user pages. The merchant
        identity and any merchant-private metadata are deliberately excluded.
        Rate limited per IP.
      security: []
      responses:
        "200":
          description: Invoice snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  invoice: { $ref: "#/components/schemas/PublicInvoice" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /webhooks/alchemy:
    post:
      tags: [webhooks]
      summary: Ingest Alchemy Notify ADDRESS_ACTIVITY webhooks
      description: |
        HMAC-SHA256 of the raw body under the per-webhook signing key
        (looked up by `event.webhookId` in the encrypted-at-rest
        `alchemy_webhook_registry` table) must match `X-Alchemy-Signature`.
        Returns 200 fast and processes the payload in the background;
        Alchemy retries on non-2xx.
      security:
        - AlchemySignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200":
          description: Acknowledged; ingest happens in background
          content:
            application/json:
              schema:
                type: object
                properties:
                  received: { type: boolean, const: true }
        "400": { description: Malformed JSON after a valid signature }
        "401": { description: Missing or bad signature }
        "404": { description: Alchemy ingest not enabled on this deployment }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/merchants:
    post:
      tags: [admin]
      summary: Create a merchant
      description: |
        Returns the plaintext API key ONCE in the response. The hash is
        stored; the plaintext is unrecoverable afterward.
      security:
        - AdminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, minLength: 1, maxLength: 128 }
                webhookUrl: { type: string, format: uri }
                webhookSecret:
                  type: string
                  description: Optional hex-encoded 32-byte HMAC signing secret. Generated if omitted.
                  pattern: "^[0-9a-f]{64}$"
                paymentToleranceUnderBps:
                  type: integer
                  minimum: 0
                  maximum: 2000
                  default: 0
                  description: |
                    Default invoice under-payment tolerance in basis points.
                    A paid USD amount ≥ `amountUsd × (1 − bps/10_000)` closes
                    the invoice as `confirmed`. Example: `100` = 1 % — paying
                    99 USD on a 100 USD invoice still confirms.
                paymentToleranceOverBps:
                  type: integer
                  minimum: 0
                  maximum: 2000
                  default: 0
                  description: |
                    Default invoice over-payment tolerance in basis points.
                    A paid USD amount ≤ `amountUsd × (1 + bps/10_000)` closes
                    the invoice as `confirmed` (not `overpaid`). Example: `100`
                    = 1 % — paying 101 USD on a 100 USD invoice confirms.
      responses:
        "201":
          description: Merchant created
          content:
            application/json:
              schema:
                type: object
                properties:
                  merchant:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      name: { type: string }
                      webhookUrl: { type: [string, "null"] }
                      active: { type: boolean }
                      paymentToleranceUnderBps: { type: integer, minimum: 0, maximum: 2000 }
                      paymentToleranceOverBps: { type: integer, minimum: 0, maximum: 2000 }
                      createdAt: { type: string, format: date-time }
                  apiKey:
                    type: string
                    description: Plaintext API key. Shown once; store it immediately.
                    pattern: "^sk_[0-9a-f]{64}$"
                  webhookSecret:
                    type: string
                    description: Present only if `webhookUrl` was provided.
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { description: Admin surface not enabled (ADMIN_KEY not set) }

  /admin/merchants/{id}:
    patch:
      tags: [admin]
      summary: Update a merchant's payment-tolerance defaults
      description: |
        Currently scoped to `paymentToleranceUnderBps` and `paymentToleranceOverBps`.
        Webhook URL/secret stay create-only on purpose — changing them mid-flight
        orphans pending outbox rows that were enqueued under the old key.

        Tolerance changes apply to invoices created **after** the PATCH; existing
        invoices keep the snapshot they were issued with.
      security:
        - AdminKey: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                paymentToleranceUnderBps:
                  type: integer
                  minimum: 0
                  maximum: 2000
                paymentToleranceOverBps:
                  type: integer
                  minimum: 0
                  maximum: 2000
      responses:
        "200":
          description: Merchant updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  merchant:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      name: { type: string }
                      webhookUrl: { type: [string, "null"] }
                      active: { type: boolean }
                      paymentToleranceUnderBps: { type: integer }
                      paymentToleranceOverBps: { type: integer }
                      updatedAt: { type: string, format: date-time }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { description: Merchant not found }

  /admin/bootstrap/alchemy-webhooks:
    post:
      tags: [admin]
      summary: Idempotently create Alchemy webhooks for the configured chains
      description: |
        For each requested chainId, checks whether an Alchemy ADDRESS_ACTIVITY
        webhook already exists with the target URL + network; creates it if
        not. Returns per-chain status plus the `signingKey` for any newly
        created webhook. Signing keys are persisted encrypted into
        `alchemy_webhook_registry` automatically; the `signingKey` field in
        the response is a one-shot safety net in case persistence raced.
        Requires `ALCHEMY_NOTIFY_TOKEN` env.
      security:
        - AdminKey: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                chainIds:
                  type: array
                  items: { type: integer }
                  description: Defaults to `ALCHEMY_CHAINS` env, then the mainnet set
                seedAddressByChainId:
                  type: object
                  additionalProperties: { type: string }
                  description: Per-chain placeholder address (Alchemy requires ≥1 at create). Defaults to zero-address.
              description: |
                The target webhook URL is NOT accepted in the body. It is sourced from
                `GATEWAY_PUBLIC_URL` env (base origin) plus the canonical path
                `/webhooks/alchemy`. Env-only so a leaked ADMIN_KEY cannot be
                used to redirect Alchemy's traffic to an arbitrary host.
      responses:
        "200":
          description: Bootstrap complete; per-chain status in body
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        chainId: { type: integer }
                        status:
                          type: string
                          enum: [created, existing, unsupported, failed]
                        webhookId: { type: string }
                        signingKey:
                          type: string
                          description: Only present when `status=created`. Automatically persisted to `alchemy_webhook_registry`; kept in the response as a one-shot safety net if `persisted=false`.
                        error: { type: string }
        "400":
          description: Missing ALCHEMY_NOTIFY_TOKEN or GATEWAY_PUBLIC_URL env
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { description: Admin surface not enabled (ADMIN_KEY not set) }

  /admin/alchemy-webhooks/signing-keys:
    post:
      tags: [admin]
      summary: Register an Alchemy webhook's signing key manually
      description: |
        For operators who created a webhook through the Alchemy dashboard UI
        (not via bootstrap) or who need to push a key back in after a
        persistence failure. The signing key is encrypted via
        `SECRETS_ENCRYPTION_KEY` before being written to
        `alchemy_webhook_registry`. Re-running with the same chainId upserts
        (rotation after a dashboard delete+recreate).
      security:
        - AdminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chainId, webhookId, signingKey, webhookUrl]
              properties:
                chainId: { type: integer }
                webhookId: { type: string, minLength: 1, maxLength: 128 }
                signingKey: { type: string, minLength: 1, maxLength: 256 }
                webhookUrl: { type: string, format: uri }
      responses:
        "201":
          description: Signing key persisted encrypted-at-rest
          content:
            application/json:
              schema:
                type: object
                properties:
                  registered:
                    type: object
                    properties:
                      chainId: { type: integer }
                      webhookId: { type: string }
                      webhookUrl: { type: string, format: uri }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { description: Admin surface not enabled (ADMIN_KEY not set) }

  /admin/fee-wallets:
    post:
      tags: [admin]
      summary: Register a fee wallet — address is HD-derived from MASTER_SEED
      description: |
        The gateway derives the fee-wallet's `(address, privateKey)` pair
        from `MASTER_SEED` at a deterministic index keyed by `(family, label)`.
        No private key is accepted over the admin API — fund the returned
        derived address out-of-band. The same label always derives to the
        same address across redeploys.
      security:
        - AdminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chainId, label, family]
              properties:
                chainId: { type: integer }
                label:
                  type: string
                  maxLength: 64
                  description: Scope key (e.g. "hot-1", "cold-archive"). Hashed into a BIP32 index.
                family:
                  type: string
                  enum: [evm, tron, solana]
      responses:
        "201":
          description: Fee wallet registered; fund the returned address externally.
          content:
            application/json:
              schema:
                type: object
                properties:
                  feeWallet:
                    type: object
                    properties:
                      chainId: { type: integer }
                      address:
                        type: string
                        description: Derived address the operator must fund.
                      label: { type: string }
        "400":
          description: Family mismatch, MASTER_SEED missing, or validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /admin/pool/initialize:
    post:
      tags: [admin]
      summary: Seed or top up the address pool per family
      description: |
        Idempotent. Families already at or above `initialSize` return as
        `already-sufficient` with zero additions. Families without a wired
        chain adapter in deps.chains return as `skipped-no-adapter`. Safe to
        call repeatedly and is the recovery path after a pool exhaustion.
      security:
        - AdminKey: []
      requestBody:
        required: false
        description: Empty body permitted; every field has a default.
        content:
          application/json:
            schema:
              type: object
              properties:
                families:
                  type: array
                  minItems: 1
                  items: { type: string, enum: [evm, tron, solana] }
                  default: [evm, tron, solana]
                initialSize:
                  type: integer
                  minimum: 1
                  maximum: 500
                  default: 5
      responses:
        "200":
          description: Initialization outcomes per family
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        family: { type: string, enum: [evm, tron, solana] }
                        status:
                          type: string
                          enum: [seeded, already-sufficient, skipped-no-adapter]
                        added: { type: integer }
        "400":
          description: Malformed JSON (BAD_JSON) or invalid families/initialSize
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /admin/pool/stats:
    get:
      tags: [admin]
      summary: Per-family pool utilization snapshot
      description: |
        Operators watch this endpoint + an alert on available-count under a
        threshold to catch "address supply running low" before POOL_EXHAUSTED
        fires on a live invoice-create.
      security:
        - AdminKey: []
      responses:
        "200":
          description: Pool statistics keyed by family
          content:
            application/json:
              schema:
                type: object
                properties:
                  stats:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        total: { type: integer }
                        available: { type: integer }
                        allocated: { type: integer }

  /admin/webhook-deliveries:
    get:
      tags: [admin]
      summary: List webhook deliveries by status
      description: |
        Operator view of the outbox. Use `status=dead` (default) to surface
        deliveries that exhausted the retry schedule and need manual
        intervention (merchant-side fix, then POST the replay endpoint).
        `pending` shows rows still queued for retry; `delivered` shows
        successful deliveries (mostly useful for audit).

        ### Outbound event types (`eventType` field)

        Invoice lifecycle (one row per status transition, idempotency key
        `{event}:{invoiceId}:{status}`):
          - `invoice.partial`, `invoice.detected`, `invoice.confirmed`,
            `invoice.overpaid`, `invoice.expired`, `invoice.canceled`
          - `invoice.demoted` — reorg un-confirmation; key includes
            `{previousStatus}:{newStatus}` instead of one status

        Per-transfer audit (one row per on-chain tx per stage; key
        `{event}:{invoiceId}:{txHash}` so detect→confirm produces TWO
        distinct rows for the same tx):
          - `invoice.transfer_detected` — first sighting of a pending
            transfer (push or poll). `data.payment.confirmations` is `0`
            for push-detected, `n` for poll-detected.
          - `invoice.payment_received` — same transfer reached the
            confirmation threshold.

        Payout lifecycle:
          - `payout.submitted`, `payout.confirmed`, `payout.failed`

        URL/secret resolution: per-resource override → merchant default
        → silently skipped (with a `warn` log so operators can detect
        misconfiguration). Body is signed with HMAC-SHA256 in
        `X-Webhook-Signature`; merchants should de-dup on
        `X-Webhook-Idempotency-Key`. Each row gets up to 5 outer retry
        rounds × 4 inline HTTP attempts before going `dead`.
      security:
        - AdminKey: []
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [pending, delivered, dead], default: dead }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500, default: 50 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        "200":
          description: Page of delivery rows
          content:
            application/json:
              schema:
                type: object
                properties:
                  deliveries:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        merchantId: { type: string }
                        eventType: { type: string }
                        status: { type: string, enum: [pending, delivered, dead] }
                        attempts: { type: integer }
                        lastStatusCode: { type: integer, nullable: true }
                        lastError: { type: string, nullable: true }
                        nextAttemptAt: { type: integer, nullable: true, description: "Epoch ms" }
                        deliveredAt: { type: integer, nullable: true, description: "Epoch ms" }
                        createdAt: { type: integer, description: "Epoch ms" }
                        updatedAt: { type: integer, description: "Epoch ms" }
        "400":
          description: Unknown status value (BAD_STATUS)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /admin/webhook-deliveries/{id}/replay:
    post:
      tags: [admin]
      summary: Replay a dead webhook delivery
      description: |
        Resets a delivery from `dead` back to `pending` with `next_attempt_at`
        set to now, so the next scheduled-jobs sweep re-drives it. Only rows
        in `dead` status are replayable — `pending` rows are already queued
        and `delivered` rows have already succeeded. Intended for when the
        merchant has fixed the underlying cause of permanent failure (TLS
        cert, URL change, etc.) and you want to push the event through.
      security:
        - AdminKey: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Row reset to pending and queued for retry
          content:
            application/json:
              schema:
                type: object
                properties:
                  replayed:
                    type: object
                    properties:
                      id: { type: string }
                      nextAttemptAt: { type: integer, description: "Epoch ms" }
        "404":
          description: Delivery not found or not in dead status (NOT_DEAD)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /admin/migrate:
    post:
      tags: [admin]
      summary: Apply any pending schema migrations
      description: |
        Runs the bundled migration set through the idempotent migration-runner.
        Already-applied ids are skipped. On Workers/Vercel-Edge (no filesystem
        at runtime) this endpoint returns 501 — operators use `wrangler d1
        migrations apply` or the Turso migration CLI instead.
      security:
        - AdminKey: []
      responses:
        "200":
          description: Migration sweep result
          content:
            application/json:
              schema:
                type: object
                properties:
                  applied:
                    type: array
                    items: { type: string }
                  skipped:
                    type: array
                    items: { type: string }
        "501":
          description: No bundled migration set on this runtime (MIGRATIONS_NOT_BUNDLED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /internal/cron/tick:
    post:
      tags: [internal]
      summary: Trigger the full scheduled-jobs sweep
      description: |
        Used by Vercel Cron / Upstash QStash / external schedulers. Returns
        per-job outcomes so a slow provider in one step doesn't mask failures
        elsewhere.
      security:
        - CronSecret: []
      responses:
        "200":
          description: Sweep completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  result:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        ok: { type: boolean }
                        error: { type: string }
        "401": { description: Missing or wrong Bearer token }
        "404": { description: Cron endpoint not enabled (CRON_SECRET not set) }

components:
  securitySchemes:
    MerchantApiKey:
      type: http
      scheme: bearer
      description: |
        Merchant API key returned once at `POST /admin/merchants`.
        Also accepted as `X-API-Key: <key>`.
    AdminKey:
      type: http
      scheme: bearer
      description: Shared admin key from `ADMIN_KEY` env. Also accepted as `X-Admin-Key`.
    AlchemySignature:
      type: apiKey
      in: header
      name: X-Alchemy-Signature
      description: HMAC-SHA256 hex of the raw body under the per-webhook signing key stored in `alchemy_webhook_registry` (looked up by `event.webhookId`).
    CronSecret:
      type: http
      scheme: bearer
      description: Shared secret from `CRON_SECRET` env.

  headers:
    X-Request-Id:
      description: UUID correlation id. Accepts a caller-supplied value if it's a valid UUID; otherwise minted.
      schema: { type: string, format: uuid }
    X-RateLimit-Limit:
      description: Window cap for this route's rate-limit scope
      schema: { type: integer }
    X-RateLimit-Remaining:
      description: Requests left in the current window after this one
      schema: { type: integer }
    X-RateLimit-Reset:
      description: Unix seconds when the window rolls
      schema: { type: integer }

  responses:
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    MerchantInactive:
      description: Merchant is deactivated
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Entity not found (or not owned by this merchant)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    ValidationError:
      description: Request body failed schema validation
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    RateLimited:
      description: Too many requests in the current window
      headers:
        Retry-After:
          description: Seconds until the window rolls
          schema: { type: integer }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code]
          properties:
            code: { type: string, description: Stable machine-readable code }
            message: { type: string }
            details:
              type: object
              additionalProperties: true
              description: Optional per-code payload (e.g. Zod issues on VALIDATION)

    CreateInvoiceInput:
      type: object
      description: |
        Provide EXACTLY ONE pricing mode:
          - `amountUsd` — USD-pegged. Pair with `acceptedFamilies` to make the
            invoice payable from any family/token the gateway supports. Rates
            are pinned for 10 minutes at creation.
          - `amountRaw` — legacy single-token. Payer must pay in `token` on
            `chainId`, exact amount.
          - `fiatAmount` + `fiatCurrency` — legacy fiat-quoted. Converted to
            a token amount at creation via the price oracle.
      properties:
        chainId: { type: integer }
        token: { type: string, pattern: "^[A-Z0-9]+$" }
        amountUsd:
          type: string
          pattern: "^\\d+(\\.\\d{1,8})?$"
          description: |
            USD-pegged target. Combined with `acceptedFamilies` lets the same
            invoice be settled in USDC, USDT, ETH, SOL, TRX, etc. across every
            wired chain.
        acceptedFamilies:
          type: array
          items: { type: string, enum: [evm, tron, solana] }
          minItems: 1
          description: |
            Families the invoice will accept payment from. Each family gets one
            allocated receive address. Omit for single-family (derived from
            `chainId`'s family).
        amountRaw:
          type: string
          pattern: "^\\d+$"
          description: Raw token amount in smallest units.
        fiatAmount:
          type: string
          pattern: "^\\d+(\\.\\d+)?$"
        fiatCurrency:
          type: string
          pattern: "^[A-Z]{3}$"
        externalId:
          type: string
          maxLength: 256
          description: Merchant's opaque reference (e.g. cart id)
        metadata:
          type: object
          additionalProperties: true
        expiresInMinutes:
          type: integer
          minimum: 1
          maximum: 1440
          default: 30
        webhookUrl:
          type: string
          format: uri
          description: |
            Per-invoice webhook destination override. When set, dispatch for
            this invoice's events goes here instead of the merchant-account
            webhook. Must be supplied together with `webhookSecret` — passing
            one without the other is a 400. Echoed in responses; the secret is
            never returned.
        webhookSecret:
          type: string
          minLength: 16
          maxLength: 512
          writeOnly: true
          description: |
            HMAC secret paired with `webhookUrl`. Encrypted at rest and never
            echoed back. Required if `webhookUrl` is set.
        paymentToleranceUnderBps:
          type: integer
          minimum: 0
          maximum: 2000
          description: |
            Per-invoice under-payment tolerance override in basis points. Omit
            to inherit the merchant default (snapshotted at create time). See
            `POST /admin/merchants` for the math semantics.
        paymentToleranceOverBps:
          type: integer
          minimum: 0
          maximum: 2000
          description: |
            Per-invoice over-payment tolerance override in basis points. Omit
            to inherit the merchant default.
      required: [chainId, token]

    Invoice:
      type: object
      properties:
        id: { type: string, format: uuid }
        merchantId: { type: string, format: uuid }
        status:
          type: string
          enum: [created, partial, detected, confirmed, overpaid, expired, canceled]
        chainId: { type: integer }
        token: { type: string }
        receiveAddress: { type: string }
        addressIndex: { type: integer }
        acceptedFamilies:
          type: array
          items: { type: string, enum: [evm, tron, solana] }
        receiveAddresses:
          type: array
          description: One entry per accepted family. The checkout UI renders all of them.
          items:
            type: object
            properties:
              family: { type: string, enum: [evm, tron, solana] }
              address: { type: string }
        requiredAmountRaw: { type: string }
        receivedAmountRaw: { type: string }
        fiatAmount: { type: [string, "null"] }
        fiatCurrency: { type: [string, "null"] }
        quotedRate: { type: [string, "null"] }
        amountUsd:
          type: [string, "null"]
          description: USD target. Non-null only on USD-path invoices.
        paidUsd:
          type: [string, "null"]
          description: Sum of confirmed transactions' USD value. Non-null on USD-path invoices.
        overpaidUsd:
          type: [string, "null"]
          description: max(paidUsd - amountUsd, 0). Non-null on USD-path invoices.
        rates:
          type: [object, "null"]
          additionalProperties: { type: string }
          description: |
            Pinned USD-per-token rates for this invoice's window (USD-path only).
            Keys are token symbols, values are decimal strings.
        rateWindowExpiresAt:
          type: [string, "null"]
          format: date-time
        externalId: { type: [string, "null"] }
        metadata: { type: [object, "null"] }
        webhookUrl:
          type: [string, "null"]
          format: uri
          description: |
            Per-invoice webhook URL override (echo-only). Null when the
            invoice falls back to the merchant-account webhook. The matching
            secret is write-only and never returned.
        paymentToleranceUnderBps:
          type: integer
          minimum: 0
          maximum: 2000
          description: |
            Effective under-payment tolerance for this invoice in basis points
            (snapshot of merchant default or per-invoice override at create time).
        paymentToleranceOverBps:
          type: integer
          minimum: 0
          maximum: 2000
          description: |
            Effective over-payment tolerance for this invoice in basis points
            (snapshot of merchant default or per-invoice override at create time).
        createdAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        confirmedAt: { type: [string, "null"], format: date-time }
        updatedAt: { type: string, format: date-time }

    InvoiceAmountsBreakdown:
      type: object
      description: |
        USD-axis breakdown of an invoice's progress. All fields null on legacy
        single-token invoices (use `requiredAmountRaw` / `receivedAmountRaw`
        on the invoice itself for those).
      properties:
        requiredUsd: { type: [string, "null"] }
        confirmedUsd:
          type: [string, "null"]
          description: Sum of CONFIRMED contributing transactions' USD values.
        confirmingUsd:
          type: [string, "null"]
          description: Sum of DETECTED-but-not-yet-confirmed transactions' USD values.
        remainingUsd:
          type: [string, "null"]
          description: max(requiredUsd - confirmedUsd, 0).
        overpaidUsd:
          type: [string, "null"]
          description: max(confirmedUsd - requiredUsd, 0).

    InvoiceTransaction:
      type: object
      description: |
        One on-chain payment tied to the invoice. All statuses (`detected`,
        `confirmed`, `reverted`, `orphaned`) are returned so debugging can
        see rows that no longer count toward the invoice total.
      properties:
        id: { type: string, format: uuid }
        txHash: { type: string }
        logIndex: { type: [integer, "null"] }
        chainId: { type: integer }
        chain:
          type: [string, "null"]
          description: Short slug like `ethereum`, `polygon`, `tron`, `solana`. Null if chainId is unknown to the registry.
        token: { type: string }
        fromAddress: { type: string }
        toAddress: { type: string }
        amountRaw:
          type: string
          description: Raw integer string in the token's smallest units.
        amount:
          type: string
          description: Human-readable decimal (e.g. `"1"`, `"0.04"`). Convenience for UIs.
        amountUsd:
          type: [string, "null"]
          description: USD valuation pinned at detection time.
        usdRate: { type: [string, "null"] }
        status:
          type: string
          enum: [detected, confirmed, reverted, orphaned]
        confirmations: { type: integer }
        blockNumber: { type: [integer, "null"] }
        detectedAt: { type: string, format: date-time }
        confirmedAt: { type: [string, "null"], format: date-time }

    InvoiceDetails:
      type: object
      description: Hydrated GET response — invoice plus USD breakdown plus per-tx detail.
      required: [invoice, amounts, transactions]
      properties:
        invoice: { $ref: "#/components/schemas/Invoice" }
        amounts: { $ref: "#/components/schemas/InvoiceAmountsBreakdown" }
        transactions:
          type: array
          items: { $ref: "#/components/schemas/InvoiceTransaction" }

    PublicInvoice:
      type: object
      description: Same as Invoice but with merchant-private fields stripped
      properties:
        id: { type: string, format: uuid }
        status: { type: string }
        chainId: { type: integer }
        token: { type: string }
        receiveAddress: { type: string }
        requiredAmountRaw: { type: string }
        receivedAmountRaw: { type: string }
        fiatAmount: { type: [string, "null"] }
        fiatCurrency: { type: [string, "null"] }
        createdAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        confirmedAt: { type: [string, "null"], format: date-time }

    PlanPayoutInput:
      type: object
      required: [chainId, token, amountRaw, destinationAddress]
      properties:
        chainId: { type: integer }
        token: { type: string }
        amountRaw: { type: string, pattern: "^\\d+$" }
        destinationAddress: { type: string, minLength: 1, maxLength: 128 }
        webhookUrl:
          type: string
          format: uri
          description: |
            Per-payout webhook destination override. When set, dispatch for
            this payout's events goes here instead of the merchant-account
            webhook. Must be supplied together with `webhookSecret` — passing
            one without the other is a 400. Echoed in responses; the secret is
            never returned.
        webhookSecret:
          type: string
          minLength: 16
          maxLength: 512
          writeOnly: true
          description: |
            HMAC secret paired with `webhookUrl`. Encrypted at rest and never
            echoed back. Required if `webhookUrl` is set.

    Payout:
      type: object
      properties:
        id: { type: string, format: uuid }
        merchantId: { type: string, format: uuid }
        status:
          type: string
          enum: [planned, reserved, submitted, confirmed, failed, canceled]
        chainId: { type: integer }
        token: { type: string }
        amountRaw: { type: string }
        destinationAddress: { type: string }
        sourceAddress: { type: [string, "null"] }
        txHash: { type: [string, "null"] }
        feeEstimateNative: { type: [string, "null"] }
        lastError: { type: [string, "null"] }
        webhookUrl:
          type: [string, "null"]
          format: uri
          description: |
            Per-payout webhook URL override (echo-only). Null when the payout
            falls back to the merchant-account webhook. The matching secret
            is write-only and never returned.
        createdAt: { type: string, format: date-time }
        submittedAt: { type: [string, "null"], format: date-time }
        confirmedAt: { type: [string, "null"], format: date-time }
        updatedAt: { type: string, format: date-time }
