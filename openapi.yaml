openapi: 3.1.0
info:
  title: crypto-gateway
  version: 0.0.0
  description: |
    Runtime-agnostic crypto payment gateway with pluggable chain adapters
    (EVM / Tron / Solana), DB adapters (D1 / libSQL / Postgres), cache
    adapters, detection strategies, and webhook delivery.

    Deploys on Cloudflare Workers, Node/Bun, Deno, and Vercel Edge from one
    codebase.

servers:
  - url: http://localhost:8787
    description: Local Node dev
  - url: https://crypto-gateway-dev.workers.dev
    description: Dev Workers (placeholder — replace with your subdomain)

tags:
  - name: invoices
    description: Merchant-facing invoice lifecycle
  - name: payouts
    description: Merchant-facing payout lifecycle
  - name: checkout
    description: Public invoice view (for hosted checkout UIs)
  - name: webhooks
    description: Inbound webhook ingest from on-chain providers
  - name: admin
    description: Operator-only setup
  - name: internal
    description: Scheduler-driven maintenance
  - name: health

security:
  - MerchantApiKey: []

paths:
  /health:
    get:
      tags: [health]
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: Service up
          content:
            application/json:
              schema:
                type: object
                required: [status, phase]
                properties:
                  status: { type: string, enum: [ok] }
                  phase: { type: integer }

  /api/v1/invoices:
    post:
      tags: [invoices]
      summary: Create an invoice
      description: |
        Creates an invoice and allocates a receive address derived from the
        gateway's HD seed. The merchant is resolved from the API key — the
        caller MUST NOT include `merchantId` in the body; if they do, it's
        ignored.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateInvoiceInput" }
      responses:
        "201":
          description: Invoice created
          content:
            application/json:
              schema:
                type: object
                required: [invoice]
                properties:
                  invoice: { $ref: "#/components/schemas/Invoice" }
          headers:
            X-Request-Id: { $ref: "#/components/headers/X-Request-Id" }
            X-RateLimit-Limit: { $ref: "#/components/headers/X-RateLimit-Limit" }
            X-RateLimit-Remaining: { $ref: "#/components/headers/X-RateLimit-Remaining" }
            X-RateLimit-Reset: { $ref: "#/components/headers/X-RateLimit-Reset" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/MerchantInactive" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/v1/invoices/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [invoices]
      summary: Fetch an invoice
      responses:
        "200":
          description: Invoice found
          content:
            application/json:
              schema:
                type: object
                required: [invoice]
                properties:
                  invoice: { $ref: "#/components/schemas/Invoice" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/invoices/{id}/expire:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [invoices]
      summary: Force-expire an invoice before its expiry window elapses
      responses:
        "200":
          description: Invoice expired
          content:
            application/json:
              schema:
                type: object
                properties:
                  invoice: { $ref: "#/components/schemas/Invoice" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Invoice is in a terminal state and cannot be expired
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/payouts:
    post:
      tags: [payouts]
      summary: Plan a payout
      description: |
        Creates a payout in `planned` state. A background job
        (`executeReservedPayouts`) reserves a fee wallet, signs, and
        broadcasts. Confirmation is surfaced via `payout.*` webhooks or a
        subsequent GET.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PlanPayoutInput" }
      responses:
        "201":
          description: Payout planned
          content:
            application/json:
              schema:
                type: object
                properties:
                  payout: { $ref: "#/components/schemas/Payout" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/MerchantInactive" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/v1/payouts/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [payouts]
      summary: Fetch a payout
      responses:
        "200":
          description: Payout found
          content:
            application/json:
              schema:
                type: object
                properties:
                  payout: { $ref: "#/components/schemas/Payout" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /checkout/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [checkout]
      summary: Public invoice snapshot (for checkout UIs)
      description: |
        Narrow projection of an invoice suitable for end-user pages. The merchant
        identity and any merchant-private metadata are deliberately excluded.
        Rate limited per IP.
      security: []
      responses:
        "200":
          description: Invoice snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  invoice: { $ref: "#/components/schemas/PublicInvoice" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /webhooks/alchemy:
    post:
      tags: [webhooks]
      summary: Ingest Alchemy Notify ADDRESS_ACTIVITY webhooks
      description: |
        HMAC-SHA256 of the raw body under the per-webhook signing key
        (looked up by `event.webhookId` in the encrypted-at-rest
        `alchemy_webhook_registry` table) must match `X-Alchemy-Signature`.
        Returns 200 fast and processes the payload in the background;
        Alchemy retries on non-2xx.
      security:
        - AlchemySignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200":
          description: Acknowledged; ingest happens in background
          content:
            application/json:
              schema:
                type: object
                properties:
                  received: { type: boolean, const: true }
        "400": { description: Malformed JSON after a valid signature }
        "401": { description: Missing or bad signature }
        "404": { description: Alchemy ingest not enabled on this deployment }
        "429": { $ref: "#/components/responses/RateLimited" }

  /admin/merchants:
    post:
      tags: [admin]
      summary: Create a merchant
      description: |
        Returns the plaintext API key ONCE in the response. The hash is
        stored; the plaintext is unrecoverable afterward.
      security:
        - AdminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, minLength: 1, maxLength: 128 }
                webhookUrl: { type: string, format: uri }
                webhookSecret:
                  type: string
                  description: Optional hex-encoded 32-byte HMAC signing secret. Generated if omitted.
                  pattern: "^[0-9a-f]{64}$"
      responses:
        "201":
          description: Merchant created
          content:
            application/json:
              schema:
                type: object
                properties:
                  merchant:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      name: { type: string }
                      webhookUrl: { type: [string, "null"] }
                      active: { type: boolean }
                      createdAt: { type: string, format: date-time }
                  apiKey:
                    type: string
                    description: Plaintext API key. Shown once; store it immediately.
                    pattern: "^sk_[0-9a-f]{64}$"
                  webhookSecret:
                    type: string
                    description: Present only if `webhookUrl` was provided.
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { description: Admin surface not enabled (ADMIN_KEY not set) }

  /admin/bootstrap/alchemy-webhooks:
    post:
      tags: [admin]
      summary: Idempotently create Alchemy webhooks for the configured chains
      description: |
        For each requested chainId, checks whether an Alchemy ADDRESS_ACTIVITY
        webhook already exists with the target URL + network; creates it if
        not. Returns per-chain status plus the `signingKey` for any newly
        created webhook. Signing keys are persisted encrypted into
        `alchemy_webhook_registry` automatically; the `signingKey` field in
        the response is a one-shot safety net in case persistence raced.
        Requires `ALCHEMY_NOTIFY_TOKEN` env.
      security:
        - AdminKey: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                chainIds:
                  type: array
                  items: { type: integer }
                  description: Defaults to `ALCHEMY_CHAINS` env, then the mainnet set
                seedAddressByChainId:
                  type: object
                  additionalProperties: { type: string }
                  description: Per-chain placeholder address (Alchemy requires ≥1 at create). Defaults to zero-address.
              description: |
                The target webhook URL is NOT accepted in the body. It is sourced from
                `GATEWAY_PUBLIC_URL` env (base origin) plus the canonical path
                `/webhooks/alchemy`. Env-only so a leaked ADMIN_KEY cannot be
                used to redirect Alchemy's traffic to an arbitrary host.
      responses:
        "200":
          description: Bootstrap complete; per-chain status in body
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        chainId: { type: integer }
                        status:
                          type: string
                          enum: [created, existing, unsupported, failed]
                        webhookId: { type: string }
                        signingKey:
                          type: string
                          description: Only present when `status=created`. Automatically persisted to `alchemy_webhook_registry`; kept in the response as a one-shot safety net if `persisted=false`.
                        error: { type: string }
        "400":
          description: Missing ALCHEMY_NOTIFY_TOKEN or GATEWAY_PUBLIC_URL env
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { description: Admin surface not enabled (ADMIN_KEY not set) }

  /admin/alchemy-webhooks/signing-keys:
    post:
      tags: [admin]
      summary: Register an Alchemy webhook's signing key manually
      description: |
        For operators who created a webhook through the Alchemy dashboard UI
        (not via bootstrap) or who need to push a key back in after a
        persistence failure. The signing key is encrypted via
        `SECRETS_ENCRYPTION_KEY` before being written to
        `alchemy_webhook_registry`. Re-running with the same chainId upserts
        (rotation after a dashboard delete+recreate).
      security:
        - AdminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chainId, webhookId, signingKey, webhookUrl]
              properties:
                chainId: { type: integer }
                webhookId: { type: string, minLength: 1, maxLength: 128 }
                signingKey: { type: string, minLength: 1, maxLength: 256 }
                webhookUrl: { type: string, format: uri }
      responses:
        "201":
          description: Signing key persisted encrypted-at-rest
          content:
            application/json:
              schema:
                type: object
                properties:
                  registered:
                    type: object
                    properties:
                      chainId: { type: integer }
                      webhookId: { type: string }
                      webhookUrl: { type: string, format: uri }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { description: Admin surface not enabled (ADMIN_KEY not set) }

  /admin/fee-wallets:
    post:
      tags: [admin]
      summary: Register a fee wallet + store its private key in the SignerStore
      security:
        - AdminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chainId, address, label, privateKey, family]
              properties:
                chainId: { type: integer }
                address: { type: string }
                label: { type: string, maxLength: 64 }
                privateKey:
                  type: string
                  description: Hex or family-specific. Stored in the SignerStore at `{kind:"fee-wallet", family, label}`.
                family:
                  type: string
                  enum: [evm, tron, solana]
      responses:
        "201":
          description: Fee wallet registered
        "400":
          description: Invalid address OR family does not match the chain adapter
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /admin/pool/initialize:
    post:
      tags: [admin]
      summary: Seed or top up the address pool per family
      description: |
        Idempotent. Families already at or above `initialSize` return as
        `already-sufficient` with zero additions. Families without a wired
        chain adapter in deps.chains return as `skipped-no-adapter`. Safe to
        call repeatedly and is the recovery path after a pool exhaustion.
      security:
        - AdminKey: []
      requestBody:
        required: false
        description: Empty body permitted; every field has a default.
        content:
          application/json:
            schema:
              type: object
              properties:
                families:
                  type: array
                  minItems: 1
                  items: { type: string, enum: [evm, tron, solana] }
                  default: [evm, tron, solana]
                initialSize:
                  type: integer
                  minimum: 1
                  maximum: 500
                  default: 5
      responses:
        "200":
          description: Initialization outcomes per family
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        family: { type: string, enum: [evm, tron, solana] }
                        status:
                          type: string
                          enum: [seeded, already-sufficient, skipped-no-adapter]
                        added: { type: integer }
        "400":
          description: Malformed JSON (BAD_JSON) or invalid families/initialSize
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /admin/pool/stats:
    get:
      tags: [admin]
      summary: Per-family pool utilization snapshot
      description: |
        Operators watch this endpoint + an alert on available-count under a
        threshold to catch "address supply running low" before POOL_EXHAUSTED
        fires on a live invoice-create.
      security:
        - AdminKey: []
      responses:
        "200":
          description: Pool statistics keyed by family
          content:
            application/json:
              schema:
                type: object
                properties:
                  stats:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        total: { type: integer }
                        available: { type: integer }
                        allocated: { type: integer }

  /admin/webhook-deliveries:
    get:
      tags: [admin]
      summary: List webhook deliveries by status
      description: |
        Operator view of the outbox. Use `status=dead` (default) to surface
        deliveries that exhausted the retry schedule and need manual
        intervention (merchant-side fix, then POST the replay endpoint).
        `pending` shows rows still queued for retry; `delivered` shows
        successful deliveries (mostly useful for audit).
      security:
        - AdminKey: []
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [pending, delivered, dead], default: dead }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500, default: 50 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        "200":
          description: Page of delivery rows
          content:
            application/json:
              schema:
                type: object
                properties:
                  deliveries:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        merchantId: { type: string }
                        eventType: { type: string }
                        status: { type: string, enum: [pending, delivered, dead] }
                        attempts: { type: integer }
                        lastStatusCode: { type: integer, nullable: true }
                        lastError: { type: string, nullable: true }
                        nextAttemptAt: { type: integer, nullable: true, description: "Epoch ms" }
                        deliveredAt: { type: integer, nullable: true, description: "Epoch ms" }
                        createdAt: { type: integer, description: "Epoch ms" }
                        updatedAt: { type: integer, description: "Epoch ms" }
        "400":
          description: Unknown status value (BAD_STATUS)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /admin/webhook-deliveries/{id}/replay:
    post:
      tags: [admin]
      summary: Replay a dead webhook delivery
      description: |
        Resets a delivery from `dead` back to `pending` with `next_attempt_at`
        set to now, so the next scheduled-jobs sweep re-drives it. Only rows
        in `dead` status are replayable — `pending` rows are already queued
        and `delivered` rows have already succeeded. Intended for when the
        merchant has fixed the underlying cause of permanent failure (TLS
        cert, URL change, etc.) and you want to push the event through.
      security:
        - AdminKey: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Row reset to pending and queued for retry
          content:
            application/json:
              schema:
                type: object
                properties:
                  replayed:
                    type: object
                    properties:
                      id: { type: string }
                      nextAttemptAt: { type: integer, description: "Epoch ms" }
        "404":
          description: Delivery not found or not in dead status (NOT_DEAD)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /admin/migrate:
    post:
      tags: [admin]
      summary: Apply any pending schema migrations
      description: |
        Runs the bundled migration set through the idempotent migration-runner.
        Already-applied ids are skipped. On Workers/Vercel-Edge (no filesystem
        at runtime) this endpoint returns 501 — operators use `wrangler d1
        migrations apply` or the Turso migration CLI instead.
      security:
        - AdminKey: []
      responses:
        "200":
          description: Migration sweep result
          content:
            application/json:
              schema:
                type: object
                properties:
                  applied:
                    type: array
                    items: { type: string }
                  skipped:
                    type: array
                    items: { type: string }
        "501":
          description: No bundled migration set on this runtime (MIGRATIONS_NOT_BUNDLED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /internal/cron/tick:
    post:
      tags: [internal]
      summary: Trigger the full scheduled-jobs sweep
      description: |
        Used by Vercel Cron / Upstash QStash / external schedulers. Returns
        per-job outcomes so a slow provider in one step doesn't mask failures
        elsewhere.
      security:
        - CronSecret: []
      responses:
        "200":
          description: Sweep completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  result:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        ok: { type: boolean }
                        error: { type: string }
        "401": { description: Missing or wrong Bearer token }
        "404": { description: Cron endpoint not enabled (CRON_SECRET not set) }

components:
  securitySchemes:
    MerchantApiKey:
      type: http
      scheme: bearer
      description: |
        Merchant API key returned once at `POST /admin/merchants`.
        Also accepted as `X-API-Key: <key>`.
    AdminKey:
      type: http
      scheme: bearer
      description: Shared admin key from `ADMIN_KEY` env. Also accepted as `X-Admin-Key`.
    AlchemySignature:
      type: apiKey
      in: header
      name: X-Alchemy-Signature
      description: HMAC-SHA256 hex of the raw body under the per-webhook signing key stored in `alchemy_webhook_registry` (looked up by `event.webhookId`).
    CronSecret:
      type: http
      scheme: bearer
      description: Shared secret from `CRON_SECRET` env.

  headers:
    X-Request-Id:
      description: UUID correlation id. Accepts a caller-supplied value if it's a valid UUID; otherwise minted.
      schema: { type: string, format: uuid }
    X-RateLimit-Limit:
      description: Window cap for this route's rate-limit scope
      schema: { type: integer }
    X-RateLimit-Remaining:
      description: Requests left in the current window after this one
      schema: { type: integer }
    X-RateLimit-Reset:
      description: Unix seconds when the window rolls
      schema: { type: integer }

  responses:
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    MerchantInactive:
      description: Merchant is deactivated
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Entity not found (or not owned by this merchant)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    ValidationError:
      description: Request body failed schema validation
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    RateLimited:
      description: Too many requests in the current window
      headers:
        Retry-After:
          description: Seconds until the window rolls
          schema: { type: integer }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code]
          properties:
            code: { type: string, description: Stable machine-readable code }
            message: { type: string }
            details:
              type: object
              additionalProperties: true
              description: Optional per-code payload (e.g. Zod issues on VALIDATION)

    CreateInvoiceInput:
      type: object
      description: |
        Either `amountRaw` OR (`fiatAmount` + `fiatCurrency`) must be provided.
      properties:
        chainId: { type: integer }
        token: { type: string, pattern: "^[A-Z0-9]+$" }
        amountRaw:
          type: string
          pattern: "^\\d+$"
          description: Raw token amount in smallest units.
        fiatAmount:
          type: string
          pattern: "^\\d+(\\.\\d+)?$"
        fiatCurrency:
          type: string
          pattern: "^[A-Z]{3}$"
        externalId:
          type: string
          maxLength: 256
          description: Merchant's opaque reference (e.g. cart id)
        metadata:
          type: object
          additionalProperties: true
        expiresInMinutes:
          type: integer
          minimum: 1
          maximum: 1440
          default: 30
      required: [chainId, token]

    Invoice:
      type: object
      properties:
        id: { type: string, format: uuid }
        merchantId: { type: string, format: uuid }
        status:
          type: string
          enum: [created, partial, detected, confirmed, expired, canceled]
        chainId: { type: integer }
        token: { type: string }
        receiveAddress: { type: string }
        addressIndex: { type: integer }
        requiredAmountRaw: { type: string }
        receivedAmountRaw: { type: string }
        fiatAmount: { type: [string, "null"] }
        fiatCurrency: { type: [string, "null"] }
        quotedRate: { type: [string, "null"] }
        externalId: { type: [string, "null"] }
        metadata: { type: [object, "null"] }
        createdAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        confirmedAt: { type: [string, "null"], format: date-time }
        updatedAt: { type: string, format: date-time }

    PublicInvoice:
      type: object
      description: Same as Invoice but with merchant-private fields stripped
      properties:
        id: { type: string, format: uuid }
        status: { type: string }
        chainId: { type: integer }
        token: { type: string }
        receiveAddress: { type: string }
        requiredAmountRaw: { type: string }
        receivedAmountRaw: { type: string }
        fiatAmount: { type: [string, "null"] }
        fiatCurrency: { type: [string, "null"] }
        createdAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        confirmedAt: { type: [string, "null"], format: date-time }

    PlanPayoutInput:
      type: object
      required: [chainId, token, amountRaw, destinationAddress]
      properties:
        chainId: { type: integer }
        token: { type: string }
        amountRaw: { type: string, pattern: "^\\d+$" }
        destinationAddress: { type: string, minLength: 1, maxLength: 128 }

    Payout:
      type: object
      properties:
        id: { type: string, format: uuid }
        merchantId: { type: string, format: uuid }
        status:
          type: string
          enum: [planned, reserved, submitted, confirmed, failed, canceled]
        chainId: { type: integer }
        token: { type: string }
        amountRaw: { type: string }
        destinationAddress: { type: string }
        sourceAddress: { type: [string, "null"] }
        txHash: { type: [string, "null"] }
        feeEstimateNative: { type: [string, "null"] }
        lastError: { type: [string, "null"] }
        createdAt: { type: string, format: date-time }
        submittedAt: { type: [string, "null"], format: date-time }
        confirmedAt: { type: [string, "null"], format: date-time }
        updatedAt: { type: string, format: date-time }
