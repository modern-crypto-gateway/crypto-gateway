                      updatedAt: "2026-07-04T10:04:03.000Z"
                    transactions:
                      - hash: "0x9f2b7c1e83a4d5f60718293a4b5c6d7e8f9012a3b4c5d6e7f8091a2b3c4d5e6f"
                        chainId: 137
                        chainName: polygon
                        token: USDC
                        isNative: false
                        amount: "40"
