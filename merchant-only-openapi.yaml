  /api/v1/invoices/{id}/expire:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [invoices]
      operationId: expireInvoice
      summary: Force-expire an invoice before its expiry window elapses
      description: |
        Transitions a `pending` or `processing` invoice to `expired`
        immediately — partial-paid invoices (`processing` +
        `extraStatus='partial'`) are eligible too. On success the gateway
        publishes **`invoice:expired`** to your webhook (or the
        per-invoice `webhookUrl` override) and the invoice's pooled
        receive addresses return to rotation after the cooldown.

        NOT idempotent: repeating the call on an already-terminal invoice
        (`completed`, `expired`, `canceled`) returns 409
        `EXPIRE_NOT_ALLOWED`. The 200 body is `{ invoice }` only — no
        `amounts` / `transactions` blocks (use the GET for those).
      responses:
        "200":
          description: Invoice expired
          headers:
            X-Request-Id: { $ref: "#/components/headers/X-Request-Id" }
            X-RateLimit-Limit: { $ref: "#/components/headers/X-RateLimit-Limit" }
            X-RateLimit-Remaining: { $ref: "#/components/headers/X-RateLimit-Remaining" }
            X-RateLimit-Reset: { $ref: "#/components/headers/X-RateLimit-Reset" }
          content:
            application/json:
              schema:
                type: object
                required: [invoice]
                properties:
                  invoice: { $ref: "#/components/schemas/Invoice" }
              examples:
                expired:
                  summary: Unpaid invoice force-expired
                  value:
                    invoice:
                      id: "9d8c7b6a-5e4f-3a2b-1c0d-9e8f7a6b5c4d"
                      merchantId: "7d9f6c1a-2b3e-4c5d-8e9f-0a1b2c3d4e5f"
                      status: expired
                      extraStatus: null
                      chainId: 1
                      token: ETH
                      receiveAddress: "0x4Bb2f019661cE532803012645Ac136ddd64DBA71"
                      addressIndex: 15
                      acceptedFamilies: [evm]
                      receiveAddresses:
                        - family: evm
                          chainId: 1
                          address: "0x4Bb2f019661cE532803012645Ac136ddd64DBA71"
                          poolAddressId: "b21a3c4d-5e6f-4a7b-8c9d-0e1f2a3b4c5d"
                      requiredAmountRaw: "0"
                      receivedAmountRaw: "0"
                      fiatAmount: null
                      fiatCurrency: null
                      quotedRate: null
                      amountUsd: "250.00"
                      paidUsd: "0"
                      overpaidUsd: "0"
                      rateWindowExpiresAt: "2026-07-04T09:55:00.000Z"
                      rates: { ETH: "2450.12", USDC: "0.9998", USDT: "1.0001" }
                      externalId: "order-10024"
                      metadata: null
                      webhookUrl: "https://shop.example.com/hooks/crypto/order-10024"
                      paymentToleranceUnderBps: 100
                      paymentToleranceOverBps: 500
                      confirmationThreshold: 12
                      confirmationTiers: null
                      createdAt: "2026-07-04T09:45:00.000Z"
                      expiresAt: "2026-07-04T09:58:21.000Z"
                      confirmedAt: null
                      updatedAt: "2026-07-04T09:58:21.000Z"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
