# ---------------------------------------------------------------------------
# Outbound webhooks — events the GATEWAY delivers to YOUR server.
# Each entry describes the POST your endpoint must accept. Respond 2xx fast;
# see the top-level description for signing, retries, and dedupe.
# ---------------------------------------------------------------------------
webhooks:
  "invoice:payment_detected":
    post:
      tags: [webhooks]
      operationId: onInvoicePaymentDetected
      summary: A transfer to the invoice's receive address was seen on-chain
      description: |
        Fires once per contributing transaction the moment it is detected
        (0+ confirmations). `data.triggerTxHash` names the transaction
        that caused this event; `data.transactions` lists EVERY
        transaction ever associated with the invoice. The embedded
        invoice typically shows `status: "processing"` (with
        `extraStatus: "partial"` when the detected+confirmed total is
        still under the target).

        Typical use: show "payment seen, awaiting confirmation" in your
        order UI. Do NOT ship goods on this event — wait for
        `invoice:completed`. The whole-invoice flip into the in-flight
        state is also signaled once by `invoice:processing` (delivery
        order between the two is not guaranteed).
      parameters:
        - $ref: "#/components/parameters/WebhookSignature"
        - $ref: "#/components/parameters/WebhookIdempotencyKey"
        - $ref: "#/components/parameters/WebhookTimestamp"
        - $ref: "#/components/parameters/WebhookAttempt"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WebhookInvoiceEvent" }
            examples:
              partialDetected:
                summary: First (partial) payment of $40 on a $100 invoice detected
                value:
                  event: "invoice:payment_detected"
                  timestamp: "2026-07-04T10:04:05.000Z"
                  data:
                    invoice:
                      id: "0b9e4c7a-1d2f-4a3b-9c8d-5e6f7a8b9c0d"
                      status: processing
                      extraStatus: partial
                      chainId: 137
                      token: USDC
