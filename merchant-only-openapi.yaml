                          updatedAt: "2026-07-04T11:00:00.000Z"
                      - index: 1
                        status: planned
                        payout:
                          id: "f5a6b7c8-d9e0-1f2a-3b4c-5d6e7f8a9b0c"
                          merchantId: "7d9f6c1a-2b3e-4c5d-8e9f-0a1b2c3d4e5f"
