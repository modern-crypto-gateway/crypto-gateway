        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/v1/payouts/{id}/cancel:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [payouts]
      operationId: cancelPayout
      summary: Cancel a reserved payout
      description: |
        Cancels a payout that's still in `reserved` status — releases its
        source (and sponsor, when present) reservations so the balance is
        immediately available to a subsequent plan.

        Once a broadcast has started (`topping-up`, `submitted`, or
        terminal states) the gateway can't recall the on-chain tx; the
        endpoint returns 409 `PAYOUT_NOT_CANCELABLE`. The cancel is
        CAS-guarded against the executor: if the executor claims the row
        between your read and the cancel, you get the same 409.
        Idempotent on already-canceled rows (200 with the canceled row).

        No `payout.canceled` webhook exists — the 200 response is the
        signal. If you rely on webhooks, poll `GET /api/v1/payouts/{id}`
        after issuing cancel until status is terminal.
      responses:
        "200":
          description: Canceled (or idempotent re-cancel of an already-canceled row)
          headers:
            X-Request-Id: { $ref: "#/components/headers/X-Request-Id" }
          content:
            application/json:
              schema:
                type: object
                required: [payout]
                properties:
                  payout: { $ref: "#/components/schemas/Payout" }
              examples:
                canceled:
                  value:
                    payout:
                      id: "e4f5a6b7-c8d9-0e1f-2a3b-4c5d6e7f8a9b"
                      merchantId: "7d9f6c1a-2b3e-4c5d-8e9f-0a1b2c3d4e5f"
                      kind: standard
                      parentPayoutId: null
                      status: canceled
                      chainId: 137
                      token: USDC
                      amountRaw: "250000000"
                      quotedAmountUsd: null
                      quotedRate: null
                      feeTier: medium
                      feeQuotedNative: "1950000000000000"
                      batchId: null
                      destinationAddress: "0xAb5801a7D398351b8bE11C439e05C5b3259aec9B"
                      sourceAddress: "0x8Ba1f109551bD432803012645Ac136ddd64DBA72"
                      txHash: null
                      topUpTxHash: null
                      topUpSponsorAddress: null
                      topUpAmountRaw: null
                      feeEstimateNative: "1950000000000000"
                      lastError: null
                      webhookUrl: null
                      confirmationThreshold: 12
                      confirmationTiers: null
                      createdAt: "2026-07-04T11:00:00.000Z"
                      submittedAt: null
                      confirmedAt: null
                      broadcastAttemptedAt: null
                      updatedAt: "2026-07-04T11:02:30.000Z"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: |
            `PAYOUT_NOT_FOUND` — nonexistent id or cross-merchant access.
            Malformed (non-UUID) ids short-circuit before the lookup and
            return the same 404 status but with code `NOT_FOUND` (and no
            message) — switch on both codes.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: |
            `PAYOUT_NOT_CANCELABLE` — the payout is in any status other
            than `reserved` / `canceled`, or the executor claimed the row
            for broadcast concurrently with the cancel attempt.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              examples:
                inFlight:
                  value:
                    error:
                      code: PAYOUT_NOT_CANCELABLE
                      message: "Payout is 'submitted' — the on-chain transaction cannot be recalled"
        "429": { $ref: "#/components/responses/RateLimited" }

  /checkout/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
        description: Invoice id — the high-entropy UUID is the only credential.
    get:
      tags: [checkout]
      operationId: getCheckoutInvoice
      summary: Public invoice snapshot (for checkout UIs)
      description: |
        Narrow, unauthenticated projection of an invoice — everything a
        hosted checkout page needs to render "send N TOKEN to ADDRESS"
        plus a QR code. No API key required; safe to call from the payer's
        browser.

        Deliberately narrower than the merchant view: `merchantId`,
        `externalId`, `metadata`, `webhookUrl`, tolerance/confirmation
        policy fields and `updatedAt` are all excluded.

        Multi-family invoices: `receiveAddresses` carries one
        `{ family, address }` entry per accepted family (UTXO: one per
        chain) — render all of them so the payer picks their chain.
        USD-path invoices additionally expose `payableTokens`: one
        ready-to-render entry per (family, chainId, token) the deployment
        can actually settle — the UI never needs to know token decimals or
        do rate math. Poll this endpoint (respecting the per-IP rate
        limit, default 60/min) to flip the page to "paid" when `status`
        reaches `completed`.

        Malformed and unknown ids both return 404 — indistinguishable by
        design so bots can't probe the keyspace.
      security: []
      responses:
        "200":
          description: Invoice snapshot
          headers:
            X-Request-Id: { $ref: "#/components/headers/X-Request-Id" }
            X-RateLimit-Limit: { $ref: "#/components/headers/X-RateLimit-Limit" }
            X-RateLimit-Remaining: { $ref: "#/components/headers/X-RateLimit-Remaining" }
            X-RateLimit-Reset: { $ref: "#/components/headers/X-RateLimit-Reset" }
