  "invoice:demoted":
    post:
      tags: [webhooks]
      operationId: onInvoiceDemoted
      summary: A chain reorg un-confirmed the invoice
      description: |
        Fires when a blockchain reorganization orphans transaction(s) that
        had counted toward the invoice, dropping it from `completed` (or
        `processing`) back to a less-settled state. The `data` block
        carries the standard envelope PLUS:
          - `previousStatus` — where the invoice was before the reorg
          - `poolReacquired` — the gateway re-locked the receive address
            to keep watching for a replacement payment
          - `poolCollided` — the address had ALREADY been recycled to a
            newer invoice when the reorg hit (rare; funds arriving now may
            attribute to the newer invoice — coordinate with the operator)

        **Act on this if you fulfilled on `invoice:completed`**: pause the
        order, then poll `GET /api/v1/invoices/{id}` — if the payment
        re-confirms the invoice returns to `completed`, but
        `invoice:completed` is NOT re-delivered (same idempotency key,
        already delivered once).
      parameters:
        - $ref: "#/components/parameters/WebhookSignature"
        - $ref: "#/components/parameters/WebhookIdempotencyKey"
        - $ref: "#/components/parameters/WebhookTimestamp"
        - $ref: "#/components/parameters/WebhookAttempt"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WebhookInvoiceDemotedEvent" }
            examples:
              reorg:
                summary: Completed invoice knocked back to processing by a reorg
                value:
