  /api/v1/payouts/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [payouts]
      operationId: getPayout
      summary: Fetch a payout
      description: |
        Poll this after `POST /api/v1/payouts` to track the lifecycle:
        `reserved` → (`topping-up` →) `submitted` → `confirmed`, or
        `failed` / `canceled`. `txHash` (and `topUpTxHash` when a gas
        top-up was needed) appear once broadcast; `lastError` carries the
        merchant-safe failure reason after a failure.

        404 semantics: a malformed (non-UUID) id, a nonexistent id, and a
        payout belonging to another merchant all return the same
        `NOT_FOUND`.
      responses:
        "200":
          description: Payout found
          headers:
            X-Request-Id: { $ref: "#/components/headers/X-Request-Id" }
          content:
            application/json:
              schema:
                type: object
                required: [payout]
                properties:
                  payout: { $ref: "#/components/schemas/Payout" }
              examples:
                toppingUp:
                  summary: Mid-flight — waiting for the gas top-up to confirm
                  value:
                    payout:
                      id: "a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"
                      merchantId: "7d9f6c1a-2b3e-4c5d-8e9f-0a1b2c3d4e5f"
                      kind: standard
                      parentPayoutId: null
                      status: topping-up
                      chainId: 728126428
                      token: USDT
                      amountRaw: "500000000"
                      quotedAmountUsd: "500.00"
                      quotedRate: "1.0001"
                      feeTier: null
                      feeQuotedNative: null
                      batchId: "vendor-settlement-2026-07-04"
                      destinationAddress: "TQn9Y2khEsLJW1ChVWFMSMeRDow5KcbLSE"
                      sourceAddress: "TVj7RNVHy6thbM7BWdSe9G6gXwKhjhdNZS"
                      txHash: null
                      topUpTxHash: "8f2a1b3c4d5e6f708192a3b4c5d6e7f8091a2b3c4d5e6f708192a3b4c5d6e7f8"
                      topUpSponsorAddress: "TN3W4H6rK2ce4vX9YnFQHwKENnHjoxb3m9"
                      topUpAmountRaw: "28000000"
                      feeEstimateNative: "27000000"
