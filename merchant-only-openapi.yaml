  "invoice:processing":
    post:
      tags: [webhooks]
      operationId: onInvoiceProcessing
      summary: The invoice flipped into the in-flight state
      description: |
        Whole-invoice companion to the per-transaction `payment_*`
        events: one "payment in flight" signal so your UI can swap from
        "waiting for payment" to "payment in progress" without tracking
        individual transfers.

        Fires once per distinct `(status, extraStatus)` flavor:
          - full amount detected, awaiting confirmations
            (`extraStatus: null`)
          - a partial payment landed (`extraStatus: "partial"`)
          - the partial flag cleared after a top-up payment
            (`extraStatus: null` again — a distinct delivery from the
            earlier partial one, so you see the upgrade)

        Repeats of the same flavor are deduped via the idempotency key
        (`invoice:processing:<invoiceId>:processing:<extraStatus|none>`),
        so an invoice delivers this event at most twice. A reorg demotion
        back to `processing` reuses the earlier key for any flavor
        already delivered (no duplicate) — but if the demotion lands on a
        flavor you never received (e.g. the invoice completed directly
        without ever passing through `processing`), this event fires
        then, alongside `invoice:demoted`.
        `triggerTxHash` is always null (status-level event); the
        transaction that caused the flip arrives separately as
        `invoice:payment_detected`. Delivery order between the two is
        not guaranteed.
      parameters:
        - $ref: "#/components/parameters/WebhookSignature"
        - $ref: "#/components/parameters/WebhookIdempotencyKey"
        - $ref: "#/components/parameters/WebhookTimestamp"
        - $ref: "#/components/parameters/WebhookAttempt"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WebhookInvoiceEvent" }
