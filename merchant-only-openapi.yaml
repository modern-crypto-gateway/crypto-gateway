                      addressIndex: 42
                      acceptedFamilies: [evm]
                      receiveAddresses:
                        - family: evm
                          address: "0x8Ba1f109551bD432803012645Ac136ddd64DBA72"
                      requiredAmountRaw: "0"
                      receivedAmountRaw: "0"
                      fiatAmount: null
                      fiatCurrency: null
                      quotedRate: null
                      amountUsd: "100.00"
                      paidUsd: "0"
                      overpaidUsd: "0"
