  /api/v1/payouts:
    get:
      tags: [payouts]
      operationId: listPayouts
      summary: List payouts
      description: |
        Returns payouts planned by the authenticated merchant, newest
        first (`createdAt DESC`). All filters optional, AND-combined.
        Internal gateway bookkeeping rows never appear here — only your
        `standard` payouts.

        Pagination via `limit` + `offset`; the response includes `hasMore`
        (no total count) — page until it is `false`.
      parameters:
        - name: status
          in: query
          description: |
            Comma-separated statuses, any of
            `planned,reserved,topping-up,submitted,confirmed,failed,canceled`.
            Unknown values → 400 `BAD_STATUS`. New rows start at
            `reserved` (the source is picked synchronously on POST);
            `planned` matches only legacy rows. `topping-up` means the
            source address lacked native gas and the executor is waiting
            for a sponsor → source top-up tx to confirm first.
          schema: { type: string }
          example: submitted,confirmed
        - name: chainId
          in: query
          schema: { type: integer, minimum: 1 }
        - name: token
          in: query
          description: |
            Comma-separated token symbols (OR match). Each entry must
            match `^[A-Z0-9]{1,16}$` — malformed entries fail 400
            `VALIDATION`; unknown-but-well-formed symbols simply match
            zero rows.
          schema: { type: string }
        - name: destinationAddress
          in: query
          description: Exact match on the canonicalized destination.
          schema: { type: string }
        - name: destinationAddressContains
          in: query
          description: Case-insensitive substring match on `destinationAddress`.
          schema: { type: string }
        - name: sourceAddress
          in: query
          description: |
            Gateway address that funded the payout. Always NULL on
            UTXO-family payouts (no single source), so this filter
            implicitly excludes them.
          schema: { type: string }
        - name: sourceAddressContains
          in: query
          schema: { type: string }
        - name: batchId
          in: query
          description: |
            Only payouts belonging to a specific batch (the `batchId`
            returned by `POST /api/v1/payouts/batch`, or one you supplied
            on single-create).
          schema: { type: string }
        - name: txHash
          in: query
          description: |
            Exact on-chain tx hash. NULL until the payout reaches
            `submitted`, so this implicitly filters to broadcast payouts.
          schema: { type: string }
        - name: feeTier
          in: query
          description: |
            Comma-separated fee tiers (`low`, `medium`, `high`). Payouts
            with no tier recorded are excluded when set.
          schema: { type: string }
        - name: hasError
          in: query
          description: |
            `true` → only payouts carrying a `lastError`; `false` → only
            clean ones. Accepts `true|false|1|0`.
          schema: { type: boolean }
        - name: amountUsdMin
          in: query
          description: |
            Inclusive lower bound on `quotedAmountUsd`. Raw-amount payouts
            (no USD quote) are excluded when set.
          schema: { type: number }
        - name: amountUsdMax
          in: query
          schema: { type: number }
        - name: createdFrom
          in: query
          description: Inclusive lower bound on `createdAt` — ISO-8601 or unix-ms.
          schema: { type: string }
        - name: createdTo
          in: query
          schema: { type: string }
        - name: submittedFrom
          in: query
          schema: { type: string }
        - name: submittedTo
          in: query
          schema: { type: string }
        - name: confirmedFrom
          in: query
          schema: { type: string }
        - name: confirmedTo
          in: query
          schema: { type: string }
        - name: updatedFrom
          in: query
          schema: { type: string }
        - name: updatedTo
          in: query
          schema: { type: string }
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [createdAt, updatedAt, submittedAt, confirmedAt, amountUsd]
            default: createdAt
        - name: sortDir
          in: query
          schema: { type: string, enum: [asc, desc], default: desc }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        "200":
          description: Paginated list of payouts
          headers:
            X-Request-Id: { $ref: "#/components/headers/X-Request-Id" }
            X-RateLimit-Limit: { $ref: "#/components/headers/X-RateLimit-Limit" }
            X-RateLimit-Remaining: { $ref: "#/components/headers/X-RateLimit-Remaining" }
            X-RateLimit-Reset: { $ref: "#/components/headers/X-RateLimit-Reset" }
          content:
            application/json:
              schema:
                type: object
                required: [payouts, limit, offset, sortBy, sortDir, hasMore]
                properties:
                  payouts:
                    type: array
                    items: { $ref: "#/components/schemas/Payout" }
                  limit: { type: integer }
                  offset: { type: integer }
                  sortBy: { type: string }
                  sortDir: { type: string }
                  hasMore: { type: boolean }
              examples:
                page:
                  summary: One confirmed payout
                  value:
                    payouts:
                      - id: "e4f5a6b7-c8d9-0e1f-2a3b-4c5d6e7f8a9b"
                        merchantId: "7d9f6c1a-2b3e-4c5d-8e9f-0a1b2c3d4e5f"
                        kind: standard
                        parentPayoutId: null
                        status: confirmed
                        chainId: 137
                        token: USDC
                        amountRaw: "250000000"
                        quotedAmountUsd: "250.00"
                        quotedRate: "0.9998"
                        feeTier: medium
                        feeQuotedNative: "1950000000000000"
                        batchId: null
                        destinationAddress: "0xAb5801a7D398351b8bE11C439e05C5b3259aec9B"
                        sourceAddress: "0x8Ba1f109551bD432803012645Ac136ddd64DBA72"
                        txHash: "0x54ab99c2d1e0f83b7a6c5d4e3f2a1b0c9d8e7f6a5b4c3d2e1f0a9b8c7d6e5f4a"
                        topUpTxHash: null
                        topUpSponsorAddress: null
                        topUpAmountRaw: null
                        feeEstimateNative: "1950000000000000"
                        lastError: null
                        webhookUrl: null
                        confirmationThreshold: 12
                        confirmationTiers: null
                        createdAt: "2026-07-04T11:00:00.000Z"
                        submittedAt: "2026-07-04T11:00:09.000Z"
                        confirmedAt: "2026-07-04T11:01:02.000Z"
                        broadcastAttemptedAt: "2026-07-04T11:00:08.000Z"
                        updatedAt: "2026-07-04T11:01:02.000Z"
                    limit: 25
                    offset: 0
                    sortBy: createdAt
                    sortDir: desc
                    hasMore: false
        "400":
          description: |
            Bad filter. Route-specific codes: `BAD_STATUS`, `BAD_CHAIN_ID`,
            `BAD_TIMESTAMP`, `BAD_NUMBER`, `BAD_BOOLEAN`. Everything else
            surfaces as `VALIDATION` with Zod issues in `details`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }
    post:
      tags: [payouts]
      operationId: createPayout
      summary: Plan a payout (funding source reserved synchronously)
      description: |
        Plans a payout and — in the same request — picks the gateway
        funding source and writes balance reservations. The returned
        payout is already `status: "reserved"`: `sourceAddress` is set on
        account-model chains (EVM / Tron / Solana); on UTXO chains
        (BTC / LTC) it stays null because coin selection runs across every
        owned UTXO at broadcast time (feasibility is still verified with a
        real coin-selection pass on this POST).

        Because selection is synchronous, **"not enough funds" surfaces on
        this POST** (see the 400/503 codes) — never as a later `failed`
        webhook. Only the broadcast is asynchronous: the executor picks up
        the reserved row, optionally routes a sponsor → source gas top-up
        (status `topping-up`), then broadcasts (`submitted`) and confirms
        (`confirmed`). Track progress via the `payout.submitted` /
        `payout.confirmed` / `payout.failed` webhooks or by polling
        `GET /api/v1/payouts/{id}`.

        No webhook fires at plan time — the 201 response IS your
        confirmation of planning. Cancel is possible only while status is
        `reserved` (`POST /api/v1/payouts/{id}/cancel`).

        **Amount — provide EXACTLY ONE of:**
          - `amountRaw` — integer string, token's smallest unit
          - `amount` — human decimal string (max the token's decimals)
          - `amountUSD` — USD-pegged; converted via the price oracle at
            plan time (rate snapshotted to `quotedRate`; for volatile
            tokens the broadcast happens seconds-to-minutes later, so the
            executed market value can drift — accepted v1 cost)

        Retry-safety: there is no idempotency key on this route. If the
        response is lost, reconcile via
        `GET /api/v1/payouts?batchId=<yourBatchId>` before retrying.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PlanPayoutInput" }
            examples:
              raw:
                summary: 250 USDC on Polygon, raw units, medium tier
                value:
                  chainId: 137
                  token: USDC
                  amountRaw: "250000000"
                  destinationAddress: "0xAb5801a7D398351b8bE11C439e05C5b3259aec9B"
                  feeTier: medium
              humanDecimal:
                summary: 0.75 SOL, human decimal
                value:
                  chainId: 900
                  token: SOL
                  amount: "0.75"
                  destinationAddress: "9xQeWvG816bUx9EPjHmaT23yvVM2ZWbrrpZb9PusVFin"
              usdPegged:
                summary: $500 of USDT on Tron with per-payout webhook + batch tag
                value:
                  chainId: 728126428
                  token: USDT
                  amountUSD: "500.00"
                  destinationAddress: "TQn9Y2khEsLJW1ChVWFMSMeRDow5KcbLSE"
                  batchId: "vendor-settlement-2026-07-04"
                  webhookUrl: "https://ops.example.com/hooks/payouts"
                  webhookSecret: "whsec_c1a7d94e2f8b6035"
              utxo:
                summary: 0.005 BTC to a bech32 address, high tier
                value:
                  chainId: 800
                  token: BTC
                  amount: "0.005"
                  destinationAddress: "bc1qar0srrr7xfkvy5l643lydnw9re59gtzzwf5mdq"
                  feeTier: high
      responses:
        "201":
          description: Payout planned and reserved (`status` is `reserved`)
          headers:
            X-Request-Id: { $ref: "#/components/headers/X-Request-Id" }
            X-RateLimit-Limit: { $ref: "#/components/headers/X-RateLimit-Limit" }
            X-RateLimit-Remaining: { $ref: "#/components/headers/X-RateLimit-Remaining" }
            X-RateLimit-Reset: { $ref: "#/components/headers/X-RateLimit-Reset" }
          content:
            application/json:
              schema:
                type: object
                required: [payout]
                properties:
                  payout: { $ref: "#/components/schemas/Payout" }
              examples:
                reserved:
                  summary: Fresh reservation for the 250 USDC request
                  value:
                    payout:
                      id: "e4f5a6b7-c8d9-0e1f-2a3b-4c5d6e7f8a9b"
                      merchantId: "7d9f6c1a-2b3e-4c5d-8e9f-0a1b2c3d4e5f"
                      kind: standard
                      parentPayoutId: null
                      status: reserved
                      chainId: 137
                      token: USDC
                      amountRaw: "250000000"
                      quotedAmountUsd: null
                      quotedRate: null
                      feeTier: medium
                      feeQuotedNative: "1950000000000000"
                      batchId: null
                      destinationAddress: "0xAb5801a7D398351b8bE11C439e05C5b3259aec9B"
                      sourceAddress: "0x8Ba1f109551bD432803012645Ac136ddd64DBA72"
                      txHash: null
                      topUpTxHash: null
                      topUpSponsorAddress: null
                      topUpAmountRaw: null
                      feeEstimateNative: "1950000000000000"
                      lastError: null
                      webhookUrl: null
                      confirmationThreshold: 12
                      confirmationTiers: null
                      createdAt: "2026-07-04T11:00:00.000Z"
                      submittedAt: null
                      confirmedAt: null
                      broadcastAttemptedAt: null
                      updatedAt: "2026-07-04T11:00:00.000Z"
        "400":
          description: |
            Stable `error.code` values:
              - `BAD_JSON` — body not JSON
              - `VALIDATION` — Zod issues in `details` (unknown keys — the
                schema is strict —, none or more than one of
                `amountRaw`/`amount`/`amountUSD`, `webhookUrl` without
                `webhookSecret` or vice versa)
              - `TOKEN_NOT_SUPPORTED` — symbol not registered on the chain
              - `INVALID_DESTINATION` — address fails the chain family's
                canonicalize/validate; also used for an SSRF-unsafe
                `webhookUrl`
              - `BAD_AMOUNT` — `amount` has more decimal places than the
                token supports
              - `PAYOUT_NOT_SUPPORTED_ON_FAMILY` — Monero is inbound-only
              - `MAX_AMOUNT_EXCEEDS_NET_SPENDABLE` — amount + gas exceeds
                the spendable balance; `details` carries
                `suggestedAmountRaw` / `suggestedAmount` / best-effort
                `suggestedAmountUsd` so you can retry with a fitting amount
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              examples:
                exceedsSpendable:
                  value:
                    error:
                      code: MAX_AMOUNT_EXCEEDS_NET_SPENDABLE
                      message: "Amount plus gas exceeds spendable balance"
                      details:
                        suggestedAmountRaw: "29000000000000000"
                        suggestedAmount: "0.029"
                        suggestedAmountUsd: "71.05"
                invalidDestination:
                  value:
                    error:
                      code: INVALID_DESTINATION
                      message: "Destination is not a valid address for family 'evm'"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/MerchantInactive" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "503":
          description: |
            Transient / operator-actionable rejections — nothing was
            reserved; safe to retry after the condition clears:
              - `ORACLE_FAILED` — `amountUSD` given but the price oracle
                is unreachable; a stale rate is never substituted.
              - `FEE_ESTIMATE_FAILED` — the chain fee quote failed; retry
                shortly.
              - `INSUFFICIENT_BALANCE_ANY_SOURCE` — no single gateway
                address covers the amount. The message distinguishes
                "aggregate is enough but fragmented — the operator should
                consolidate, or lower the amount" from "aggregate too low
                — fund the gateway".
              - `NO_GAS_SPONSOR_AVAILABLE` — a token holder exists but no
                other address has enough native to top up its gas.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              examples:
                fragmented:
                  value:
                    error:
                      code: INSUFFICIENT_BALANCE_ANY_SOURCE
                      message: "Aggregate balance covers the amount but no single source does — consolidate or lower the amount"

  /api/v1/payouts/estimate:
    post:
      tags: [payouts]
      operationId: estimatePayout
      summary: Quote fee tiers + preview the source the planner would pick
      description: |
        Returns low/medium/high fee quotes AND the funding address the
        planner would pick, WITHOUT planning anything or writing a
        reservation. Use it to preview where a payout would come from,
        whether a just-in-time gas top-up would be needed, and to pick a
        tier before committing the real `POST /api/v1/payouts`. The
        request body is the same strict `PlanPayoutInput`.

        Source-selection preview:
          1. Tier A — richest gateway address (by token balance) that ALSO
             has enough native for gas → no `topUp` field.
          2. Tier B — no address has both → richest token holder plus a
             sponsor proposal; `topUp.required=true`, `topUp.sponsor` null
             when no funded sponsor exists.
          3. No holder has enough → `source: null` and `warnings` carries
             `no_source_address_has_sufficient_token_balance` (plus
             `single_source_insufficient_consolidate_required` when the
             aggregate would cover it).

        UTXO chains have no per-address picker — `source` is a synthetic
        aggregate (`address: "<utxo-aggregate>"`, `derivationIndex: -1`)
        and `alternatives` is always empty.

        For native payouts (token == chain native) an amount that leaves
        no gas headroom throws 400 `MAX_AMOUNT_EXCEEDS_NET_SPENDABLE` with
        `suggestedAmount*` fields in `details` for programmatic pre-fill.

        Tier semantics: **EVM** = 0.8× / 1.0× / 1.5× priority-fee
        multipliers; **Solana** = 25th/50th/75th percentile of recent
        prioritization fees (`tieringSupported=false` when no samples);
        **Tron** = no tier concept, three identical quotes,
        `tieringSupported=false`; **UTXO** = sat/vB tiers applied to a
        typical transfer size. A fee-quote failure does NOT error — the
        response degrades to `tieringSupported=false` with zeroed tiers
        and the `fee_quote_unavailable` warning.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PlanPayoutInput" }
            examples:
              usdc:
                value:
                  chainId: 137
                  token: USDC
                  amountRaw: "250000000"
                  destinationAddress: "0xAb5801a7D398351b8bE11C439e05C5b3259aec9B"
      responses:
        "200":
          description: Fee-tier quote + source preview (nothing was reserved)
          headers:
            X-Request-Id: { $ref: "#/components/headers/X-Request-Id" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PayoutFeeEstimate" }
              examples:
                directSource:
                  summary: Tier-A pick — source has both token and gas
                  value:
                    amountRaw: "250000000"
                    quotedAmountUsd: null
                    quotedRate: null
                    tiers:
                      tieringSupported: true
                      nativeSymbol: POL
                      low:
                        tier: low
                        nativeAmountRaw: "1560000000000000"
                        usdAmount: "0.00064"
                      medium:
                        tier: medium
                        nativeAmountRaw: "1950000000000000"
                        usdAmount: "0.00080"
                      high:
                        tier: high
                        nativeAmountRaw: "2925000000000000"
                        usdAmount: "0.00120"
                    source:
                      address: "0x8Ba1f109551bD432803012645Ac136ddd64DBA72"
                      derivationIndex: 42
                      tokenBalance: "812440000"
                      nativeBalance: "84000000000000000"
                      feeCoveredByDelegatedEnergy: false
                    alternatives:
                      - address: "0x11f3B4c5D6e7F8a9B0c1D2e3F4A5b6C7d8E9f0A1"
                        derivationIndex: 43
                        tokenBalance: "310020000"
                        nativeBalance: "12000000000000000"
                        feeCoveredByDelegatedEnergy: false
                    warnings: []
                topUpNeeded:
                  summary: Tier-B pick — token holder needs a gas top-up from a sponsor
                  value:
                    amountRaw: "250000000"
                    quotedAmountUsd: null
                    quotedRate: null
                    tiers:
                      tieringSupported: true
                      nativeSymbol: POL
                      low:
                        tier: low
                        nativeAmountRaw: "1560000000000000"
                        usdAmount: "0.00064"
                      medium:
                        tier: medium
                        nativeAmountRaw: "1950000000000000"
                        usdAmount: "0.00080"
                      high:
                        tier: high
                        nativeAmountRaw: "2925000000000000"
                        usdAmount: "0.00120"
                    source:
                      address: "0x11f3B4c5D6e7F8a9B0c1D2e3F4A5b6C7d8E9f0A1"
                      derivationIndex: 43
                      tokenBalance: "612000000"
                      nativeBalance: "0"
                      feeCoveredByDelegatedEnergy: false
                    topUp:
                      required: true
                      sponsor:
                        address: "0x8Ba1f109551bD432803012645Ac136ddd64DBA72"
                        nativeBalance: "84000000000000000"
                      amountRaw: "2340000000000000"
                    alternatives: []
                    warnings: []
        "400":
          description: |
            `BAD_JSON`, `VALIDATION`, `TOKEN_NOT_SUPPORTED`,
            `INVALID_DESTINATION`, `BAD_AMOUNT`,
            `PAYOUT_NOT_SUPPORTED_ON_FAMILY` (Monero), or
            `MAX_AMOUNT_EXCEEDS_NET_SPENDABLE` (with `suggestedAmount*`
            in `details`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/MerchantInactive" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "503":
          description: |
            `ORACLE_FAILED` — `amountUSD` was given but the price oracle
            is unreachable. (Fee-quote failures do NOT 503 here — they
            degrade to `tieringSupported=false` + `fee_quote_unavailable`.)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/payouts/batch:
    post:
      tags: [payouts]
      operationId: createPayoutBatch
      summary: Plan up to 100 payouts in one call
      description: |
        Mass-create endpoint. Each row runs through the same pipeline as
        `POST /api/v1/payouts` (synchronous source reservation per row) —
        **per-row errors do NOT abort the batch**. Every
        successfully-planned row shares the same server-generated
        `batchId` (echoed top-level) so you can track them together via
        `GET /api/v1/payouts?batchId=<id>`. Rows are processed in order:
        earlier rows' reservations reduce the balance available to later
        rows, so a batch can partially fail on its tail with
        `INSUFFICIENT_BALANCE_ANY_SOURCE`.

        **Rate limit:** a batch of N rows consumes N tokens from your
        per-minute quota. If the quota can't cover the batch, the WHOLE
        call returns 429 with `Retry-After` and nothing is planned —
        split into smaller batches or wait out the window.

        **Atomicity:** per-row. HTTP 200 whenever the batch envelope was
        well-formed — even if EVERY row failed; inspect `results[]` and
        `summary`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PayoutBatchInput" }
            examples:
              vendorRun:
                summary: Three rows — the third will fail on a malformed address
                value:
                  payouts:
                    - chainId: 137
                      token: USDC
                      amountRaw: "250000000"
                      destinationAddress: "0xAb5801a7D398351b8bE11C439e05C5b3259aec9B"
                      feeTier: medium
                    - chainId: 137
                      token: USDC
                      amountUSD: "125.00"
                      destinationAddress: "0x11f3B4c5D6e7F8a9B0c1D2e3F4A5b6C7d8E9f0A1"
                    - chainId: 137
                      token: USDC
                      amountRaw: "1000000"
                      destinationAddress: "not-an-address"
      responses:
        "200":
          description: |
            Batch processed — partial or even total per-row failure still
            returns 200; inspect `results[]` + `summary`.
          headers:
            X-Request-Id: { $ref: "#/components/headers/X-Request-Id" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PayoutBatchResponse" }
              examples:
                mixed:
                  summary: 2 planned, 1 failed
                  value:
                    batchId: "b3d4e5f6-a7b8-49c0-91d2-e3f4a5b6c7d8"
                    results:
                      - index: 0
                        status: planned
                        payout:
                          id: "e4f5a6b7-c8d9-0e1f-2a3b-4c5d6e7f8a9b"
                          merchantId: "7d9f6c1a-2b3e-4c5d-8e9f-0a1b2c3d4e5f"
                          kind: standard
                          parentPayoutId: null
                          status: reserved
                          chainId: 137
                          token: USDC
                          amountRaw: "250000000"
                          quotedAmountUsd: null
                          quotedRate: null
                          feeTier: medium
                          feeQuotedNative: "1950000000000000"
                          batchId: "b3d4e5f6-a7b8-49c0-91d2-e3f4a5b6c7d8"
                          destinationAddress: "0xAb5801a7D398351b8bE11C439e05C5b3259aec9B"
                          sourceAddress: "0x8Ba1f109551bD432803012645Ac136ddd64DBA72"
                          txHash: null
                          topUpTxHash: null
                          topUpSponsorAddress: null
                          topUpAmountRaw: null
                          feeEstimateNative: "1950000000000000"
                          lastError: null
                          webhookUrl: null
