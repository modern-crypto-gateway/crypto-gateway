                      - hash: "0x9f2b7c1e83a4d5f60718293a4b5c6d7e8f9012a3b4c5d6e7f8091a2b3c4d5e6f"
                        chainId: 137
                        chainName: polygon
                        token: USDC
                        isNative: false
                        amount: "40"
                        amountRaw: "40000000"
                        amountUsd: "40.00"
                        confirmations: 27
                        status: confirmed
                      - hash: "0x71c4d2e9b8a7f605142e3d4c5b6a798081726354a4b5c6d7e8f90a1b2c3d4e5"
                        chainId: 137
                        chainName: polygon
                        token: USDC
                        isNative: false
                        amount: "60.062"
                        amountRaw: "60062000"
                        amountUsd: "60.05"
                        confirmations: 0
                        status: orphaned
                    triggerTxHash: null
                    previousStatus: completed
                    poolReacquired: true
                    poolCollided: false
      responses:
        "2XX":
          description: Acknowledge within 10 s; body ignored.

  "payout.submitted":
    post:
      tags: [webhooks]
      operationId: onPayoutSubmitted
      summary: The payout transaction was broadcast
      description: |
        Fires when the executor broadcasts the payout — `data.txHash` is
        now set (plus `topUpTxHash` / `topUpSponsorAddress` when a
        just-in-time gas top-up preceded it). `data` is the payout object
        directly (no wrapper). This is the FIRST webhook a payout emits —
        planning (the 201 on POST) does not produce one.
      parameters:
        - $ref: "#/components/parameters/WebhookSignature"
        - $ref: "#/components/parameters/WebhookIdempotencyKey"
        - $ref: "#/components/parameters/WebhookTimestamp"
        - $ref: "#/components/parameters/WebhookAttempt"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WebhookPayoutEvent" }
            examples:
              submitted:
                summary: 250 USDC broadcast on Polygon
                value:
                  event: "payout.submitted"
                  timestamp: "2026-07-04T11:00:09.000Z"
                  data:
                    id: "e4f5a6b7-c8d9-0e1f-2a3b-4c5d6e7f8a9b"
                    kind: standard
                    parentPayoutId: null
                    status: submitted
                    chainId: 137
                    token: USDC
                    amountRaw: "250000000"
                    feeTier: medium
                    feeQuotedNative: "1950000000000000"
                    batchId: null
                    destinationAddress: "0xAb5801a7D398351b8bE11C439e05C5b3259aec9B"
                    sourceAddress: "0x8Ba1f109551bD432803012645Ac136ddd64DBA72"
                    txHash: "0x54ab99c2d1e0f83b7a6c5d4e3f2a1b0c9d8e7f6a5b4c3d2e1f0a9b8c7d6e5f4a"
                    topUpTxHash: null
                    topUpSponsorAddress: null
                    lastError: null
                    submittedAt: "2026-07-04T11:00:09.000Z"
                    confirmedAt: null
              submittedAfterTopUp:
                summary: USDT on Tron broadcast after a sponsor gas top-up
                value:
                  event: "payout.submitted"
                  timestamp: "2026-07-04T11:11:32.000Z"
                  data:
                    id: "a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"
                    kind: standard
                    parentPayoutId: null
                    status: submitted
                    chainId: 728126428
                    token: USDT
                    amountRaw: "500000000"
                    feeTier: null
                    feeQuotedNative: null
                    batchId: "vendor-settlement-2026-07-04"
                    destinationAddress: "TQn9Y2khEsLJW1ChVWFMSMeRDow5KcbLSE"
                    sourceAddress: "TVj7RNVHy6thbM7BWdSe9G6gXwKhjhdNZS"
                    txHash: "d4e5f6a7b8c90112233445566778899aabbccddeeff00112233445566778899a"
                    topUpTxHash: "8f2a1b3c4d5e6f708192a3b4c5d6e7f8091a2b3c4d5e6f708192a3b4c5d6e7f8"
                    topUpSponsorAddress: "TN3W4H6rK2ce4vX9YnFQHwKENnHjoxb3m9"
                    lastError: null
                    submittedAt: "2026-07-04T11:11:32.000Z"
                    confirmedAt: null
      responses:
        "2XX":
          description: Acknowledge within 10 s; body ignored.

  "payout.confirmed":
    post:
      tags: [webhooks]
      operationId: onPayoutConfirmed
      summary: The payout transaction reached its confirmation threshold
      description: |
        Terminal success. `data.confirmedAt` is set; the destination has
        the funds at the recorded `txHash`.
      parameters:
        - $ref: "#/components/parameters/WebhookSignature"
        - $ref: "#/components/parameters/WebhookIdempotencyKey"
        - $ref: "#/components/parameters/WebhookTimestamp"
        - $ref: "#/components/parameters/WebhookAttempt"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WebhookPayoutEvent" }
            examples:
              confirmed:
                value:
                  event: "payout.confirmed"
                  timestamp: "2026-07-04T11:01:02.000Z"
                  data:
                    id: "e4f5a6b7-c8d9-0e1f-2a3b-4c5d6e7f8a9b"
                    kind: standard
                    parentPayoutId: null
                    status: confirmed
                    chainId: 137
                    token: USDC
                    amountRaw: "250000000"
                    feeTier: medium
                    feeQuotedNative: "1950000000000000"
                    batchId: null
                    destinationAddress: "0xAb5801a7D398351b8bE11C439e05C5b3259aec9B"
                    sourceAddress: "0x8Ba1f109551bD432803012645Ac136ddd64DBA72"
                    txHash: "0x54ab99c2d1e0f83b7a6c5d4e3f2a1b0c9d8e7f6a5b4c3d2e1f0a9b8c7d6e5f4a"
                    topUpTxHash: null
                    topUpSponsorAddress: null
                    lastError: null
                    submittedAt: "2026-07-04T11:00:09.000Z"
                    confirmedAt: "2026-07-04T11:01:02.000Z"
      responses:
        "2XX":
          description: Acknowledge within 10 s; body ignored.

  "payout.failed":
    post:
      tags: [webhooks]
      operationId: onPayoutFailed
      summary: The payout permanently failed
      description: |
        Terminal failure — the executor exhausted its options.
        `data.lastError` carries a merchant-safe reason (RPC diagnostics
        with URLs and foreign addresses redacted, or a stable canned
        message). Reservations are released.

        Note: `txHash` may be non-null on a failure that happened AFTER
        broadcast (e.g. the chain reverted the tx). Treat `status`
        as authoritative, not the presence of a hash. Plan a new payout
        to retry — failed rows are never re-executed.
      parameters:
        - $ref: "#/components/parameters/WebhookSignature"
        - $ref: "#/components/parameters/WebhookIdempotencyKey"
        - $ref: "#/components/parameters/WebhookTimestamp"
        - $ref: "#/components/parameters/WebhookAttempt"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WebhookPayoutEvent" }
            examples:
              failed:
                value:
                  event: "payout.failed"
                  timestamp: "2026-07-04T11:20:44.000Z"
                  data:
                    id: "c9d0e1f2-a3b4-4c5d-8e7f-6a5b4c3d2e1f"
                    kind: standard
                    parentPayoutId: null
                    status: failed
                    chainId: 1
                    token: ETH
                    amountRaw: "120000000000000000"
                    feeTier: high
                    feeQuotedNative: "630000000000000"
                    batchId: null
                    destinationAddress: "0xAb5801a7D398351b8bE11C439e05C5b3259aec9B"
                    sourceAddress: "0x4Bb2f019661cE532803012645Ac136ddd64DBA71"
                    txHash: null
                    topUpTxHash: null
                    topUpSponsorAddress: null
                    lastError: "broadcast rejected by chain: replacement transaction underpriced (after 3 attempts)"
                    submittedAt: null
                    confirmedAt: null
      responses:
        "2XX":
          description: Acknowledge within 10 s; body ignored.

components:
  securitySchemes:
    MerchantApiKey:
      type: http
      scheme: bearer
      description: |
        Merchant API key issued by the gateway operator (shown once at
        creation; rotation invalidates the old key immediately). Also
        accepted as `X-API-Key: <key>`.

  parameters:
    WebhookSignature:
      name: X-Webhook-Signature
      in: header
      required: true
      description: |
        Lowercase-hex HMAC-SHA256 of the raw request body, keyed with the
        webhook secret in effect for this delivery (per-resource override
        if one was set on the invoice/payout, otherwise your merchant
        secret). Verify with a constant-time comparison BEFORE parsing
        the JSON.
      schema: { type: string, pattern: "^[0-9a-f]{64}$" }
    WebhookIdempotencyKey:
      name: X-Webhook-Idempotency-Key
      in: header
      required: true
      description: |
        Stable key for the logical event — identical across every retry.
        Dedupe on it. Formats (informative, subject to extension):
        `invoice:completed:<invoiceId>:<status>`,
        `invoice:processing:<invoiceId>:processing:<extraStatus|none>`,
        `invoice:payment_detected:<invoiceId>:<txHash>`,
        `invoice:demoted:<invoiceId>:<prevStatus>:<newStatus>`,
        `payout.submitted:<payoutId>:<status>`, …
      schema: { type: string }
    WebhookTimestamp:
      name: X-Webhook-Timestamp
      in: header
      required: true
      description: |
        Unix-milliseconds of the first HTTP attempt of the current
        delivery cycle (stable across the up-to-4 in-cycle retries; a
        later outbox re-drive gets a fresh value). Use it for staleness
        checks, not for dedupe.
      schema: { type: string, pattern: "^\\d+$" }
    WebhookAttempt:
      name: X-Webhook-Attempt
      in: header
      required: true
      description: 1-based attempt counter WITHIN the current delivery cycle (1..4).
      schema: { type: string, pattern: "^[1-4]$" }

  headers:
    X-Request-Id:
      description: |
        UUID correlation id. Accepts a caller-supplied value if it's a
        valid UUID; otherwise minted. Quote it in support requests.
      schema: { type: string, format: uuid }
    X-RateLimit-Limit:
      description: Window cap for this route's rate-limit scope.
      schema: { type: integer }
    X-RateLimit-Remaining:
      description: Requests left in the current window after this one.
      schema: { type: integer }
    X-RateLimit-Reset:
      description: Unix seconds when the window rolls.
      schema: { type: integer }

  responses:
    Unauthorized:
      description: |
        Missing or invalid API key — also returned when the key is valid
        but the merchant account has been deactivated.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          examples:
            unauthorized:
              value:
                error: { code: UNAUTHORIZED, message: "Missing or invalid API key" }
    MerchantInactive:
      description: Merchant account is deactivated — contact the gateway operator.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: |
        Entity not found. Deliberately covers three indistinguishable
        cases: nonexistent id, malformed (non-UUID) id, and an id owned
        by another merchant.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          examples:
            notFound:
              value:
                error: { code: NOT_FOUND, message: "Not found" }
    RateLimited:
      description: Too many requests in the current window.
      headers:
        Retry-After:
          description: Seconds until the window rolls.
          schema: { type: integer }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          examples:
            limited:
              value:
                error: { code: RATE_LIMITED, message: "Rate limit exceeded — retry after 12s" }

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code]
          properties:
            code:
              type: string
              description: Stable machine-readable code — switch on this, never on `message`.
            message: { type: string }
            details:
              type: [object, array]
              additionalProperties: true
              description: |
                Optional per-code payload. `VALIDATION` errors carry the
                Zod issues ARRAY; other codes attach an object (e.g.
                `MAX_AMOUNT_EXCEEDS_NET_SPENDABLE`'s `suggestedAmount*`
                trio, `POOL_EXHAUSTED`'s `{ family, hint }`).

    CreateInvoiceInput:
      type: object
      description: |
        Provide EXACTLY ONE pricing mode:
          - `amountUsd` — USD-pegged (recommended). Pair with
            `acceptedFamilies` to make the invoice payable from any
            family/token the gateway supports. Rates are pinned for 10
            minutes at creation (refreshed per detection window after).
          - `amountRaw` — legacy single-token exact amount.
          - `fiatAmount` + `fiatCurrency` — legacy fiat-quoted; the
            applied rate is echoed on the invoice as `quotedRate`.

        Zero or multiple pricing modes → 400 `VALIDATION`. A `merchantId`
        key in the body is ignored — identity comes from the API key.
      required: [chainId, token]
      properties:
        chainId:
          type: integer
          description: |
            Primary chain. Must be wired in the deployment. Determines
            the primary family and the legacy `chainId` +
            `receiveAddress` denormalization on the response. Common ids:
            1 Ethereum, 137 Polygon, 56 BNB, 728126428 Tron, 900 Solana,
            800 Bitcoin, 801 Litecoin, 1000 Monero — ask your gateway
            operator for the wired set.
        token:
          type: string
          pattern: "^[A-Z0-9]+$"
          maxLength: 16
          description: |
            Any symbol registered on this `chainId`, including native gas
            tokens (ETH/POL/BNB/TRX/SOL/BTC/LTC/XMR) — natives are
            first-class alongside USDC/USDT. Your gateway operator can
            list the registered symbols per chain.
        amountUsd:
          type: string
          pattern: "^\\d+(\\.\\d{1,8})?$"
          description: |
            USD-pegged target — settleable in ANY combination of
            registered tokens at the receive addresses; each transfer
            converts to USD at its detection-time rate snapshot and sums.
            e.g. $50 USDC + $50 ETH satisfies a $100 invoice.
          examples: ["100.00"]
        acceptedFamilies:
          type: array
          items: { type: string, enum: [evm, tron, solana, utxo, monero] }
          minItems: 1
          description: |
            Families the invoice will accept payment from — each gets its
            own receive address (UTXO as non-primary yields one address
            per wired UTXO chain; BTC and LTC formats differ). Omit for
            single-family (derived from `chainId`). Every listed family
            must be wired in the deployment or the request fails 400
            `TOKEN_NOT_SUPPORTED`.

            Token-availability rule: with `amountRaw` / `fiatAmount`
            (legacy), `token` must be registered on EVERY accepted
            family; with `amountUsd`, only on the primary chain's family.
        amountRaw:
          type: string
          pattern: "^\\d+$"
          description: |
            Raw token amount in smallest units (wei, sun, lamports,
            micro-units for 6-dec USDC/USDT). Single-token invoices: only
            the quoted `token` credits toward this target — wrong-token
            transfers are logged for audit but ignored.
          examples: ["25000000"]
        fiatAmount:
          type: string
          pattern: "^\\d+(\\.\\d+)?$"
          description: Fiat amount as a decimal string (e.g. "49.99"). Requires `fiatCurrency`.
        fiatCurrency:
          type: string
          pattern: "^[A-Z]{3}$"
          description: ISO-4217 currency code, uppercase (e.g. "USD", "EUR").
        externalId:
          type: string
          maxLength: 256
          description: |
            Your opaque reference (cart/order id). Doubles as a
            Stripe-style idempotency key: a second POST from the same
            merchant with the same `externalId` returns the original
            invoice (HTTP 201 again) instead of creating a duplicate.
            Omit it and every POST creates a new invoice.
        metadata:
          type: object
          additionalProperties: true
          description: |
            Opaque JSON echoed on merchant reads and webhook payloads.
            Never exposed on the public checkout view.
        expiresInMinutes:
          type: integer
          minimum: 1
          maximum: 1440
          default: 30
          description: Hard ceiling 24 h — the scheduler sweeps long-expired invoices.
        webhookUrl:
          type: string
          format: uri
          description: |
            Per-invoice webhook destination override. When set, this
            invoice's events go here instead of the merchant-account
            webhook. Must be supplied together with `webhookSecret`
            (passing one without the other is a 400). Public HTTPS only —
            loopback / link-local / metadata targets are rejected.
        webhookSecret:
          type: string
          minLength: 16
          maxLength: 512
          writeOnly: true
          description: |
            HMAC secret paired with `webhookUrl`. Encrypted at rest,
            never echoed back.
        paymentToleranceUnderBps:
          type: integer
          minimum: 0
          maximum: 2000
          description: |
            Under-payment tolerance override in basis points — the
            invoice completes when confirmed value ≥ target × (1 −
            under/10000). Omit to inherit your merchant default
            (snapshotted at create time).
        paymentToleranceOverBps:
          type: integer
          minimum: 0
          maximum: 2000
          description: |
            Over-payment tolerance override in basis points — confirmed
            value > target × (1 + over/10000) marks the completed invoice
            `extraStatus: "overpaid"`. Omit to inherit the merchant
            default.

    Invoice:
      type: object
      description: |
        Merchant view of an invoice, as serialized by every
        `/api/v1/invoices*` response. All monetary fields are decimal
        strings (never floats); timestamps are ISO-8601. Every field is
        always present (null-capable ones carry `null`).
      required:
        [id, merchantId, status, extraStatus, chainId, token, receiveAddress,
         addressIndex, acceptedFamilies, receiveAddresses, requiredAmountRaw,
         receivedAmountRaw, fiatAmount, fiatCurrency, quotedRate, amountUsd,
         paidUsd, overpaidUsd, rateWindowExpiresAt, rates, externalId,
         metadata, webhookUrl, paymentToleranceUnderBps,
         paymentToleranceOverBps, confirmationThreshold, confirmationTiers,
         createdAt, expiresAt, confirmedAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        merchantId: { type: string, format: uuid }
        status:
          type: string
          enum: [pending, processing, completed, expired, canceled]
          description: |
            Lifecycle stage:
              - `pending`    — no on-chain activity yet
              - `processing` — at least one tx seen; threshold not met OR
                               met but unconfirmed
              - `completed`  — confirmed payment ≥ threshold (within
                               tolerance); overpaid completions carry
                               `extraStatus='overpaid'`
              - `expired`    — past `expiresAt` with no completion
              - `canceled`   — canceled by the gateway operator
        extraStatus:
          type: [string, "null"]
          enum: [partial, overpaid, null]
          description: |
            Payment-fidelity signal, orthogonal to `status`:
            `"partial"` = 0 < paid < threshold (with status=processing);
            `"overpaid"` = paid > threshold × (1 + over_bps/10000)
            (with status=completed).
        chainId:
          type: integer
          description: Primary chain (named at create time). Multi-family invoices carry the full set in `receiveAddresses`.
        token: { type: string }
        receiveAddress:
          type: string
          description: Primary family's receive address (denormalized for single-chain clients). Authoritative set = `receiveAddresses`.
        addressIndex:
          type: integer
          description: HD derivation index of the primary receive address.
        acceptedFamilies:
          type: array
          items: { type: string, enum: [evm, tron, solana, utxo, monero] }
        receiveAddresses:
          type: array
          description: |
            One entry per accepted family — except UTXO, which yields one
            entry per wired UTXO chain (BTC and LTC addresses differ).
            Sorted by family, then chainId.
          items:
            type: object
            required: [family, chainId, address, poolAddressId]
            properties:
              family: { type: string, enum: [evm, tron, solana, utxo, monero] }
              chainId:
                type: integer
                description: |
                  Informational on EVM/Tron/Solana rows (the address is
                  valid family-wide); authoritative on UTXO rows.
              address: { type: string }
              poolAddressId:
                type: [string, "null"]
                format: uuid
                description: Backing pool row. Null on UTXO (fresh-per-invoice) and Monero rows.
              addressIndex:
                type: integer
                description: |
                  HD derivation index backing this entry. Present ONLY on
                  the fresh-create `POST /api/v1/invoices` 201 response;
                  GET / list / expire / idempotent-replay responses omit it.
        requiredAmountRaw:
          type: string
          description: Legacy single-token target in smallest units. `"0"` on USD-path invoices.
        receivedAmountRaw:
          type: string
          description: Sum of confirmed inbound raw-unit transfers (legacy single-token axis).
        fiatAmount: { type: [string, "null"] }
        fiatCurrency: { type: [string, "null"] }
        quotedRate:
          type: [string, "null"]
          description: Token/fiat rate pinned at creation. Non-null only on fiat-quoted invoices.
        amountUsd:
          type: [string, "null"]
          description: USD target. Non-null only on USD-path invoices.
        paidUsd:
          type: string
          description: Sum of confirmed transactions' USD value. `"0"` on fresh and legacy invoices.
        overpaidUsd:
          type: string
          description: max(paidUsd − amountUsd, 0). `"0"` unless overpaid.
        rateWindowExpiresAt:
          type: [string, "null"]
          format: date-time
          description: When the current 10-minute pinned-rate window closes. Null on legacy invoices.
        rates:
          type: [object, "null"]
          additionalProperties: { type: string }
          description: Pinned USD-per-token rates for this window (USD-path only), keyed by symbol.
        externalId: { type: [string, "null"] }
        metadata: { type: [object, "null"] }
        webhookUrl:
          type: [string, "null"]
          format: uri
          description: Per-invoice webhook override (echo-only; the secret is never returned).
        paymentToleranceUnderBps: { type: integer, minimum: 0, maximum: 2000 }
        paymentToleranceOverBps: { type: integer, minimum: 0, maximum: 2000 }
        confirmationThreshold:
          type: [integer, "null"]
          minimum: 1
          description: |
            Confirmations required to flip a transfer `detected` →
            `confirmed`. Snapshotted at create time and frozen; applies
            to every accepted family. Null only on pre-migration rows.
        confirmationTiers:
          type: [object, "null"]
          description: |
            Snapshot of amount-tiered confirmation rules, keyed
            `"{chainId}:{TOKEN}"`; first matching rule wins, else
            `confirmationThreshold`. Null = no tiers.
          additionalProperties:
            type: array
            items:
              type: object
              required: [confirmations]
              properties:
                amount: { type: string }
                op: { type: string, enum: ["<", "<=", ">", ">=", "=", "<>"] }
                confirmations: { type: integer, minimum: 1 }
        createdAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        confirmedAt: { type: [string, "null"], format: date-time }
        updatedAt: { type: string, format: date-time }

    InvoiceAmountsBreakdown:
      type: object
      description: |
        USD-axis breakdown of an invoice's progress. All fields null on
        legacy single-token invoices (use `requiredAmountRaw` /
        `receivedAmountRaw` there).
      properties:
        requiredUsd: { type: [string, "null"] }
        confirmedUsd:
          type: [string, "null"]
          description: Sum of CONFIRMED contributing transactions' USD values.
        confirmingUsd:
          type: [string, "null"]
          description: Sum of DETECTED-but-not-yet-confirmed transactions' USD values.
        remainingUsd:
          type: [string, "null"]
          description: max(requiredUsd − confirmedUsd, 0).
        overpaidUsd:
          type: [string, "null"]
          description: max(confirmedUsd − requiredUsd, 0).

    InvoiceTransaction:
      type: object
      description: |
        One on-chain payment tied to the invoice (REST shape — the
        webhook payload uses the slimmer `WebhookTransaction`). All
        statuses are returned, including `reverted` / `orphaned` rows
        that no longer count toward the total.
      properties:
        id: { type: string, format: uuid }
        txHash: { type: string }
        logIndex: { type: [integer, "null"] }
        chainId: { type: integer }
        chain:
          type: [string, "null"]
          description: Short slug like `ethereum`, `polygon`, `tron`, `solana`. Null if unknown.
        token: { type: string }
        fromAddress: { type: string }
        toAddress: { type: string }
        amountRaw: { type: string, description: Integer string in the token's smallest units. }
        amount: { type: string, description: Human-readable decimal (UI convenience). }
        amountUsd:
          type: [string, "null"]
          description: USD valuation pinned at detection time.
        usdRate: { type: [string, "null"] }
        status: { type: string, enum: [detected, confirmed, reverted, orphaned] }
        confirmations: { type: integer }
        blockNumber: { type: [integer, "null"] }
        detectedAt: { type: string, format: date-time }
        confirmedAt: { type: [string, "null"], format: date-time }

    InvoiceDetails:
      type: object
      description: Hydrated GET response — invoice + USD breakdown + per-tx detail.
      required: [invoice, amounts, transactions]
      properties:
        invoice: { $ref: "#/components/schemas/Invoice" }
        amounts: { $ref: "#/components/schemas/InvoiceAmountsBreakdown" }
        transactions:
          type: array
          items: { $ref: "#/components/schemas/InvoiceTransaction" }

    PublicInvoice:
      type: object
      description: |
        Public checkout projection — everything a hosted checkout page
        needs and nothing merchant-private. Compared to `Invoice` this
        EXCLUDES `merchantId`, `externalId`, `metadata`, `webhookUrl`,
        tolerance/confirmation fields, `addressIndex`, `quotedRate` and
        `updatedAt`; `receiveAddresses` entries carry only
        `family` + `address`.
      required:
        [id, status, extraStatus, chainId, token, receiveAddress,
         acceptedFamilies, receiveAddresses, requiredAmountRaw,
         receivedAmountRaw, fiatAmount, fiatCurrency, amountUsd, paidUsd,
         overpaidUsd, rates, rateWindowExpiresAt, payableTokens, createdAt,
         expiresAt, confirmedAt]
      properties:
        id: { type: string, format: uuid }
        status: { type: string, enum: [pending, processing, completed, expired, canceled] }
        extraStatus:
          type: [string, "null"]
          enum: [partial, overpaid, null]
        chainId: { type: integer, description: Primary chain id — a label for simple single-chain UIs. }
        token: { type: string }
        receiveAddress:
          type: string
          description: Primary family's address. Multi-family UIs should render `receiveAddresses`.
        acceptedFamilies:
          type: array
          items: { type: string, enum: [evm, tron, solana, utxo, monero] }
        receiveAddresses:
          type: array
          description: "One gateway-owned address per accepted family (UTXO: per chain). Render all."
          items:
            type: object
            required: [family, address]
            properties:
              family: { type: string, enum: [evm, tron, solana, utxo, monero] }
              address: { type: string }
        requiredAmountRaw: { type: string, description: "Legacy single-token target. `\"0\"` on USD-path invoices." }
        receivedAmountRaw: { type: string }
        fiatAmount: { type: [string, "null"] }
        fiatCurrency: { type: [string, "null"] }
        amountUsd: { type: [string, "null"] }
        paidUsd: { type: string }
        overpaidUsd: { type: string }
        rates:
          type: [object, "null"]
          additionalProperties: { type: string }
        rateWindowExpiresAt:
          type: [string, "null"]
          format: date-time
          description: When the pinned rates (and `payableTokens` amounts) expire.
        payableTokens:
          type: [array, "null"]
          items: { $ref: "#/components/schemas/PayableToken" }
          description: |
            USD-path only (null otherwise): every "pay with TOKEN on
            CHAIN" option the deployment can settle for this invoice,
            priced at the pinned rates. Sorted family → chainId → token.
        createdAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        confirmedAt: { type: [string, "null"], format: date-time }

    PayableToken:
      type: object
      description: |
        One payment option for a USD-path invoice on the public checkout
        view — a (family, chainId, token) combination the gateway can
        accept, priced at the invoice's pinned rate window.
      required: [family, chainId, token, decimals, amountRawMinimum, amountDisplay, rate, address]
      properties:
        family: { type: string, enum: [evm, tron, solana, utxo, monero] }
        chainId: { type: integer }
        token: { type: string }
        decimals: { type: integer }
        amountRawMinimum:
          type: string
          description: |
            Minimum raw-units amount that satisfies the full invoice at
            the pinned rate. Ceiling-rounded (over-send ≤ 1 raw unit).
        amountDisplay:
          type: string
          description: Human-readable token amount — render directly, no math needed.
        rate: { type: string, description: "USD per whole token, as pinned." }
        address:
          type: string
          description: Gateway-owned receive address on this family (identical across same-family rows).

    PlanPayoutInput:
      type: object
      required: [chainId, token, destinationAddress]
      description: |
        Shared request body for `POST /api/v1/payouts` and
        `POST /api/v1/payouts/estimate`. The server rejects unknown keys
        with 400 `VALIDATION`. (Two additional reserved keys —
        `forceSourceAddress`, `internalKind` — are tolerated for the
        gateway's internal machinery; merchants MUST NOT set them.)

        Provide **exactly one** of `amountRaw`, `amount`, `amountUSD`.
      properties:
        chainId:
          type: integer
          minimum: 1
        token:
          type: string
          minLength: 1
          maxLength: 16
          pattern: "^[A-Z0-9]+$"
          description: |
            Any symbol registered on this `chainId`, including natives
            (ETH/POL/BNB/TRX/SOL/BTC/LTC). Malformed symbols fail 400
            `VALIDATION`; well-formed unknown symbols fail 400
            `TOKEN_NOT_SUPPORTED`.
        amountRaw:
          type: string
          pattern: "^\\d+$"
          description: Smallest-unit integer string (e.g. `"1000000"` = 1 USDC).
        amount:
          type: string
          pattern: "^(0|[1-9]\\d*)(\\.\\d+)?$"
          description: |
            Human decimal (e.g. `"1.5"`). Must not exceed the token's
            decimal places — else 400 `BAD_AMOUNT`.
        amountUSD:
          type: string
          pattern: "^(0|[1-9]\\d*)(\\.\\d+)?$"
          description: |
            USD-pegged decimal (e.g. `"10.00"`), converted via the price
            oracle at plan time; rate snapshotted to `quotedRate` /
            `quotedAmountUsd`. Oracle down → 503 `ORACLE_FAILED` (a stale
            rate is never substituted).
        destinationAddress:
          type: string
          minLength: 1
          maxLength: 128
          description: |
            Canonicalized and validated per chain family before the plan
            is accepted (400 `INVALID_DESTINATION` on failure). EVM
            0x-hex; Tron base58; Solana base58; UTXO native-segwit bech32
            only (`bc1q…` / `ltc1q…`). Monero rejects with 400
            `PAYOUT_NOT_SUPPORTED_ON_FAMILY` (inbound-only in v1).
        feeTier:
          type: string
          enum: [low, medium, high]
          description: |
            Optional fee tier for the broadcast tx. Meaningful where
            `tieringSupported=true` (see estimate): EVM binds
            maxFee/maxPriorityFee multipliers (0.8×/1.0×/1.5×); Solana
            binds a compute-unit price percentile; UTXO picks the tier's
            sat/vB. Tron accepts but ignores it. Omitted → the planner
            budgets at `medium` and the broadcast uses chain defaults.
        batchId:
          type: string
          minLength: 1
          maxLength: 64
          description: |
            Optional grouping id, persisted verbatim and filterable via
            `GET /api/v1/payouts?batchId=<id>`. Set automatically by
            `POST /api/v1/payouts/batch`. Also your best retry-safety
            lever on single-create: tag each logical payment attempt
            uniquely and reconcile before retrying.
        webhookUrl:
          type: string
          format: uri
          description: |
            Per-payout webhook destination override. Pair with
            `webhookSecret`. Public HTTPS only (SSRF-guarded; loopback /
            link-local / metadata targets → 400 `INVALID_DESTINATION`).
        webhookSecret:
          type: string
          minLength: 16
          maxLength: 512
          writeOnly: true
          description: HMAC secret paired with `webhookUrl`. Encrypted at rest, never echoed.

    Payout:
      type: object
      description: |
        Merchant view of a payout as serialized by every `/api/v1/payouts*`
        response. Monetary fields are decimal/integer strings; timestamps
        ISO-8601. (The webhook payload uses the slimmer
        `WebhookPayoutObject`.)
      required:
        [id, merchantId, kind, parentPayoutId, status, chainId, token,
         amountRaw, quotedAmountUsd, quotedRate, feeTier, feeQuotedNative,
         batchId, destinationAddress, sourceAddress, txHash, topUpTxHash,
         topUpSponsorAddress, topUpAmountRaw, feeEstimateNative, lastError,
         webhookUrl, confirmationThreshold, confirmationTiers, createdAt,
         submittedAt, confirmedAt, broadcastAttemptedAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        merchantId: { type: string, format: uuid }
        kind:
          type: string
          enum: [standard]
          description: |
            Always `standard` on merchant-facing responses — the
            gateway's internal kinds (gas top-ups, consolidation sweeps,
            gas-burn tombstones) are filtered out of this API.
        parentPayoutId:
          type: [string, "null"]
          format: uuid
          description: Always null on standard rows (used by internal kinds).
        status:
          type: string
          enum: [planned, reserved, topping-up, submitted, confirmed, failed, canceled]
          description: |
            New rows are inserted directly at `reserved` (the funding
            source is picked synchronously on POST; `planned` matches
            only legacy rows). `topping-up` = waiting for a sponsor →
            source gas top-up tx to confirm before the main broadcast.
            Only `reserved` rows can be canceled.
        chainId: { type: integer }
        token: { type: string }
        amountRaw: { type: string, description: Integer string in the token's smallest unit. }
        quotedAmountUsd:
          type: [string, "null"]
          description: Original USD input when the create used `amountUSD`; null otherwise.
        quotedRate:
          type: [string, "null"]
          description: |
            Oracle rate (USD per whole token) snapshotted at create time
            (`amountUSD` path only). Create-time rate, not executed-time.
        feeTier:
          type: [string, "null"]
          enum: [low, medium, high, null]
          description: |
            Fee tier bound at create time. Null when unspecified — EXCEPT
            UTXO-family payouts, which record `medium` (the planner's
            budgeting default).
        feeQuotedNative:
          type: [string, "null"]
          description: |
            Native-unit fee quoted at plan time for the chosen tier (for
            quoted-vs-actual drift analysis). Null when no tier was
            requested — except UTXO, where it always carries coinselect's
            plan-time fee.
        batchId: { type: [string, "null"] }
        destinationAddress: { type: string }
        sourceAddress:
          type: [string, "null"]
          description: |
            Gateway address funding the payout, picked at plan time on
            account-model chains. ALWAYS null on UTXO-family payouts
            (coin selection spans every owned UTXO at broadcast).
        txHash: { type: [string, "null"] }
        topUpTxHash:
          type: [string, "null"]
          description: |
            Hash of the sponsor → source gas top-up tx when one was
            needed; stays set after the main tx confirms (audit trail).
        topUpSponsorAddress: { type: [string, "null"] }
        topUpAmountRaw:
          type: [string, "null"]
          description: Native amount the sponsor sends (gas gap + cushion), fixed at plan time.
        feeEstimateNative: { type: [string, "null"] }
        lastError:
          type: [string, "null"]
          description: |
            Merchant-safe failure reason after a `failed` transition
            (RPC diagnostics redacted of URLs / foreign addresses).
        webhookUrl:
          type: [string, "null"]
          format: uri
          description: Per-payout webhook override (echo-only; secret never returned).
        confirmationThreshold:
          type: [integer, "null"]
          description: |
            Confirmations required to flip `submitted` → `confirmed`.
            Snapshotted at plan time and frozen — later policy edits
            don't reshape in-flight payouts.
        confirmationTiers:
          type: [object, "null"]
          description: |
            Snapshot of amount-tiered confirmation rules keyed
            `"{chainId}:{token}"`; no match falls back to
            `confirmationThreshold`. Null when none.
          additionalProperties:
            type: array
            items:
              type: object
              required: [confirmations]
              properties:
                amount: { type: string }
                op: { type: string, enum: ["<", "<=", ">", ">=", "=", "<>"] }
                confirmations: { type: integer, minimum: 1 }
        createdAt: { type: string, format: date-time }
        submittedAt: { type: [string, "null"], format: date-time }
        confirmedAt: { type: [string, "null"], format: date-time }
        broadcastAttemptedAt:
          type: [string, "null"]
          format: date-time
          description: |
            First time the executor tried to broadcast — distinguishes
            "never attempted" from "attempted at least once".
        updatedAt: { type: string, format: date-time }

    PayoutFeeEstimate:
      type: object
      description: |
        Fee-tier quote + source preview for a hypothetical payout
        (`POST /api/v1/payouts/estimate`). The planner's source selection
        runs in dry-run mode — the response shows exactly what a real
        plan would do. Nothing is reserved.
      required: [amountRaw, quotedAmountUsd, quotedRate, tiers, source, alternatives, warnings]
      properties:
        amountRaw:
          type: string
          description: Resolved raw amount, token's smallest unit.
        quotedAmountUsd: { type: [string, "null"] }
        quotedRate: { type: [string, "null"] }
        tiers:
          type: object
          required: [tieringSupported, nativeSymbol, low, medium, high]
          properties:
            tieringSupported:
              type: boolean
              description: |
                False on chains without a fee-priority concept (Tron), on
                Solana with no recent samples, and whenever the fee quote
                failed (then all tiers are `"0"` and `warnings` carries
                `fee_quote_unavailable`).
            nativeSymbol: { type: string }
            low: { $ref: "#/components/schemas/PayoutFeeQuoteTier" }
            medium: { $ref: "#/components/schemas/PayoutFeeQuoteTier" }
            high: { $ref: "#/components/schemas/PayoutFeeQuoteTier" }
        source:
          type: [object, "null"]
          description: |
            Gateway address the planner would pick. Null when no
            candidate has enough token balance (see `warnings`). On UTXO
            chains: a synthetic aggregate with
            `address: "<utxo-aggregate>"` and `derivationIndex: -1`.
          required: [address, derivationIndex, tokenBalance, nativeBalance, feeCoveredByDelegatedEnergy]
          properties:
            address: { type: string }
            derivationIndex: { type: integer, description: "-1 on the synthetic UTXO aggregate." }
            tokenBalance: { type: string, description: Spendable token balance (smallest units). }
            nativeBalance: { type: string }
            feeCoveredByDelegatedEnergy:
              type: boolean
              description: |
                True when this source can broadcast WITHOUT burning
                native gas (Tron delegated-energy model) — the `tiers`
                quote then does not apply to this source (~$0 real cost).
                Always false on non-Tron chains and native payouts.
        topUp:
          type: object
          description: |
            Present ONLY when the chosen source lacks native gas and a
            sponsor must top it up first. `sponsor: null` = a token
            holder exists but no funded sponsor (a real plan would 503
            `NO_GAS_SPONSOR_AVAILABLE`).
          required: [required, sponsor, amountRaw]
          properties:
            required: { type: boolean, enum: [true] }
            sponsor:
              type: [object, "null"]
              required: [address, nativeBalance]
              properties:
                address: { type: string }
                nativeBalance: { type: string }
            amountRaw:
              type: string
              description: Native amount the sponsor would send (gas gap + 20% cushion when a sponsor exists).
        alternatives:
          type: array
          maxItems: 4
          description: Next-best source candidates by token balance descending. Always empty on UTXO.
          items:
            type: object
            required: [address, derivationIndex, tokenBalance, nativeBalance, feeCoveredByDelegatedEnergy]
            properties:
              address: { type: string }
              derivationIndex: { type: integer }
              tokenBalance: { type: string }
              nativeBalance: { type: string }
              feeCoveredByDelegatedEnergy: { type: boolean }
        warnings:
          type: array
          items: { type: string }
          description: |
            Non-fatal notices. Known codes:
              - `no_source_address_has_sufficient_token_balance` — `source: null`
              - `single_source_insufficient_consolidate_required` — the
                AGGREGATE balance is sufficient but fragmented across
                addresses; the gateway operator should consolidate
              - `no_gas_sponsor_available` — `topUp.sponsor: null`
              - `fee_quote_unavailable` — RPC failed during tier quoting;
                `tieringSupported=false`, zeroed tiers (a real plan would
                503 `FEE_ESTIMATE_FAILED`)
              - `fee_quote_degraded` — conservative hardcoded rates were
                served; broadcast works but tiers aren't market-fresh
              - `fee_market_uniform` — low == medium == high right now
              - `insufficient_utxo_balance` — UTXO only; confirmed
                spendable can't cover amount + fee; `source: null`
              - `max_amount_exceeds_net_spendable` — companion to the 400

    PayoutFeeQuoteTier:
      type: object
      required: [tier, nativeAmountRaw, usdAmount]
      properties:
        tier: { type: string, enum: [low, medium, high] }
        nativeAmountRaw:
          type: string
          description: Total fee in native smallest units (wei / sun / lamports / sats).
        usdAmount:
          type: [string, "null"]
          description: USD value via the price oracle; null when the oracle is unavailable.

    PayoutBatchInput:
      type: object
      required: [payouts]
      description: |
        Up to 100 `PlanPayoutInput` rows, validated and planned
        independently in order. An empty array is accepted (200 with
        `batchId: ""`). More than 100 rows → 400 `BATCH_TOO_LARGE`. The
        request consumes N rate-limit tokens.
      properties:
        payouts:
          type: array
          minItems: 0
          maxItems: 100
          items: { $ref: "#/components/schemas/PlanPayoutInput" }

    PayoutBatchResponse:
      type: object
      description: |
        HTTP 200 whenever the batch envelope was well-formed — even when
        every row failed. Inspect `results[]` per row and `summary`.
      required: [batchId, results, summary]
      properties:
        batchId:
          type: string
          description: |
            UUID shared across every successfully-planned row. Filter
            with `GET /api/v1/payouts?batchId=<id>`. Empty string for the
            degenerate empty batch.
        results:
          type: array
          description: One entry per input row, in request order; `index` echoes the input position.
          items:
            oneOf:
              - type: object
                required: [index, status, payout]
                properties:
                  index: { type: integer }
                  status: { type: string, enum: [planned] }
                  payout: { $ref: "#/components/schemas/Payout" }
              - type: object
                required: [index, status, error]
                properties:
                  index: { type: integer }
                  status: { type: string, enum: [failed] }
                  error:
                    type: object
                    required: [code, message]
                    properties:
                      code:
                        type: string
                        description: |
                          Any single-create error code
                          (`TOKEN_NOT_SUPPORTED`, `INVALID_DESTINATION`,
                          `BAD_AMOUNT`,
                          `MAX_AMOUNT_EXCEEDS_NET_SPENDABLE`,
                          `INSUFFICIENT_BALANCE_ANY_SOURCE`,
                          `NO_GAS_SPONSOR_AVAILABLE`, `ORACLE_FAILED`,
                          `FEE_ESTIMATE_FAILED`,
                          `PAYOUT_NOT_SUPPORTED_ON_FAMILY`, …), plus
                          `VALIDATION_FAILED` (row failed schema
                          validation) and `INTERNAL`.
                      message: { type: string }
        summary:
          type: object
          required: [planned, failed]
          properties:
            planned: { type: integer }
            failed: { type: integer }

    # ------------------------------------------------------------------
    # Webhook payload schemas. The invoice/payout objects inside webhook
    # payloads are SLIMMER than their REST counterparts — do not assume
    # field parity. Always GET the resource when you need the full view.
    # ------------------------------------------------------------------

    WebhookInvoiceObject:
      type: object
      description: |
        Invoice snapshot embedded in invoice webhook payloads. Compared
        to the REST `Invoice`: no `merchantId`, no `webhookUrl`, no
        `confirmationThreshold` / `confirmationTiers`; `receiveAddresses`
        entries carry only `family` + `address`.
      required:
        [id, status, extraStatus, chainId, token, receiveAddress,
         addressIndex, acceptedFamilies, receiveAddresses,
         requiredAmountRaw, receivedAmountRaw, fiatAmount, fiatCurrency,
         quotedRate, amountUsd, paidUsd, overpaidUsd, rateWindowExpiresAt,
         rates, paymentToleranceUnderBps, paymentToleranceOverBps,
         externalId, metadata, createdAt, expiresAt, confirmedAt,
         updatedAt]
      properties:
        id: { type: string, format: uuid }
        status: { type: string, enum: [pending, processing, completed, expired, canceled] }
        extraStatus:
          type: [string, "null"]
          enum: [partial, overpaid, null]
        chainId: { type: integer }
        token: { type: string }
        receiveAddress: { type: string }
        addressIndex: { type: integer }
        acceptedFamilies:
          type: array
          items: { type: string, enum: [evm, tron, solana, utxo, monero] }
        receiveAddresses:
          type: array
          items:
            type: object
            required: [family, address]
            properties:
              family: { type: string, enum: [evm, tron, solana, utxo, monero] }
              address: { type: string }
        requiredAmountRaw: { type: string }
        receivedAmountRaw: { type: string }
        fiatAmount: { type: [string, "null"] }
        fiatCurrency: { type: [string, "null"] }
        quotedRate: { type: [string, "null"] }
        amountUsd: { type: [string, "null"] }
        paidUsd: { type: string }
        overpaidUsd: { type: string }
        rateWindowExpiresAt: { type: [string, "null"], format: date-time }
        rates:
          type: [object, "null"]
          additionalProperties: { type: string }
        paymentToleranceUnderBps: { type: integer }
        paymentToleranceOverBps: { type: integer }
        externalId: { type: [string, "null"] }
        metadata: { type: [object, "null"] }
        createdAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        confirmedAt: { type: [string, "null"], format: date-time }
        updatedAt: { type: string, format: date-time }

    WebhookTransaction:
      type: object
      description: |
        Transaction entry inside invoice webhook payloads (slimmer than
        the REST `InvoiceTransaction` — no addresses / block / ids).
      required: [hash, chainId, chainName, token, isNative, amount, amountRaw, amountUsd, confirmations, status]
      properties:
        hash: { type: string }
        chainId: { type: integer }
        chainName:
          type: [string, "null"]
          description: Short slug (`polygon`, `tron`, …). Null if the chain is unknown to the registry.
        token: { type: string }
        isNative: { type: boolean }
        amount:
          type: [string, "null"]
          description: |
            Human-decimal form (`amountRaw / 10^decimals`) as a string.
            Null when the token's decimals can't be resolved (e.g. token
            later removed from the registry).
        amountRaw: { type: string }
        amountUsd: { type: [string, "null"] }
        confirmations: { type: integer }
        status: { type: string, enum: [detected, confirmed, reverted, orphaned] }

    WebhookInvoiceEvent:
      type: object
      description: |
        Envelope for all invoice webhook events except `invoice:demoted`
        (which extends `data` — see `WebhookInvoiceDemotedEvent`).
      required: [event, timestamp, data]
      properties:
        event:
          type: string
          enum:
            - "invoice:payment_detected"
            - "invoice:payment_confirmed"
            - "invoice:completed"
            - "invoice:expired"
            - "invoice:canceled"
            - "invoice:processing"
          description: |
            Colon-separated wire name. All six values are live events —
            see the `webhooks` section for when each fires.
        timestamp:
          type: string
          format: date-time
          description: When the state transition happened (event time, not delivery time).
        data:
          type: object
          required: [invoice, transactions, triggerTxHash]
          properties:
            invoice: { $ref: "#/components/schemas/WebhookInvoiceObject" }
            transactions:
              type: array
              items: { $ref: "#/components/schemas/WebhookTransaction" }
              description: |
                EVERY transaction ever associated with the invoice
                (including reverted / orphaned), ordered by detection
                time — the complete picture on every event, no follow-up
                GET needed.
            triggerTxHash:
              type: [string, "null"]
              description: |
                The transaction that caused this event, for the per-tx
                `payment_*` events; null on whole-invoice lifecycle
                events.

    WebhookInvoiceDemotedEvent:
      type: object
      description: Envelope for `invoice:demoted` — the standard invoice envelope plus reorg extras.
      required: [event, timestamp, data]
      properties:
        event:
          type: string
          enum: ["invoice:demoted"]
        timestamp: { type: string, format: date-time }
        data:
          type: object
          required: [invoice, transactions, triggerTxHash, previousStatus, poolReacquired, poolCollided]
          properties:
            invoice: { $ref: "#/components/schemas/WebhookInvoiceObject" }
            transactions:
              type: array
              items: { $ref: "#/components/schemas/WebhookTransaction" }
            triggerTxHash: { type: [string, "null"] }
            previousStatus:
              type: string
              enum: [pending, processing, completed, expired, canceled]
              description: Status before the reorg demotion.
            poolReacquired:
              type: boolean
              description: The gateway re-locked the receive address to keep watching for a replacement payment.
            poolCollided:
              type: boolean
              description: |
                The address had already been recycled to a newer invoice
                when the reorg hit — funds arriving now may attribute to
                that newer invoice. Rare; coordinate with the operator.

    WebhookPayoutObject:
      type: object
      description: |
        Payout snapshot embedded in payout webhook payloads (the `data`
        block IS this object — no wrapper). Slimmer than the REST
        `Payout`: no `merchantId`, `quotedAmountUsd`, `quotedRate`,
        `topUpAmountRaw`, `feeEstimateNative`, `webhookUrl`,
        confirmation-policy fields, `createdAt`, `broadcastAttemptedAt`
        or `updatedAt`. GET the payout for the full view.
      required:
        [id, kind, parentPayoutId, status, chainId, token, amountRaw,
         feeTier, feeQuotedNative, batchId, destinationAddress,
         sourceAddress, txHash, topUpTxHash, topUpSponsorAddress,
         lastError, submittedAt, confirmedAt]
      properties:
        id: { type: string, format: uuid }
        kind: { type: string, enum: [standard] }
        parentPayoutId: { type: [string, "null"], format: uuid }
        status:
          type: string
          enum: [planned, reserved, topping-up, submitted, confirmed, failed, canceled]
          description: Status at event time — `submitted` / `confirmed` / `failed` for the three payout events.
        chainId: { type: integer }
        token: { type: string }
        amountRaw: { type: string }
        feeTier:
          type: [string, "null"]
          enum: [low, medium, high, null]
        feeQuotedNative: { type: [string, "null"] }
        batchId: { type: [string, "null"] }
        destinationAddress: { type: string }
        sourceAddress: { type: [string, "null"] }
        txHash: { type: [string, "null"] }
        topUpTxHash: { type: [string, "null"] }
        topUpSponsorAddress: { type: [string, "null"] }
        lastError: { type: [string, "null"] }
        submittedAt: { type: [string, "null"], format: date-time }
        confirmedAt: { type: [string, "null"], format: date-time }

    WebhookPayoutEvent:
      type: object
      description: Envelope for the three payout webhook events.
      required: [event, timestamp, data]
      properties:
        event:
          type: string
          enum: ["payout.submitted", "payout.confirmed", "payout.failed"]
          description: Dot-separated wire name (unlike invoice events, which use colons).
        timestamp: { type: string, format: date-time }
        data: { $ref: "#/components/schemas/WebhookPayoutObject" }
