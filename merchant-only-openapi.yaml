openapi: 3.1.0
info:
  title: crypto-gateway — Merchant API
  version: 1.0.0
  license:
    name: MIT
    identifier: MIT
  summary: >
    Merchant-facing surface of the crypto-gateway: invoices (get paid),
    payouts (send funds), the public checkout projection, and signed
    webhooks for both.
  description: |
    This document covers ONLY what a merchant integration needs: the
    `/api/v1/invoices*` and `/api/v1/payouts*` routes, the unauthenticated
    `/checkout/{id}` projection for hosted payment pages, and the outbound
    **webhooks** the gateway signs and POSTs to your server. Operator /
    admin routes are deliberately excluded (see the full `openapi.yaml`
    for those).

    ---

    ## Authentication

    Every `/api/v1/*` request needs your merchant API key — issued once by
    the gateway operator; if you lose it the operator must rotate it.

    Either header form works:

    ```
    Authorization: Bearer <api-key>
    X-API-Key: <api-key>
    ```

    Your merchant identity is ALWAYS derived from the key. A `merchantId`
    supplied in any request body is ignored — you can never read or write
    another merchant's data, and cross-merchant resource ids return `404`
    (never `403`) so ids can't be enumerated.

    ## Conventions

    - **Money is decimal strings, never floats.** `"100.00"`, `"0.04"`.
      Fields suffixed `Raw` are integer strings in the token's smallest
      unit (wei, sun, lamports, sats, micro-USDC…).
    - **Timestamps** are ISO-8601 `date-time` strings in responses.
      Time-range query filters accept ISO-8601 or unix-milliseconds.
    - **`X-Request-Id`** is echoed (or minted) on every response — quote
      it when reporting an issue to the operator.
    - **Rate limits**: `/api/v1/*` is limited per merchant (default
      1000/min per surface — invoices and payouts count separately);
      `/checkout/{id}` is limited per client IP (default 60/min). Watch
      `X-RateLimit-Remaining` / `X-RateLimit-Reset`; a `429` carries
      `Retry-After` seconds. `POST /api/v1/payouts/batch` consumes one
      quota token PER ROW.
    - **Pagination** is `limit` + `offset` with a `hasMore` flag (computed
      via fetch-N+1; there is no total-count field) — page until `hasMore`
      is `false`.

    ## Idempotency

    - `POST /api/v1/invoices` — pass `externalId` (your cart/order id). A
      retry with the same `externalId` returns the ORIGINAL invoice with
      HTTP 201 again instead of creating a duplicate. Safe to retry on
      timeouts and 5xx.
    - `POST /api/v1/payouts` has NO idempotency key in v1 — a blind retry
      after a timeout can double-pay. Recommended pattern: set a unique
      `batchId` per logical payment attempt, and on any ambiguous outcome
      reconcile with `GET /api/v1/payouts?batchId=<id>` before retrying.
    - Webhooks carry `X-Webhook-Idempotency-Key` — dedupe on it (see below).

    ## Invoice lifecycle

    ```
    pending ──payment detected──▶ processing ──confirmed ≥ target──▶ completed
       │                             │  ▲                                │
       │                             │  └──(reorg: invoice:demoted)──────┘
       └────────── expiresAt ────────┴──────▶ expired        canceled (operator)
    ```

    `status` answers "where is the invoice in its journey"; the orthogonal
    `extraStatus` answers "did the customer pay the right amount":
    `"partial"` (underpaid, with `status=processing`) or `"overpaid"`
    (over the tolerance threshold, with `status=completed`).

    ## Payout lifecycle

    ```
    reserved ──▶ (topping-up) ──▶ submitted ──▶ confirmed
       │
       ├──▶ canceled (only while reserved)
       └──▶ failed (lastError set)
    ```

    The funding source is picked and reserved synchronously on
    `POST /api/v1/payouts` — "not enough funds" errors surface on the POST
    itself, never as a later `failed` webhook. Only the broadcast is
    asynchronous. **No webhook fires at plan time** — the first event you
    receive for a payout is `payout.submitted`.

    ## Webhooks

    Configured at two levels, per event, most specific wins:

    1. **Per-resource override** — `webhookUrl` + `webhookSecret` on the
       invoice/payout create call (must be supplied as a pair; the secret
       is write-only, min 16 chars, encrypted at rest, never echoed).
    2. **Merchant default** — the URL + secret registered on your merchant
       account by the operator.

    If neither level is configured the event is skipped (logged
    server-side, not queued). URLs must be public HTTPS — loopback,
    link-local and cloud-metadata targets are rejected at create time
    (`INVALID_DESTINATION`) and again at dispatch time.

    ### Events

    | Event | Fires when |
    |---|---|
    | `invoice:payment_detected` | A transfer to the invoice's receive address is seen on-chain (per transaction) |
    | `invoice:payment_confirmed` | That transfer reaches the invoice's confirmation threshold (per transaction) |
    | `invoice:processing` | The invoice as a whole flips into the in-flight state (once per distinct `(status, extraStatus)` flavor — see the event's docs) |
    | `invoice:completed` | Confirmed value reaches the invoice target (within tolerance) |
    | `invoice:expired` | The invoice passes `expiresAt` unpaid/underpaid, or is force-expired via the API |
    | `invoice:canceled` | The invoice is canceled by the gateway operator |
    | `invoice:demoted` | A chain reorg un-confirms a completed/processing invoice |
    | `payout.submitted` | The payout tx is broadcast (`txHash` now set) |
    | `payout.confirmed` | The payout tx reaches its confirmation threshold |
    | `payout.failed` | Broadcast/confirmation permanently failed (`lastError` set) |

    Note the (historical, load-bearing) naming asymmetry: invoice events
    use a **colon** (`invoice:completed`), payout events use a **dot**
    (`payout.submitted`). Match on the exact strings above.

    ### Delivery contract

    Each delivery is an HTTP `POST` to your URL:

    ```
    Content-Type: application/json
    X-Webhook-Signature:       <hex HMAC-SHA256 of the raw request body>
    X-Webhook-Idempotency-Key: <stable per logical event>
    X-Webhook-Timestamp:       <unix-milliseconds of this delivery cycle's first attempt>
    X-Webhook-Attempt:         <1..4 within the current delivery cycle>
    ```

    Payload envelope (all events):

    ```json
    { "event": "<name>", "timestamp": "<ISO-8601>", "data": { ... } }
    ```

    - Invoice events: `data = { invoice, transactions, triggerTxHash }` —
      `transactions` is EVERY transaction ever associated with the invoice
      (including `reverted` / `orphaned`), so you always have the complete
      picture without a follow-up GET. `triggerTxHash` is set on the
      per-transaction `payment_*` events, `null` on lifecycle events.
      `invoice:demoted` adds `previousStatus`, `poolReacquired`,
      `poolCollided`.
    - Payout events: `data` IS the payout object (no wrapper).

    ### Verifying the signature

    Compute HMAC-SHA256 over the **raw request body bytes** with your
    webhook secret and compare (constant-time) to `X-Webhook-Signature`:

    ```js
    import { createHmac, timingSafeEqual } from "node:crypto";

    function verify(rawBody, signatureHeader, secret) {
      const expected = createHmac("sha256", secret).update(rawBody).digest("hex");
      const a = Buffer.from(expected, "hex");
      const b = Buffer.from(signatureHeader ?? "", "hex");
      return a.length === b.length && timingSafeEqual(a, b);
    }
    ```

    Parse the JSON only AFTER verifying. Any re-serialization
    (pretty-printing, key reordering) breaks the HMAC.

    ### Retries, ordering, dedupe

    - Respond `2xx` fast (< 10 s; do heavy work async). Anything else is a
      failure for that attempt.
    - Within a delivery cycle the gateway retries up to 4 HTTP attempts
      (~250 ms / 500 ms / 1 s backoff) on 408/425/429/5xx/network errors.
      Failed cycles are re-driven by a durable outbox up to 5 cycles total
      with growing gaps (~5 min, 15 min, 1 h, 6 h) before the delivery is
      marked dead — worst case ≈ 20 HTTP attempts over ~7 h. The operator
      can replay dead deliveries.
    - **Dedupe on `X-Webhook-Idempotency-Key`** — it is stable across every
      retry of a logical event, and also across a reorg-then-reconfirm
      cycle: a repeated transition to the same state reuses the same key
      and is NOT re-delivered. Treat `invoice:demoted` as your signal to
      re-check state (poll the GET) rather than waiting for a repeat event.
    - **Do not assume ordering.** Retries and concurrent transitions can
      arrive out of order; the embedded `invoice` / payout object is the
      state AT EVENT TIME (later events carry newer state). When in doubt,
      `GET` the resource for current truth.
    - Webhooks stop entirely while your merchant account is deactivated.
      Secret rotation takes effect on the next delivery attempt, including
      retries of already-queued events.

    ## Error envelope

    Every non-2xx response is `{ "error": { "code", "message", "details?" } }`
    with a stable machine-readable `code` (per-endpoint codes documented on
    each operation). `VALIDATION` errors carry the Zod issue array in
    `details`.

servers:
  - url: http://localhost:8787
    description: Local dev
  - url: https://crypto-gateway-dev.workers.dev
    description: Dev Workers (placeholder — replace with your gateway's domain)

tags:
  - name: invoices
    description: |
      Invoice lifecycle — create a payment request, share the receive
      address (or hosted checkout link), and track it to `completed`.
  - name: payouts
    description: |
      Payout lifecycle — quote fees, plan (funds reserved synchronously),
      then track broadcast → confirmation via webhooks or polling.
  - name: checkout
    description: |
      Public, unauthenticated invoice projection for hosted checkout
      pages. The high-entropy invoice UUID is the only credential.
  - name: webhooks
    description: |
      Outbound signed events delivered to YOUR server (not routes on the
      gateway). See the `webhooks` section of this document for the
      payloads and the top-level description for the delivery contract.
  - name: health
    description: Unauthenticated liveness probe.

security:
  - MerchantApiKey: []

paths:
  /health:
    get:
      tags: [health]
      operationId: getHealth
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: Service up
          headers:
            X-Request-Id: { $ref: "#/components/headers/X-Request-Id" }
          content:
            application/json:
              schema:
                type: object
                required: [status, phase]
                properties:
                  status: { type: string, enum: [ok] }
                  phase: { type: integer }
              examples:
                ok:
                  value: { status: ok, phase: 7 }

  /api/v1/invoices:
    get:
      tags: [invoices]
      operationId: listInvoices
      summary: List invoices
      description: |
        Returns invoices created by the authenticated merchant, newest
        first (`createdAt DESC`). All filters are optional and
        AND-combined. Pagination uses `limit` + `offset`; the response's
        `hasMore` tells you whether another page exists (no total count) —
        page until it is `false`.

        `status` is lifecycle ("where is the invoice in its journey");
        the orthogonal `extraStatus` filter is payment fidelity ("did the
        customer pay the right amount").
      parameters:
        - name: status
          in: query
          description: |
            Comma-separated statuses, any of
            `pending,processing,completed,expired,canceled`. Unknown
            values yield 400 `BAD_STATUS` (typos are rejected rather than
            silently ignored).
          schema: { type: string }
          example: processing,completed
        - name: chainId
          in: query
          description: Narrow to one chain id. Non-numeric → 400 `BAD_CHAIN_ID`.
          schema: { type: integer }
        - name: extraStatus
          in: query
          description: |
            Comma-separated payment-fidelity filter: `partial` (underpaid,
            status=processing) and/or `overpaid` (over threshold,
            status=completed). Invoices with no extra status are excluded
            when this filter is set.
          schema: { type: string }
        - name: token
          in: query
          description: Comma-separated token symbols (OR match), e.g. `USDT,USDC`.
          schema: { type: string }
        - name: externalId
          in: query
          description: Your dedup key (exact match).
          schema: { type: string }
        - name: externalIdContains
          in: query
          description: |
            Case-insensitive substring match on `externalId` (`%`/`_` in
            the term are escaped and matched literally).
          schema: { type: string }
        - name: toAddress
          in: query
          description: |
            Invoice receive address — what the payer saw on the checkout
            page. Exact match; pass the canonicalized form.
          schema: { type: string }
        - name: addressContains
          in: query
          description: Case-insensitive substring match on the receive address (stored casing).
          schema: { type: string }
        - name: fromAddress
          in: query
          description: |
            Payer address. Matches invoices with any detected or confirmed
            transaction from this address (reverted / orphaned excluded).
          schema: { type: string }
        - name: txHash
          in: query
          description: On-chain tx hash — matches the invoice(s) credited by it.
          schema: { type: string }
        - name: amountUsdMin
          in: query
          description: |
            Inclusive lower bound on `amountUsd`. Legacy token-amount
            invoices (no USD amount) are excluded when set. Non-numeric →
            400 `BAD_NUMBER`.
          schema: { type: number }
        - name: amountUsdMax
          in: query
          schema: { type: number }
        - name: paidUsdMin
          in: query
          description: Inclusive lower bound on `paidUsd` (USD received so far).
          schema: { type: number }
        - name: paidUsdMax
          in: query
          schema: { type: number }
        - name: hasPayments
          in: query
          description: |
            `true` → only invoices with any payment recorded; `false` →
            only untouched ones. Accepts `true|false|1|0`; anything else →
            400 `BAD_BOOLEAN`.
          schema: { type: boolean }
        - name: createdFrom
          in: query
          description: Inclusive lower bound on `createdAt` — ISO-8601 or unix-ms (else 400 `BAD_TIMESTAMP`).
          schema: { type: string }
          example: "2026-07-01T00:00:00Z"
        - name: createdTo
          in: query
          schema: { type: string }
        - name: updatedFrom
          in: query
          schema: { type: string }
        - name: updatedTo
          in: query
          schema: { type: string }
        - name: confirmedFrom
          in: query
          schema: { type: string }
        - name: confirmedTo
          in: query
          schema: { type: string }
        - name: expiresFrom
          in: query
          schema: { type: string }
        - name: expiresTo
          in: query
          schema: { type: string }
        - name: sortBy
          in: query
          description: Sort column. `amountUsd` / `paidUsd` sort numerically.
          schema:
            type: string
            enum: [createdAt, updatedAt, confirmedAt, expiresAt, amountUsd, paidUsd]
            default: createdAt
        - name: sortDir
          in: query
          schema: { type: string, enum: [asc, desc], default: desc }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        "200":
          description: Paginated list of invoices
          headers:
            X-Request-Id: { $ref: "#/components/headers/X-Request-Id" }
            X-RateLimit-Limit: { $ref: "#/components/headers/X-RateLimit-Limit" }
            X-RateLimit-Remaining: { $ref: "#/components/headers/X-RateLimit-Remaining" }
            X-RateLimit-Reset: { $ref: "#/components/headers/X-RateLimit-Reset" }
          content:
            application/json:
              schema:
                type: object
                required: [invoices, limit, offset, sortBy, sortDir, hasMore]
                properties:
                  invoices:
                    type: array
                    items: { $ref: "#/components/schemas/Invoice" }
                  limit: { type: integer, description: Echo of the resolved page size. }
                  offset: { type: integer }
                  sortBy:
                    type: string
                    enum: [createdAt, updatedAt, confirmedAt, expiresAt, amountUsd, paidUsd]
                  sortDir: { type: string, enum: [asc, desc] }
                  hasMore:
                    type: boolean
                    description: True when another page exists past `offset + limit`.
              examples:
                page:
                  summary: One completed USD-path invoice, more pages available
                  value:
                    invoices:
                      - id: "0b9e4c7a-1d2f-4a3b-9c8d-5e6f7a8b9c0d"
                        merchantId: "7d9f6c1a-2b3e-4c5d-8e9f-0a1b2c3d4e5f"
                        status: completed
                        extraStatus: null
                        chainId: 137
                        token: USDC
                        receiveAddress: "0x8Ba1f109551bD432803012645Ac136ddd64DBA72"
                        addressIndex: 42
                        acceptedFamilies: [evm]
                        receiveAddresses:
                          - family: evm
                            chainId: 137
                            address: "0x8Ba1f109551bD432803012645Ac136ddd64DBA72"
                            poolAddressId: "f31c2f4e-8a4e-4f6e-b2c7-9d1e5a7b3c9f"
                        requiredAmountRaw: "0"
                        receivedAmountRaw: "0"
                        fiatAmount: null
                        fiatCurrency: null
                        quotedRate: null
                        amountUsd: "100.00"
                        paidUsd: "100.05"
                        overpaidUsd: "0"
                        rateWindowExpiresAt: "2026-07-04T10:10:00.000Z"
                        rates: { USDC: "0.9998", POL: "0.41", ETH: "2450.12" }
                        externalId: "order-10023"
                        metadata: { cartId: "c_88112", customer: "cus_5521" }
                        webhookUrl: null
                        paymentToleranceUnderBps: 100
                        paymentToleranceOverBps: 500
                        confirmationThreshold: 12
                        confirmationTiers: null
                        createdAt: "2026-07-04T10:00:00.000Z"
                        expiresAt: "2026-07-04T10:30:00.000Z"
                        confirmedAt: "2026-07-04T10:07:41.000Z"
                        updatedAt: "2026-07-04T10:07:41.000Z"
                    limit: 25
                    offset: 0
                    sortBy: createdAt
                    sortDir: desc
                    hasMore: true
        "400":
          description: |
            Bad filter value. Stable `error.code` values:
              - `BAD_STATUS` — unknown `status` entry
              - `BAD_CHAIN_ID` — non-numeric `chainId`
              - `BAD_TIMESTAMP` — a `*From`/`*To` bound that is neither ISO-8601 nor unix-ms
              - `BAD_NUMBER` — non-numeric `amountUsdMin/Max` or `paidUsdMin/Max`
              - `BAD_BOOLEAN` — `hasPayments` not one of `true|false|1|0`
              - `VALIDATION` — Zod rejection (limit outside 1..100, unknown
                `sortBy`/`sortDir`, `*From` > `*To`, `*Min` > `*Max`, bad
                `extraStatus`/`token` values); `details` carries the issues
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              examples:
                badStatus:
                  value:
                    error:
                      code: BAD_STATUS
                      message: "Unknown status 'complete' (did you mean 'completed'?)"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }
    post:
      tags: [invoices]
      operationId: createInvoice
      summary: Create an invoice
      description: |
        Creates an invoice and allocates one gateway-owned receive address
        per accepted family (UTXO families get a fresh address per chain —
        BTC and LTC differ; other families draw from the gateway's
        pre-minted pools).

        **Pricing modes — provide EXACTLY ONE:**
          - `amountUsd` — USD-pegged (recommended). Any registered token on
            any accepted family converts at the 10-minute pinned rate
            window and SUMS toward the USD target (e.g. $50 USDC + $50 ETH
            settles a $100 invoice).
          - `amountRaw` — legacy exact-token: payer must send exactly this
            raw amount of `token` on `chainId`; other tokens are ignored.
          - `fiatAmount` + `fiatCurrency` — legacy fiat-quoted; converted
            once at creation (rate echoed as `quotedRate`).

        **Idempotency.** Pass `externalId` to make the call retry-safe: a
        second POST with the same `externalId` returns the existing
        invoice (HTTP 201 again; body identical except the
        fresh-create-only `receiveAddresses[].addressIndex` extra is
        absent on replays) — even under a concurrent-create race.

        Share `id` with your payer via your own UI, or link them to the
        hosted-checkout projection `GET /checkout/{id}`.

        Known edge: a `chainId` whose token is registered but whose chain
        adapter is not wired in this deployment currently surfaces as 500
        `INTERNAL` rather than a typed 400; same for a full price-oracle
        outage on the legacy fiat-quoted path (the typed 503
        `RATES_UNAVAILABLE` applies to the USD path only).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateInvoiceInput" }
            examples:
              usdMultiFamily:
                summary: USD-pegged, payable on EVM + Tron + Solana + BTC/LTC (recommended)
                value:
                  chainId: 137
                  token: USDC
                  amountUsd: "100.00"
                  acceptedFamilies: [evm, tron, solana, utxo]
                  externalId: "order-10023"
                  metadata: { cartId: "c_88112", customer: "cus_5521" }
                  expiresInMinutes: 30
              usdWithWebhookOverride:
                summary: USD-pegged with a per-invoice webhook override
                value:
                  chainId: 1
                  token: ETH
                  amountUsd: "250.00"
                  acceptedFamilies: [evm]
                  externalId: "order-10024"
                  webhookUrl: "https://shop.example.com/hooks/crypto/order-10024"
                  webhookSecret: "whsec_9f27c1e4b6a84d0f"
              legacyExactToken:
                summary: Legacy single-token — exactly 25 USDT on Tron
                value:
                  chainId: 728126428
                  token: USDT
                  amountRaw: "25000000"
                  externalId: "order-10025"
              legacyFiatQuoted:
                summary: Legacy fiat-quoted — €49.99 in SOL at today's rate
                value:
                  chainId: 900
                  token: SOL
                  fiatAmount: "49.99"
                  fiatCurrency: EUR
                  expiresInMinutes: 60
      responses:
        "201":
          description: |
            Invoice created — or idempotent replay (the existing invoice
            for this `externalId` returned with 201 again).
          headers:
            X-Request-Id: { $ref: "#/components/headers/X-Request-Id" }
            X-RateLimit-Limit: { $ref: "#/components/headers/X-RateLimit-Limit" }
            X-RateLimit-Remaining: { $ref: "#/components/headers/X-RateLimit-Remaining" }
            X-RateLimit-Reset: { $ref: "#/components/headers/X-RateLimit-Reset" }
          content:
            application/json:
              schema:
                type: object
                required: [invoice]
                properties:
                  invoice: { $ref: "#/components/schemas/Invoice" }
              examples:
                usdMultiFamily:
                  summary: Fresh create for the USD multi-family request
                  value:
                    invoice:
                      id: "0b9e4c7a-1d2f-4a3b-9c8d-5e6f7a8b9c0d"
                      merchantId: "7d9f6c1a-2b3e-4c5d-8e9f-0a1b2c3d4e5f"
                      status: pending
                      extraStatus: null
                      chainId: 137
                      token: USDC
                      receiveAddress: "0x8Ba1f109551bD432803012645Ac136ddd64DBA72"
                      addressIndex: 42
                      acceptedFamilies: [evm, solana, tron, utxo]
                      receiveAddresses:
                        - family: evm
                          chainId: 137
                          address: "0x8Ba1f109551bD432803012645Ac136ddd64DBA72"
                          poolAddressId: "f31c2f4e-8a4e-4f6e-b2c7-9d1e5a7b3c9f"
                          addressIndex: 42
                        - family: solana
                          chainId: 900
                          address: "9xQeWvG816bUx9EPjHmaT23yvVM2ZWbrrpZb9PusVFin"
                          poolAddressId: "a7c81d5b-6e2f-4b9a-8c3d-1f0e9b7a5c4d"
                          addressIndex: 17
                        - family: tron
                          chainId: 728126428
                          address: "TQn9Y2khEsLJW1ChVWFMSMeRDow5KcbLSE"
                          poolAddressId: "c95e3a7f-2b8d-4e1c-9a6b-7d4f8e2c0b5a"
                          addressIndex: 8
                        - family: utxo
                          chainId: 800
                          address: "bc1qw508d6qejxtdg4y5r3zarvary0c5xw7kv8f3t4"
                          poolAddressId: null
                          addressIndex: 1031
                        - family: utxo
                          chainId: 801
                          address: "ltc1qfmv2xhdasgty87ss8rt4mtvule5uvcgwmzy0y8"
                          poolAddressId: null
                          addressIndex: 1031
                      requiredAmountRaw: "0"
                      receivedAmountRaw: "0"
                      fiatAmount: null
                      fiatCurrency: null
                      quotedRate: null
                      amountUsd: "100.00"
                      paidUsd: "0"
                      overpaidUsd: "0"
                      rateWindowExpiresAt: "2026-07-04T10:10:00.000Z"
                      rates:
                        USDC: "0.9998"
                        USDT: "1.0001"
                        POL: "0.41"
                        ETH: "2450.12"
                        TRX: "0.13"
                        SOL: "148.55"
                        BTC: "108211.00"
                        LTC: "87.15"
                      externalId: "order-10023"
                      metadata: { cartId: "c_88112", customer: "cus_5521" }
                      webhookUrl: null
                      paymentToleranceUnderBps: 100
                      paymentToleranceOverBps: 500
                      confirmationThreshold: 12
                      confirmationTiers: null
                      createdAt: "2026-07-04T10:00:00.000Z"
                      expiresAt: "2026-07-04T10:30:00.000Z"
                      confirmedAt: null
                      updatedAt: "2026-07-04T10:00:00.000Z"
        "400":
          description: |
            Stable `error.code` values:
              - `BAD_JSON` — request body is not valid JSON
              - `VALIDATION` — schema violation (zero or multiple pricing
                modes, `fiatAmount` without `fiatCurrency`, `webhookUrl` /
                `webhookSecret` not supplied as a pair, out-of-range
                `expiresInMinutes` / tolerance bps, …); `details` carries
                the Zod issues
              - `TOKEN_NOT_SUPPORTED` — `token` not registered on the
                request's `chainId`; or (legacy single-token modes) not
                registered on every accepted family; or (USD mode) not
                registered on the primary chain's family; or an accepted
                family has no wired chain adapter
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              examples:
                validation:
                  value:
                    error:
                      code: VALIDATION
                      message: "Invalid request body"
                      details:
                        - path: ["amountUsd"]
                          message: "Provide exactly one of amountUsd, amountRaw, or fiatAmount+fiatCurrency"
                tokenNotSupported:
                  value:
                    error:
                      code: TOKEN_NOT_SUPPORTED
                      message: "Token DOGE is not registered on chain 137"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/MerchantInactive" }
        "404":
          description: |
            `MERCHANT_NOT_FOUND` — the authenticated merchant row
            disappeared between auth and create (deletion race).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "503":
          description: |
            Transient — retry after a short delay. Stable `error.code`
            values:
              - `RATES_UNAVAILABLE` — USD path only; the rate cache is
                empty (gateway just booted or oracle outage outlasted the
                cache). Succeeds once rates are re-warmed.
              - `POOL_EXHAUSTED` — no available receive address for one of
                the accepted families; `details.family` names it. The
                gateway operator must extend the pool.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              examples:
                poolExhausted:
                  value:
                    error:
                      code: POOL_EXHAUSTED
                      message: "No available pool address for family 'tron'"
                      details: { family: tron, hint: "POST /admin/pool/initialize" }

